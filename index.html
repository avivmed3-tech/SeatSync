    function buildMessage(template, guest, event, tablesData) {
      const tableName = (() => {
        if (!guest.table_id || !tablesData) return '';
        const t = tablesData.find(t => t.id === guest.table_id);
        return t ? t.name : '';
      })();

      let msg = template
        .replace(/\{שם\}/g, guest.name || '')
        .replace(/\{תאריך\}/g, event.event_date ? new Date(event.event_date).toLocaleDateString('he-IL') : '')
        .replace(/\{מקום\}/g, event.venue_name || '')
        .replace(/\{לינק_rsvp\}/g, guest.rsvp_token ? `https://avivmed3-tech.github.io/SeatSync/rsvp.html?token=${guest.rsvp_token}` : 'לינק יישלח בנפרד')
        .replace(/\{שם_אירוע\}/g, event.name || '')
        .replace(/\{שולחן\}/g, tableName || 'טרם הוקצה');

      // Clean up any leftover {לינק_הזמנה} from old templates
      msg = msg.replace(/\{לינק_הזמנה\}\n\n/g, '');
      msg = msg.replace(/\n\n\{לינק_הזמנה\}/g, '');
      msg = msg.replace(/\{לינק_הזמנה\}/g, '');

      return msg.trim();
    }

    // Share invitation image + message text together via Web Share API
    // On mobile: opens share sheet with image file + text (user picks WhatsApp → sends both)
    // On desktop: falls back to wa.me link (text only) since Web Share with files is not supported
    async function shareInvitationWithMessage(imageUrl, messageText) {
      try {
        // Get cached image file
        const file = await getInvitationFile(imageUrl);

        // Try Web Share API with file + text together
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            text: messageText,
          });
          return 'shared';
        }

        return 'unsupported';
      } catch (err) {
        if (err.name === 'AbortError') return 'cancelled';
        console.error('Share failed:', err);
        return 'error';
      }
    }

    // Share image only (no text) — for cases where user wants separate messages
    async function shareImageOnly(imageUrl) {
      try {
        const file = await getInvitationFile(imageUrl);
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
          return 'shared';
        }
        // Fallback: download
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        return 'downloaded';
      } catch (err) {
        if (err.name === 'AbortError') return 'cancelled';
        return 'error';
      }
    }

    // Cache the invitation blob so we don't re-fetch for every guest
    let _invitationCache = { url: null, file: null };
    async function getInvitationFile(imageUrl) {
      if (_invitationCache.url === imageUrl && _invitationCache.file) {
        return _invitationCache.file;
      }
      const response = await fetch(imageUrl);
      const blob = await response.blob();
      const ext = imageUrl.split('.').pop()?.split('?')[0] || 'jpg';
      const mimeType = blob.type || `image/${ext === 'png' ? 'png' : 'jpeg'}`;
      const file = new File([blob], `invitation.${ext}`, { type: mimeType });
      _invitationCache = { url: imageUrl, file };
      return file;
    }

    // Check if Web Share with files is supported
    function canShareFiles() {
      if (!navigator.canShare) return false;
      try {
        const testFile = new File(['test'], 'test.png', { type: 'image/png' });
        return navigator.canShare({ files: [testFile] });
      } catch { return false; }
    }

    function buildWALink(phone, message) {
      const raw = String(phone || '').replace(/[^0-9+]/g, '');
      let intl = raw;
      if (raw.startsWith('0')) intl = '+972' + raw.slice(1);
      else if (!raw.startsWith('+')) intl = '+972' + raw;
      return `https://wa.me/${intl.replace('+','')}?text=${encodeURIComponent(message)}`;
    }

    // ============================================
    // Bulk WhatsApp Sender — Auto-opens links with delay
    // ============================================
    function BulkWhatsAppSender({ recipients, buildLink, onSent, onAllDone }) {
      const [sending, setSending] = useState(false);
      const [currentIdx, setCurrentIdx] = useState(0);
      const [paused, setPaused] = useState(false);
      const [delay, setDelay] = useState(3); // seconds between sends
      const [openedAll, setOpenedAll] = useState(false);
      const timerRef = useRef(null);
      const pausedRef = useRef(false);
      const isMobile = useIsMobile();

      useEffect(() => { pausedRef.current = paused; }, [paused]);

      // ── Open ALL tabs at once (Desktop only) ──────────────────────────────
      const openAllTabs = () => {
        if (recipients.length === 0) return;

        // Modern browsers block multiple window.open unless triggered by user
        // We open them in rapid succession — most browsers allow ~5-10 before blocking
        // For larger lists we batch with a tiny delay
        const BATCH = 8; // open 8 at a time to avoid popup blockers
        let opened = 0;

        const openBatch = (startIdx) => {
          const end = Math.min(startIdx + BATCH, recipients.length);
          for (let i = startIdx; i < end; i++) {
            const link = buildLink(recipients[i]);
            window.open(link, `_whatsapp_${recipients[i].id}`);
            onSent(recipients[i].id);
            opened++;
          }
          if (end < recipients.length) {
            // Small pause between batches so browser doesn't block
            setTimeout(() => openBatch(end), 800);
          } else {
            setOpenedAll(true);
            onAllDone();
          }
        };

        openBatch(0);
      };
      // ──────────────────────────────────────────────────────────────────────

      const startBulkSend = async () => {
        setSending(true);
        setCurrentIdx(0);
        setPaused(false);

        for (let i = 0; i < recipients.length; i++) {
          if (pausedRef.current) {
            setCurrentIdx(i);
            return;
          }

          setCurrentIdx(i);
          const guest = recipients[i];
          const link = buildLink(guest);
          window.open(link, '_blank');
          onSent(guest.id);

          if (i < recipients.length - 1) {
            await new Promise(resolve => {
              timerRef.current = setTimeout(resolve, delay * 1000);
            });
          }
        }

        setSending(false);
        onAllDone();
      };

      const stopSending = () => {
        setPaused(true);
        pausedRef.current = true;
        if (timerRef.current) clearTimeout(timerRef.current);
        setSending(false);
      };

      const resumeSending = async () => {
        setPaused(false);
        pausedRef.current = false;
        setSending(true);

        for (let i = currentIdx; i < recipients.length; i++) {
          if (pausedRef.current) {
            setCurrentIdx(i);
            return;
          }

          setCurrentIdx(i);
          const guest = recipients[i];
          const link = buildLink(guest);
          window.open(link, '_blank');
          onSent(guest.id);

          if (i < recipients.length - 1) {
            await new Promise(resolve => {
              timerRef.current = setTimeout(resolve, delay * 1000);
            });
          }
        }

        setSending(false);
        onAllDone();
      };

      return (
        <div style={{ background: 'linear-gradient(135deg, rgba(37,211,102,0.08), rgba(37,211,102,0.02))', border: '1.5px solid rgba(37,211,102,0.25)', borderRadius: 'var(--radius-md)', padding: 16 }}>

          {/* Desktop: Open all tabs button */}
          {!isMobile && !sending && recipients.length > 0 && (
            <div style={{ marginBottom: 12, padding: '10px 14px', background: 'rgba(59,130,246,0.07)', border: '1px solid rgba(59,130,246,0.2)', borderRadius: 'var(--radius-sm)' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: 'var(--blue-500)', marginBottom: 2 }}>
                    🖥️ מצב Desktop — פתח הכל בטאבים
                  </div>
                  <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
                    פותח {recipients.length} טאבים במקביל עם WhatsApp Web. לחצו שלח בכל טאב ← סגרו ← הבא.
                    {recipients.length > 8 && ` (נפתח ב-${Math.ceil(recipients.length / 8)} סבבים של 8 בגלל הגנות הדפדפן)`}
                  </div>
                </div>
                <button
                  className="btn"
                  style={{ background: 'var(--blue-500)', color: 'white', padding: '9px 18px', fontSize: 13, boxShadow: '0 2px 8px rgba(59,130,246,0.3)', flexShrink: 0 }}
                  onClick={openAllTabs}
                  title={`פתח את כל ${recipients.length} הטאבים`}
                >
                  <Icon name="ExternalLink" size={16} />
                  פתח {recipients.length} טאבים
                </button>
              </div>
              {openedAll && (
                <div style={{ marginTop: 8, fontSize: 12, color: 'var(--emerald-500)', fontWeight: 600 }}>
                  ✓ כל הטאבים נפתחו — שלחו את ההודעה בכל אחד
                </div>
              )}
            </div>
          )}

          {/* Sequential auto-send (works on mobile too) */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
            {!sending ? (
              <>
                <button
                  className="btn"
                  style={{ background: '#25D366', color: 'white', padding: '10px 20px', boxShadow: '0 2px 8px rgba(37,211,102,0.3)' }}
                  onClick={paused ? resumeSending : startBulkSend}
                >
                  <Icon name={paused ? 'Play' : 'Zap'} size={18} />
                  {paused
                    ? `המשך (${recipients.length - currentIdx} נותרו)`
                    : `שלח ${isMobile ? 'אחד-אחד' : 'ברצף'} (${recipients.length})`}
                </button>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--text-secondary)' }}>
                  <span>השהייה:</span>
                  <select
                    className="filter-select"
                    style={{ padding: '4px 8px', fontSize: 12, width: 'auto' }}
                    value={delay}
                    onChange={e => setDelay(parseInt(e.target.value))}
                  >
                    <option value="2">2 שניות</option>
                    <option value="3">3 שניות</option>
                    <option value="5">5 שניות</option>
                    <option value="8">8 שניות</option>
                  </select>
                </div>
              </>
            ) : (
              <>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
                  <Icon name="Loader" size={20} style={{ color: '#25D366', animation: 'spin 1s linear infinite' }} />
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: '#128C7E' }}>שולח {currentIdx + 1} מתוך {recipients.length}...</div>
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>{recipients[currentIdx]?.name}</div>
                  </div>
                </div>
                <button className="btn btn-secondary" style={{ padding: '8px 14px', fontSize: 13 }} onClick={stopSending}>
                  <Icon name="Pause" size={16} />עצור
                </button>
              </>
            )}
          </div>
          <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 8 }}>
            {isMobile
              ? '📱 כל לחיצה פותחת WhatsApp עם ההודעה מוכנה — לחצו שלח וחזרו לאפליקציה'
              : '🖥️ Desktop: השתמשו ב"פתח הכל בטאבים" לשליחה מהירה בו-זמנית דרך WhatsApp Web'}
          </div>
        </div>
      );
    }

    // ============================================
    // Image Share Step — shares image + RSVP text together via Web Share API
    // On mobile: one tap → share sheet → WhatsApp → image + text sent together
    // On desktop: falls back to wa.me text link (no image) since Web Share files not supported
    // ============================================
    function ImageShareStep({ invitationUrl, recipients, sentSet, sentCount, onMarkSent, onMarkAllSent, addToast, event, tables, template }) {
      const [sharing, setSharing] = useState(false);
      const [sharingGuest, setSharingGuest] = useState(null);
      const [imageReady, setImageReady] = useState(false);
      const [shareSupported, setShareSupported] = useState(false);
      const isMobile = useIsMobile();

      useEffect(() => {
        setShareSupported(canShareFiles());
        getInvitationFile(invitationUrl).then(() => setImageReady(true)).catch(() => setImageReady(false));
      }, [invitationUrl]);

      const handleShare = async (guest) => {
        setSharing(true);
        setSharingGuest(guest.id);
        const msg = buildMessage(template, guest, event, tables);

        if (shareSupported) {
          // Mobile: share image + text together via Web Share
          // Limitation: Web Share API cannot pre-select a contact — user must pick manually
          // Optimization: we include the phone-specific wa.me link in the share text
          // so after sharing the image, the user can tap the link to open the conversation
          const result = await shareInvitationWithMessage(invitationUrl, msg);
          if (result === 'shared') {
            onMarkSent(guest.id);
            addToast(`נשלח ל-${guest.name} ✓`, 'success');
          } else if (result === 'cancelled') {
            // User cancelled — offer direct wa.me fallback with text only
            if (guest.phone) {
              const waLink = buildWALink(guest.phone, msg);
              window.open(waLink, '_blank');
              setTimeout(() => {
                onMarkSent(guest.id);
                addToast(`טקסט נשלח ל-${guest.name} (בלי תמונה)`, 'info');
              }, 1500);
            }
          } else {
            addToast('שגיאה בשיתוף — נסו שוב', 'error');
          }
        } else {
          // Desktop: open wa.me with text, image can't be sent programmatically
          const waLink = buildWALink(guest.phone, msg);
          window.open(waLink, '_blank');
          setTimeout(() => onMarkSent(guest.id), 1500);
        }
        setSharing(false);
        setSharingGuest(null);
      };

      // Download image for desktop users to attach manually
      const handleDownloadImage = async () => {
        const result = await shareImageOnly(invitationUrl);
        if (result === 'downloaded') addToast('התמונה הורדה — צרפו אותה ב-WhatsApp Web', 'info');
        else if (result === 'shared') addToast('הזמנה שותפה ✓', 'success');
      };

      const progress = recipients.length > 0 ? Math.round((sentCount / recipients.length) * 100) : 0;

      return (
        <div>
          {/* Progress */}
          <div className="round-summary-card">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, flex: 1 }}>
              <img src={invitationUrl} alt="הזמנה" style={{ width: 48, height: 48, borderRadius: 'var(--radius-sm)', objectFit: 'cover', border: '1px solid var(--border-default)' }} />
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>שליחת הזמנה + הודעה</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>
                  {shareSupported ? 'תמונה + טקסט נשלחים ביחד בהודעה אחת' : 'טקסט נשלח דרך WhatsApp Web'}
                </div>
              </div>
            </div>
            <div className="round-stat">
              <div className="round-stat-value" style={{ color: '#25D366' }}>{sentCount}</div>
              <div className="round-stat-label">נשלחו</div>
            </div>
            <div style={{ flex: 1, minWidth: 100 }}>
              <div className="send-progress"><div className="send-progress-bar" style={{ width: `${progress}%` }} /></div>
              <div style={{ fontSize: 12, color: 'var(--text-secondary)', textAlign: 'center' }}>{progress}%</div>
            </div>
            <button className="btn btn-secondary" style={{ fontSize: 12, padding: '6px 14px' }} onClick={onMarkAllSent}>סמן הכל</button>
          </div>

          {/* Instructions */}
          <div style={{ marginBottom: 12, padding: '10px 14px', background: shareSupported ? 'rgba(37,211,102,0.08)' : 'rgba(59,130,246,0.08)', border: `1px solid ${shareSupported ? 'rgba(37,211,102,0.2)' : 'rgba(59,130,246,0.2)'}`, borderRadius: 'var(--radius-sm)', fontSize: 13, display: 'flex', gap: 8, alignItems: 'flex-start' }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{shareSupported ? '📱' : '🖥️'}</span>
            <div>
              {shareSupported
                ? <>לחצו <strong>"שלח"</strong> — ייפתח חלון שיתוף עם <strong>התמונה + ההודעה ביחד</strong>. בחרו WhatsApp → בחרו את איש הקשר → שלחו. אחרי השליחה חזרו לכאן לאורח הבא.</>
                : <>בדסקטופ — לחצו <strong>"הורד הזמנה"</strong> פעם אחת, ואז <strong>"שלח"</strong> לכל אורח לפתיחת WhatsApp Web עם ההודעה. צרפו את התמונה ידנית.</>
              }
            </div>
          </div>

          {/* Desktop: download image button */}
          {!shareSupported && (
            <div style={{ marginBottom: 14, display: 'flex', gap: 10 }}>
              <button className="btn btn-secondary" onClick={handleDownloadImage} disabled={!imageReady}>
                <Icon name="Download" size={18} />הורד תמונת הזמנה (פעם אחת)
              </button>
              <BulkWhatsAppSender
                recipients={recipients.filter(g => !sentSet.has(g.id) && g.phone)}
                buildLink={(guest) => buildWALink(guest.phone, buildMessage(template, guest, event, tables))}
                onSent={(guestId) => onMarkSent(guestId)}
                onAllDone={() => addToast('כל ההודעות נפתחו! ✓', 'success')}
              />
            </div>
          )}

          {/* Recipient list */}
          <div className="recipient-list">
            {recipients.map((guest, idx) => {
              const isSent = sentSet.has(guest.id);
              const isCurrentlySharing = sharingGuest === guest.id;
              return (
                <div key={guest.id} className={`recipient-row ${isSent ? 'sent-row' : ''}`}>
                  <div style={{ fontSize: 12, color: 'var(--text-tertiary)', minWidth: 24, textAlign: 'center', fontWeight: 700 }}>{idx + 1}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{guest.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-secondary)', direction: 'ltr', textAlign: 'right' }}>{guest.phone || '—'}</div>
                  </div>
                  <StatusBadge status={guest.status} small />
                  {isSent ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--emerald-500)', fontSize: 13, fontWeight: 600 }}><Icon name="CheckCircle2" size={16} />נשלח</div>
                  ) : (
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button
                        className="wa-link-btn"
                        onClick={() => handleShare(guest)}
                        disabled={sharing || !imageReady || (!guest.phone && !shareSupported)}
                        style={{ opacity: (sharing && !isCurrentlySharing) ? 0.5 : 1 }}
                      >
                        {isCurrentlySharing
                          ? <><Icon name="Loader" size={14} style={{ animation: 'spin 1s linear infinite' }} /> שולח...</>
                          : <>{shareSupported ? '🖼️💬' : '💬'} שלח</>}
                      </button>
                      <button className="icon-btn" style={{ width: 32, height: 32, color: 'var(--emerald-500)' }} title="סמן כנשלח" onClick={() => onMarkSent(guest.id)}>
                        <Icon name="Check" size={16} />
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function MessagesPage({ event }) {
      const { client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const { limits, isPro } = useContext(PlanContext);

      const [guests, setGuests] = useState([]);
      const [rounds, setRounds] = useState([]);
      const [tables, setTables] = useState([]);
      const [activeRound, setActiveRound] = useState(null);
      const [loadingGuests, setLoadingGuests] = useState(true);
      const [upsellFeature, setUpsellFeature] = useState(null);

      // Compose state
      const [template, setTemplate] = useState('');
      const [channel, setChannel] = useState('whatsapp');
      const [recipientFilter, setRecipientFilter] = useState('all');
      const [sentSet, setSentSet] = useState(() => {
        // Restore sentSet from sessionStorage (survives app backgrounding on mobile)
        try {
          const saved = sessionStorage.getItem(`seatsync-sent-${event?.id}`);
          if (saved) return new Set(JSON.parse(saved));
        } catch {}
        return new Set();
      });
      const [saving, setSaving] = useState(false);
      const [selectedAction, setSelectedAction] = useState(null);
      // Send mode: 'text_only' | 'image_then_text'
      const [sendMode, setSendMode] = useState('text_only');

      // Persist sentSet to sessionStorage whenever it changes
      useEffect(() => {
        if (event?.id && sentSet.size > 0) {
          try { sessionStorage.setItem(`seatsync-sent-${event.id}`, JSON.stringify([...sentSet])); } catch {}
        }
      }, [sentSet, event?.id]);

      // Restore view state from sessionStorage (so returning from WhatsApp keeps the send screen)
      const [view, setView] = useState(() => {
        try {
          const savedView = sessionStorage.getItem(`seatsync-msg-view-${event?.id}`);
          if (savedView === 'send' || savedView === 'compose') return savedView;
        } catch {}
        return 'actions';
      });

      // Persist view to sessionStorage
      useEffect(() => {
        if (event?.id) {
          try { sessionStorage.setItem(`seatsync-msg-view-${event.id}`, view); } catch {}
        }
      }, [view, event?.id]);

      const templateRef = useRef(null);
      const invitationUrl = event?.settings?.invitation_url || '';

      // Restore template from session if available
      useEffect(() => {
        if (event?.id && !template) {
          try {
            const saved = sessionStorage.getItem(`seatsync-msg-tpl-${event.id}`);
            if (saved) setTemplate(saved);
          } catch {}
        }
      }, [event?.id]);

      // Persist template
      useEffect(() => {
        if (event?.id && template) {
          try { sessionStorage.setItem(`seatsync-msg-tpl-${event.id}`, template); } catch {}
        }
      }, [template, event?.id]);

      useEffect(() => {
        if (!client || !event?.id) return;
        client.from('guests').select('id,name,phone,status,confirmed_guests,group_name,rsvp_token,table_id')
          .eq('event_id', event.id)
          .then(({ data }) => { setGuests(data || []); setLoadingGuests(false); });
        client.from('message_rounds').select('*')
          .eq('event_id', event.id)
          .order('round_number', { ascending: false })
          .then(({ data }) => { setRounds(data || []); });
        client.from('tables').select('id,name')
          .eq('event_id', event.id)
          .then(({ data }) => { setTables(data || []); });
        // Auto-set send mode based on invitation
        if (event?.settings?.invitation_url) {
          setSendMode('image_then_text');
        }
      }, [client, event?.id]);

      const recipients = useMemo(() => {
        if (recipientFilter === 'all') return guests.filter(g => g.phone || g.rsvp_token);
        return guests.filter(g => {
          if (!g.phone && !g.rsvp_token) return false;
          return g.status === recipientFilter;
        });
      }, [guests, recipientFilter]);

      if (!event) return <NeedEventState />;

      const insertVariable = (v) => {
        const el = templateRef.current;
        if (!el) return;
        const start = el.selectionStart;
        const end = el.selectionEnd;
        const newVal = template.slice(0, start) + v + template.slice(end);
        setTemplate(newVal);
        setTimeout(() => { el.focus(); el.setSelectionRange(start + v.length, start + v.length); }, 10);
      };

      const previewMessage = (guest) => buildMessage(template, guest, event, tables);

      const saveRound = async () => {
        if (!template.trim()) return;
        setSaving(true);
        const roundNum = (rounds[0]?.round_number || 0) + 1;
        // DB CHECK constraint allows: all, pending, maybe, declined, custom
        // Map 'confirmed' to 'custom' for storage (we track real filter in local state)
        const dbFilter = recipientFilter === 'confirmed' ? 'custom' : recipientFilter;
        const { data, error } = await client.from('message_rounds').insert({
          event_id: event.id,
          round_number: roundNum,
          message_template: template,
          channel,
          target_filter: dbFilter,
          total_sent: 0,
        }).select().single();
        if (!error && data) {
          setRounds(prev => [data, ...prev]);
          setActiveRound(data);
          setView('send');
          setSentSet(new Set());
          addToast(`סבב ${roundNum} נשמר ✓`, 'success');
        } else {
          console.error('saveRound error:', error);
          addToast('שגיאה בשמירת הסבב: ' + (error?.message || 'שגיאה לא ידועה'), 'error');
        }
        setSaving(false);
      };

      const markSent = async (guestId) => {
        setSentSet(s => new Set([...s, guestId]));
        if (activeRound) {
          await client.from('message_rounds')
            .update({ total_sent: (activeRound.total_sent || 0) + 1 })
            .eq('id', activeRound.id);
        }
        await client.from('messages').insert({
          event_id: event.id,
          guest_id: guestId,
          round_id: activeRound?.id || null,
          channel,
          message_text: template,
          status: 'sent',
        }).select();
      };

      const markAllSent = () => {
        setSentSet(new Set(recipients.map(g => g.id)));
        addToast(`סומנו ${recipients.length} הודעות כנשלחו ✓`, 'success');
      };

      const sentCount = recipients.filter(g => sentSet.has(g.id)).length;
      const sendProgress = recipients.length > 0 ? Math.round((sentCount / recipients.length) * 100) : 0;

      const VARIABLES = ['{שם}', '{תאריך}', '{מקום}', '{לינק_rsvp}', '{שם_אירוע}', '{שולחן}'];
      const FILTER_OPTIONS = [
        { key: 'all',      label: 'כולם',       count: guests.filter(g => g.phone || g.rsvp_token).length },
        { key: 'pending',  label: 'ממתינים',    count: guests.filter(g => g.status === 'pending').length },
        { key: 'maybe',    label: 'אולי',        count: guests.filter(g => g.status === 'maybe').length },
        { key: 'declined', label: 'לא מגיעים',  count: guests.filter(g => g.status === 'declined').length },
        { key: 'confirmed',label: 'מגיעים',     count: guests.filter(g => g.status === 'confirmed').length },
      ];

      const handleQuickAction = (action) => {
        setSelectedAction(action);
        setSentSet(new Set());
        switch (action) {
          case 'invite':
            setTemplate(DEFAULT_TEMPLATES[event.event_type] || DEFAULT_TEMPLATES.wedding);
            setRecipientFilter('all');
            setSendMode(invitationUrl ? 'image_then_text' : 'text_only');
            break;
          case 'reminder':
            setTemplate(DEFAULT_TEMPLATES.reminder);
            setRecipientFilter('pending');
            setSendMode('text_only');
            break;
          case 'reminder_table':
            setTemplate(DEFAULT_TEMPLATES.reminder_table);
            setRecipientFilter('confirmed');
            setSendMode('text_only');
            break;
          case 'thank_you':
            setTemplate(DEFAULT_TEMPLATES.thank_you);
            setRecipientFilter('confirmed');
            setSendMode('text_only');
            break;
          case 'custom':
            setTemplate('');
            setRecipientFilter('all');
            setSendMode('text_only');
            break;
        }
        setChannel('whatsapp');
        setView('compose');
      };

      const QUICK_ACTIONS = [
        { key: 'invite', icon: '🎉', label: 'שלח הזמנות', sub: invitationUrl ? 'תמונה + הודעה' : 'לכל המוזמנים', bg: 'rgba(37,211,102,0.1)' },
        { key: 'reminder', icon: '🔔', label: 'תזכורת', sub: 'למי שלא אישר', bg: 'rgba(59,130,246,0.1)' },
        { key: 'reminder_table', icon: '🪑', label: 'תזכורת+שולחן', sub: 'למגיעים עם שולחן', bg: 'rgba(245,158,11,0.1)' },
        { key: 'thank_you', icon: '💕', label: 'תודה', sub: 'לכל מי שהגיע', bg: 'rgba(244,114,182,0.1)' },
      ];

      return (
        <div className="animate-slide-up">
          <div className="page-header" style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
            <div>
              <div className="page-title">הודעות</div>
              <div className="page-subtitle">שליחת הזמנות, תזכורות ותודות</div>
            </div>
            <div className="view-mode-tabs">
              {[
                { v: 'actions', icon: 'Zap', label: 'פעולות' },
                { v: 'compose', icon: 'PenLine', label: 'עריכה' },
                { v: 'send', icon: 'Send', label: 'שליחה' },
                { v: 'history', icon: 'History', label: 'היסטוריה' },
              ].map(m => (
                <button key={m.v} className={`view-mode-btn ${view === m.v ? 'active' : ''}`} onClick={() => setView(m.v)}>
                  <Icon name={m.icon} size={14} />{m.label}
                </button>
              ))}
            </div>
          </div>

          {/* ── QUICK ACTIONS VIEW ── */}
          {view === 'actions' && (
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 14 }}>מה תרצו לשלוח?</div>
              <div className="quick-actions-grid">
                {QUICK_ACTIONS.map(a => (
                  <div key={a.key} className="quick-action-card" onClick={() => handleQuickAction(a.key)}>
                    <div className="quick-action-icon" style={{ background: a.bg }}>{a.icon}</div>
                    <div className="quick-action-label">{a.label}</div>
                    <div className="quick-action-sub">{a.sub}</div>
                  </div>
                ))}
              </div>

              <div className="card" style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }} onClick={() => handleQuickAction('custom')}>
                <div style={{ width: 44, height: 44, borderRadius: 'var(--radius-md)', background: 'var(--bg-tertiary)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <Icon name="PenLine" size={20} style={{ color: 'var(--accent)' }} />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 14 }}>הודעה מותאמת אישית</div>
                  <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>כתבו תבנית חופשית ובחרו נמענים</div>
                </div>
                <Icon name="ChevronLeft" size={18} style={{ color: 'var(--text-tertiary)' }} />
              </div>

              {rounds.length > 0 && (
                <div style={{ marginTop: 20 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>סבבים קודמים</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {rounds.slice(0, 3).map(r => (
                      <div key={r.id} className="card" style={{ padding: 14 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div style={{ width: 32, height: 32, borderRadius: 'var(--radius-sm)', background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13, color: 'var(--accent)' }}>{r.round_number}</div>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: 13 }}>סבב {r.round_number}</div>
                              <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>{new Date(r.sent_at).toLocaleDateString('he-IL')} · {r.total_sent || 0} נשלחו</div>
                            </div>
                          </div>
                          <button className="btn btn-secondary" style={{ fontSize: 12, padding: '6px 12px' }} onClick={() => { setActiveRound(r); setTemplate(r.message_template); setChannel(r.channel || 'whatsapp'); setRecipientFilter(r.target_filter || 'all'); setView('send'); setSentSet(new Set()); }}>
                            <Icon name="RotateCw" size={14} />שלח שוב
                          </button>
                        </div>
                      </div>
                    ))}
                    {rounds.length > 3 && <button className="btn btn-ghost" style={{ fontSize: 13 }} onClick={() => setView('history')}>הצג הכל →</button>}
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Round tabs — compose/send views */}
          {(view === 'compose' || view === 'send') && (
            <div className="round-tabs">
              <button className={`round-tab ${activeRound === null ? 'active' : ''}`} onClick={() => { if (!isPro && rounds.length >= limits.messageRounds) { setUpsellFeature('messageRounds'); return; } setActiveRound(null); setView('compose'); }}>
                <Icon name="Plus" size={14} />סבב חדש
                {!isPro && rounds.length >= limits.messageRounds && <ProBadge style={{ marginRight: 4 }} />}
              </button>
              {rounds.map(r => (
                <button key={r.id} className={`round-tab ${activeRound?.id === r.id ? 'active' : ''}`} onClick={() => { setActiveRound(r); setView('send'); setTemplate(r.message_template); setChannel(r.channel || 'whatsapp'); setRecipientFilter(r.target_filter || 'all'); setSentSet(new Set()); }}>
                  <Icon name="MessageSquare" size={13} />סבב {r.round_number} <span style={{ fontSize: 11, opacity: 0.8 }}>({r.total_sent || 0})</span>
                </button>
              ))}
            </div>
          )}

          {(view === 'compose' || view === 'send') && !isPro && rounds.length >= limits.messageRounds && activeRound !== null && (
            <div className="plan-limit-bar">
              <Icon name="Info" size={16} style={{ color: 'var(--gold-600)', flexShrink: 0 }} />
              <span style={{ flex: 1 }}>תוכנית Free מאפשרת סבב הודעות אחד בלבד</span>
              <button className="btn btn-primary" style={{ padding: '4px 12px', fontSize: 12 }} onClick={() => setUpsellFeature('messageRounds')}><Icon name="Zap" size={13} />שדרוג</button>
            </div>
          )}

          {/* ── COMPOSE VIEW ── */}
          {view === 'compose' && (
            <div style={{ display: 'grid', gap: 16 }}>
              {selectedAction && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <button className="btn btn-ghost" style={{ padding: '6px 10px', fontSize: 13 }} onClick={() => { setView('actions'); setSelectedAction(null); }}>
                    <Icon name="ArrowRight" size={16} />חזרה
                  </button>
                  <span style={{ fontSize: 13, color: 'var(--text-secondary)' }}>
                    {selectedAction === 'invite' && '🎉 שליחת הזמנות'}
                    {selectedAction === 'reminder' && '🔔 שליחת תזכורת'}
                    {selectedAction === 'reminder_table' && '🪑 תזכורת + שולחן'}
                    {selectedAction === 'thank_you' && '💕 הודעת תודה'}
                    {selectedAction === 'custom' && '✏️ הודעה מותאמת'}
                  </span>
                </div>
              )}

              {/* Send mode — image first? */}
              {invitationUrl && (
                <div className="card">
                  <div className="card-title" style={{ marginBottom: 12 }}>מצב שליחה</div>
                  <div className="send-mode-grid">
                    <div className={`send-mode-btn ${sendMode === 'image_then_text' ? 'active' : ''}`} onClick={() => setSendMode('image_then_text')}>
                      <span style={{ fontSize: 20 }}>🖼️ → 💬</span>
                      <span style={{ fontWeight: 700 }}>קודם הזמנה, אח"כ הודעה</span>
                      <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 400 }}>שלחו תמונת ההזמנה + אח"כ הודעה עם לינק RSVP</span>
                    </div>
                    <div className={`send-mode-btn ${sendMode === 'text_only' ? 'active' : ''}`} onClick={() => setSendMode('text_only')}>
                      <span style={{ fontSize: 20 }}>💬</span>
                      <span style={{ fontWeight: 700 }}>הודעה בלבד</span>
                      <span style={{ fontSize: 11, color: 'var(--text-tertiary)', fontWeight: 400 }}>ההזמנה תוצג בדף ה-RSVP</span>
                    </div>
                  </div>
                </div>
              )}

              {/* Channel */}
              <div className="card">
                <div className="card-title" style={{ marginBottom: 12 }}>ערוץ שליחה</div>
                <div style={{ display: 'flex', gap: 10 }}>
                  <button className={`channel-btn ${channel === 'whatsapp' ? 'active-wa' : ''}`} onClick={() => setChannel('whatsapp')}>
                    <span style={{ fontSize: 22 }}>💬</span><span>WhatsApp</span><span style={{ fontSize: 11, opacity: 0.7 }}>חינמי</span>
                  </button>
                  <button className={`channel-btn ${channel === 'rsvp' ? 'active-rsvp' : ''}`} onClick={() => { if (!isPro) { setUpsellFeature('rsvpLink'); return; } setChannel('rsvp'); }} style={!isPro ? { opacity: 0.7 } : {}}>
                    <Icon name="Link" size={20} /><span>RSVP Link</span>{isPro ? <span style={{ fontSize: 11, opacity: 0.7 }}>ללא הודעה</span> : <ProBadge />}
                  </button>
                </div>
              </div>

              {/* Recipient filter */}
              <div className="card">
                <div className="card-title" style={{ marginBottom: 12 }}>נמענים</div>
                <div className="filter-chips">
                  {FILTER_OPTIONS.map(f => (
                    <button key={f.key} className={`filter-chip ${recipientFilter === f.key ? 'active' : ''}`} onClick={() => setRecipientFilter(f.key)}>{f.label} ({f.count})</button>
                  ))}
                </div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginTop: 8 }}>
                  <Icon name="Users" size={14} style={{ display: 'inline', marginLeft: 4 }} />{recipients.length} נמענים נבחרו
                </div>
              </div>

              {/* Template */}
              <div className="card">
                <div className="card-title" style={{ marginBottom: 12 }}>תבנית הודעה</div>
                <div style={{ display: 'flex', gap: 6, marginBottom: 10, flexWrap: 'wrap' }}>
                  {[
                    { key: 'wedding', label: '💒 חתונה' },
                    { key: 'brit_mila', label: '👶 ברית' },
                    { key: 'reminder', label: '🔔 תזכורת' },
                    { key: 'reminder_table', label: '🪑 תזכורת+שולחן' },
                    { key: 'thank_you', label: '💕 תודה' },
                    { key: 'corporate', label: '🏢 עסקי' },
                  ].map(t => (
                    <button key={t.key} className="btn btn-secondary" style={{ padding: '5px 12px', fontSize: 12 }} onClick={() => setTemplate(DEFAULT_TEMPLATES[t.key])}>{t.label}</button>
                  ))}
                </div>
                <textarea ref={templateRef} className="template-textarea" value={template} onChange={e => setTemplate(e.target.value)} placeholder="כתבו את תבנית ההודעה כאן..." />
                <div className="variable-chips">
                  <span style={{ fontSize: 12, color: 'var(--text-tertiary)', marginLeft: 4 }}>הוסף משתנה:</span>
                  {VARIABLES.map(v => (
                    <button key={v} className="variable-chip" onClick={() => insertVariable(v)}>{v}</button>
                  ))}
                </div>
              </div>

              {/* Preview */}
              {template && guests.length > 0 && (
                <div className="card">
                  <div className="card-title" style={{ marginBottom: 12 }}>תצוגה מקדימה</div>
                  {sendMode === 'image_then_text' && invitationUrl && (
                    <div style={{ marginBottom: 12, padding: 12, background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-sm)', textAlign: 'center' }}>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8 }}>שלב 1 — תמונת ההזמנה:</div>
                      <img src={invitationUrl} alt="הזמנה" style={{ maxWidth: '100%', maxHeight: 200, borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-default)', objectFit: 'contain' }} />
                      <div style={{ fontSize: 11, color: 'var(--text-tertiary)', marginTop: 6 }}>↓ שלב 2 — ההודעה:</div>
                    </div>
                  )}
                  <div className="message-preview-box">
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.8)', marginBottom: 8 }}>הודעה לדוגמה עבור: {guests[0]?.name}</div>
                    <div className="message-bubble">{previewMessage(guests[0])}</div>
                    <div className="message-bubble-time">עכשיו ✓✓</div>
                  </div>
                </div>
              )}

              <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
                <button className="btn btn-ghost" onClick={() => setTemplate('')}>נקה</button>
                <button className="btn btn-primary" onClick={saveRound} disabled={saving || !template.trim()}>
                  <Icon name="ArrowLeft" size={18} />{saving ? 'שומר...' : `המשך לשליחה (${recipients.length})`}
                </button>
              </div>
            </div>
          )}

          {/* ── SEND VIEW ── */}
          {view === 'send' && (
            <div>
              {/* When invitation image exists and sendMode is image_then_text: use ImageShareStep */}
              {sendMode === 'image_then_text' && invitationUrl && (
                <ImageShareStep
                  invitationUrl={invitationUrl}
                  recipients={recipients}
                  sentSet={sentSet}
                  sentCount={sentCount}
                  onMarkSent={markSent}
                  onMarkAllSent={markAllSent}
                  addToast={addToast}
                  event={event}
                  tables={tables}
                  template={template}
                />
              )}

              {/* Text-only mode — regular wa.me flow */}
              {(sendMode === 'text_only' || !invitationUrl) && (
                <div>
                  {/* Sticky progress header */}
                  <div style={{ position: 'sticky', top: 0, zIndex: 10, background: 'var(--bg-primary)', paddingBottom: 8 }}>
                    <div className="round-summary-card" style={{ marginBottom: 8 }}>
                      <div className="round-stat">
                        <div className="round-stat-value" style={{ color: 'var(--accent)' }}>{recipients.length}</div>
                        <div className="round-stat-label">נמענים</div>
                      </div>
                      <div className="round-stat">
                        <div className="round-stat-value" style={{ color: '#25D366' }}>{sentCount}</div>
                        <div className="round-stat-label">נשלחו</div>
                      </div>
                      <div className="round-stat">
                        <div className="round-stat-value" style={{ color: 'var(--text-secondary)' }}>{recipients.length - sentCount}</div>
                        <div className="round-stat-label">נותרו</div>
                      </div>
                      <div style={{ flex: 1, minWidth: 120 }}>
                        <div className="send-progress"><div className="send-progress-bar" style={{ width: `${sendProgress}%` }} /></div>
                        <div style={{ fontSize: 12, color: 'var(--text-secondary)', textAlign: 'center' }}>{sendProgress}% הושלם</div>
                      </div>
                    </div>
                    <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                      <button className="btn btn-secondary" style={{ fontSize: 12, padding: '6px 14px' }} onClick={markAllSent}>סמן הכל כנשלח</button>
                      {sentCount > 0 && (
                        <button className="btn btn-ghost" style={{ fontSize: 12, padding: '6px 14px' }} onClick={() => { setSentSet(new Set()); if (event?.id) try { sessionStorage.removeItem(`seatsync-sent-${event.id}`); } catch {} addToast('התקדמות אופסה', 'success'); }}>
                          <Icon name="RotateCcw" size={14} /> אפס התקדמות
                        </button>
                      )}
                    </div>
                    {sendProgress === 100 && (
                      <div style={{ marginTop: 8, padding: '10px 14px', background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.25)', borderRadius: 'var(--radius-sm)', display: 'flex', alignItems: 'center', gap: 10 }}>
                        <Icon name="PartyPopper" size={20} style={{ color: 'var(--emerald-500)' }} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, fontSize: 14, color: 'var(--emerald-500)' }}>כל ההודעות נשלחו! 🎉</div>
                          <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>נשלחו {sentCount} הודעות בסבב הזה</div>
                        </div>
                        <button className="btn btn-primary" style={{ fontSize: 12, padding: '6px 14px' }} onClick={() => { setView('actions'); if (event?.id) try { sessionStorage.removeItem(`seatsync-sent-${event.id}`); sessionStorage.removeItem(`seatsync-msg-view-${event.id}`); } catch {} }}>
                          סיים
                        </button>
                      </div>
                    )}
                  </div>

                  {channel === 'whatsapp' && (
                    <div style={{ padding: '10px 14px', background: 'rgba(37,211,102,0.08)', border: '1px solid rgba(37,211,102,0.2)', borderRadius: 'var(--radius-sm)', fontSize: 13, color: '#128C7E', marginBottom: 14, display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                      <span style={{ fontSize: 18, lineHeight: 1 }}>💡</span>
                      <div>לחצו על <strong>"שלח"</strong> ליד כל אורח — WhatsApp ייפתח עם ההודעה מוכנה. אחרי השליחה חזרו לכאן — ההתקדמות נשמרת.</div>
                    </div>
                  )}

                  {channel === 'whatsapp' && recipients.length > 0 && sentCount < recipients.length && (
                    <div style={{ marginBottom: 14 }}>
                      <BulkWhatsAppSender
                        recipients={recipients.filter(g => !sentSet.has(g.id) && g.phone)}
                        buildLink={(guest) => buildWALink(guest.phone, previewMessage(guest))}
                        onSent={(guestId) => markSent(guestId)}
                        onAllDone={() => addToast('כל ההודעות נפתחו ב-WhatsApp! ✓', 'success')}
                      />
                    </div>
                  )}

                  <div className="filter-chips" style={{ marginBottom: 12 }}>
                    {FILTER_OPTIONS.map(f => (
                      <button key={f.key} className={`filter-chip ${recipientFilter === f.key ? 'active' : ''}`} onClick={() => setRecipientFilter(f.key)}>{f.label} ({f.count})</button>
                    ))}
                  </div>

                  {loadingGuests ? (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>{[1,2,3,4].map(i => <div key={i} className="skeleton" style={{ height: 56 }} />)}</div>
                  ) : recipients.length === 0 ? (
                    <div className="empty-state" style={{ padding: 40 }}>
                      <div className="empty-state-icon"><Icon name="UserX" size={32} /></div>
                      <div className="empty-state-title">אין נמענים</div>
                      <div className="empty-state-text">שנו את הפילטר או הוסיפו מוזמנים עם מספר טלפון</div>
                    </div>
                  ) : (
                    <div className="recipient-list">
                      {/* Sort: unsent first, then sent */}
                      {[...recipients].sort((a, b) => {
                        const aSent = sentSet.has(a.id) ? 1 : 0;
                        const bSent = sentSet.has(b.id) ? 1 : 0;
                        return aSent - bSent;
                      }).map((guest, idx) => {
                        const isSent = sentSet.has(guest.id);
                        const msg = previewMessage(guest);
                        const waLink = buildWALink(guest.phone, msg);
                        return (
                          <div key={guest.id} className={`recipient-row ${isSent ? 'sent-row' : ''}`}>
                            <div style={{ fontSize: 12, color: isSent ? 'var(--emerald-500)' : 'var(--text-tertiary)', minWidth: 24, textAlign: 'center', fontWeight: 700 }}>{isSent ? '✓' : idx + 1}</div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontWeight: 600, fontSize: 14 }}>{guest.name}</div>
                              <div style={{ fontSize: 12, color: 'var(--text-secondary)', direction: 'ltr', textAlign: 'right' }}>{guest.phone || '—'}</div>
                            </div>
                            <StatusBadge status={guest.status} small />
                            {isSent ? (
                              <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--emerald-500)', fontSize: 13, fontWeight: 600 }}><Icon name="CheckCircle2" size={16} />נשלח</div>
                            ) : (
                              <div style={{ display: 'flex', gap: 6 }}>
                                {channel === 'whatsapp' && guest.phone && (
                                  <a href={waLink} target="_blank" rel="noopener noreferrer" className="wa-link-btn" onClick={() => setTimeout(() => markSent(guest.id), 1500)}>💬 שלח</a>
                                )}
                                {channel === 'rsvp' && guest.rsvp_token && (
                                  <button className="btn btn-secondary" style={{ padding: '5px 12px', fontSize: 12 }} onClick={() => { navigator.clipboard?.writeText(`https://avivmed3-tech.github.io/SeatSync/rsvp.html?token=${guest.rsvp_token}`); markSent(guest.id); addToast('לינק הועתק ✓', 'success'); }}>
                                    <Icon name="Copy" size={14} />העתק לינק
                                  </button>
                                )}
                                <button className="icon-btn" style={{ width: 32, height: 32, color: 'var(--emerald-500)' }} title="סמן כנשלח" onClick={() => markSent(guest.id)}><Icon name="Check" size={16} /></button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

            </div>
          )}

          {/* ── HISTORY VIEW ── */}
          {view === 'history' && (
            <div>
              {rounds.length === 0 ? (
                <div className="empty-state" style={{ padding: 40 }}>
                  <div className="empty-state-icon"><Icon name="History" size={32} /></div>
                  <div className="empty-state-title">אין היסטוריה</div>
                  <div className="empty-state-text">לאחר שתשלחו סבב הודעות, הוא יופיע כאן</div>
                </div>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {rounds.map(r => (
                    <div key={r.id} className="card">
                      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <div style={{ width: 36, height: 36, borderRadius: 'var(--radius-sm)', background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, color: 'var(--accent)' }}>
                            {r.round_number}
                          </div>
                          <div>
                            <div style={{ fontWeight: 700 }}>סבב {r.round_number}</div>
                            <div style={{ fontSize: 12, color: 'var(--text-tertiary)' }}>
                              {new Date(r.sent_at).toLocaleDateString('he-IL')} · {r.channel === 'whatsapp' ? '💬 WhatsApp' : '🔗 RSVP Link'}
                            </div>
                          </div>
                        </div>
                        <button
                          className="btn btn-secondary"
                          style={{ fontSize: 12, padding: '6px 12px' }}
                          onClick={() => { setActiveRound(r); setTemplate(r.message_template); setChannel(r.channel || 'whatsapp'); setRecipientFilter(r.target_filter || 'all'); setView('send'); }}
                        >
                          <Icon name="RotateCw" size={14} />
                          שלח שוב
                        </button>
                      </div>
                      <div style={{ display: 'flex', gap: 20 }}>
                        <div className="round-stat">
                          <div className="round-stat-value" style={{ color: 'var(--accent)' }}>{r.total_sent || 0}</div>
                          <div className="round-stat-label">נשלחו</div>
                        </div>
                        <div className="round-stat">
                          <div className="round-stat-value" style={{ color: 'var(--blue-500)' }}>{({ all: guests.length, pending: guests.filter(g => g.status === 'pending').length, maybe: guests.filter(g => g.status === 'maybe').length, declined: guests.filter(g => g.status === 'declined').length, confirmed: guests.filter(g => g.status === 'confirmed').length })[r.target_filter] || '—'}</div>
                          <div className="round-stat-label">קהל יעד</div>
                        </div>
                      </div>
                      <div style={{ marginTop: 12, padding: '10px 12px', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-sm)', fontSize: 13, color: 'var(--text-secondary)', whiteSpace: 'pre-line', maxHeight: 100, overflow: 'hidden', position: 'relative' }}>
                        {r.message_template}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {upsellFeature && <UpsellModal feature={upsellFeature} onClose={() => setUpsellFeature(null)} />}
        </div>
      );
    }

    // ============================================
    // Phase 4 — Table SVG Shapes
    // ============================================
    function TableShape({ type, seats, size = 54 }) {
      if (type === 'round') {
        return (
          <svg width={size} height={size} viewBox="0 0 54 54">
            <circle cx="27" cy="27" r="22" fill="#C4A46B" stroke="#8B7355" strokeWidth="2"/>
            <text x="27" y="31" textAnchor="middle" fontSize="10" fill="white" fontWeight="700" fontFamily="Heebo">{seats}p</text>
          </svg>
        );
      }
      if (type === 'rectangle') {
        return (
          <svg width={size * 1.6} height={size * 0.7} viewBox={`0 0 ${size*1.6} ${size*0.7}`}>
            <rect x="2" y="2" width={size*1.6-4} height={size*0.7-4} rx="6" fill="#C4A46B" stroke="#8B7355" strokeWidth="2"/>
            <text x={size*0.8} y={size*0.37} textAnchor="middle" fontSize="10" fill="white" fontWeight="700" fontFamily="Heebo">{seats}p</text>
          </svg>
        );
      }
      // square
      return (
        <svg width={size} height={size} viewBox="0 0 54 54">
          <rect x="3" y="3" width="48" height="48" rx="6" fill="#C4A46B" stroke="#8B7355" strokeWidth="2"/>
          <text x="27" y="31" textAnchor="middle" fontSize="10" fill="white" fontWeight="700" fontFamily="Heebo">{seats}p</text>
        </svg>
      );
    }

    // Floor plan SVG table node (draggable on canvas)
    function FloorTable({ table, guests, onDragTable, onTouchTable, selected, onClick, locked }) {
      const tGuests = guests.filter(g => g.table_id === table.id);
      const occupied = tGuests.reduce((s,g) => s + (g.confirmed_guests || 1), 0);
      const isFull = occupied >= table.seats;
      const isRect = table.table_type === 'rectangle';
      const isSq = table.table_type === 'square';
      const w = isRect ? 120 : 80;
      const h = isRect ? 52 : 80;
      const color = isFull ? '#EF4444' : occupied > 0 ? '#10B981' : '#94A3B8';
      const rotation = table.rotation || 0;

      // Theme-aware colors
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const tableFill = isDark ? '#B8963A' : '#C4A46B';
      const tableStroke = isDark ? '#8B7355' : '#8B7355';
      const outerFill = selected ? (isDark ? '#3D3520' : '#FFF8E1') : (isDark ? '#2a2a2a' : '#FAFAFA');
      const outerStroke = selected ? '#F5C518' : (isDark ? 'rgba(255,255,255,0.12)' : '#CBD5E1');
      const emptyChair = isDark ? '#3a3a3a' : '#E2E8F0';
      const chairStroke = isDark ? 'rgba(255,255,255,0.15)' : 'white';

      // Generate chair positions for rectangle tables
      const getRectChairs = () => {
        const chairs = [];
        const maxSeats = Math.min(table.seats, 16);
        const longSide = Math.ceil(maxSeats / 2);
        const halfW = w / 2 + 14;
        const halfH = h / 2;
        // Top side
        for (let i = 0; i < longSide; i++) {
          const xPos = -w/2 + (w / (longSide + 1)) * (i + 1);
          chairs.push({ x: xPos, y: -halfH - 12 });
        }
        // Bottom side
        const bottomCount = maxSeats - longSide;
        for (let i = 0; i < bottomCount; i++) {
          const xPos = -w/2 + (w / (bottomCount + 1)) * (i + 1);
          chairs.push({ x: xPos, y: halfH + 12 });
        }
        return chairs;
      };

      // Generate chair positions for square tables
      const getSquareChairs = () => {
        const chairs = [];
        const maxSeats = Math.min(table.seats, 16);
        const perSide = Math.ceil(maxSeats / 4);
        const half = 40 + 14;
        const sides = [
          { axis: 'x', fixed: 'y', fixedVal: -half, range: [-36, 36] },  // top
          { axis: 'x', fixed: 'y', fixedVal: half, range: [-36, 36] },   // bottom
          { axis: 'y', fixed: 'x', fixedVal: -half, range: [-36, 36] },  // left
          { axis: 'y', fixed: 'x', fixedVal: half, range: [-36, 36] },   // right
        ];
        let placed = 0;
        for (let s = 0; s < 4 && placed < maxSeats; s++) {
          const side = sides[s];
          const count = Math.min(perSide, maxSeats - placed);
          for (let i = 0; i < count; i++) {
            const pos = side.range[0] + ((side.range[1] - side.range[0]) / (count + 1)) * (i + 1);
            if (side.axis === 'x') {
              chairs.push({ x: pos, y: side.fixedVal });
            } else {
              chairs.push({ x: side.fixedVal, y: pos });
            }
            placed++;
          }
        }
        return chairs;
      };

      return (
        <g
          transform={`translate(${table.position_x || 80}, ${table.position_y || 80}) rotate(${rotation})`}
          style={{ cursor: locked ? 'default' : 'grab', userSelect: 'none' }}
          onMouseDown={e => { if (locked) return; e.stopPropagation(); onDragTable(table, e); }}
          onTouchStart={e => { if (locked || !onTouchTable) return; e.stopPropagation(); onTouchTable(table, e); }}
          onClick={() => onClick(table)}
        >
          {/* Drop shadow */}
          {selected && <circle r="48" fill="none" stroke="#F5C518" strokeWidth="1" opacity="0.3" strokeDasharray="4 3" style={{ display: table.table_type === 'round' ? 'block' : 'none' }} />}
          {table.table_type === 'round' ? (
            <>
              <circle r="38" fill={outerFill} stroke={outerStroke} strokeWidth={selected ? 2.5 : 1.5}/>
              <circle r="26" fill={tableFill} stroke={tableStroke} strokeWidth="2"/>
              <text y="2" textAnchor="middle" fontSize="9" fill="white" fontWeight="700" fontFamily="Heebo">{table.name}</text>
              <text y="13" textAnchor="middle" fontSize="7.5" fill="rgba(255,255,255,0.8)" fontFamily="Heebo">{occupied}/{table.seats}</text>
              {Array.from({ length: Math.min(table.seats, 12) }).map((_, i) => {
                const angle = (i / Math.min(table.seats, 12)) * Math.PI * 2 - Math.PI/2;
                const cr = 34;
                const cx2 = Math.cos(angle) * cr; const cy2 = Math.sin(angle) * cr;
                const g = tGuests[i];
                return <circle key={i} cx={cx2} cy={cy2} r="6" fill={g ? getGroupColor(g.group_name) : emptyChair} stroke={chairStroke} strokeWidth="1.2"/>;
              })}
            </>
          ) : isRect ? (
            <>
              {selected && <rect x={-w/2-12} y={-h/2-22} width={w+24} height={h+44} rx="14" fill="none" stroke="#F5C518" strokeWidth="1" opacity="0.3" strokeDasharray="4 3"/>}
              <rect x={-w/2-8} y={-h/2-8} width={w+16} height={h+16} rx="10" fill={outerFill} stroke={outerStroke} strokeWidth={selected ? 2.5 : 1.5}/>
              <rect x={-w/2} y={-h/2} width={w} height={h} rx="6" fill={tableFill} stroke={tableStroke} strokeWidth="2"/>
              <text y="2" textAnchor="middle" fontSize="9" fill="white" fontWeight="700" fontFamily="Heebo">{table.name}</text>
              <text y="13" textAnchor="middle" fontSize="7.5" fill="rgba(255,255,255,0.8)" fontFamily="Heebo">{occupied}/{table.seats}</text>
              {getRectChairs().map((chair, i) => {
                const g = tGuests[i];
                return <circle key={i} cx={chair.x} cy={chair.y} r="6" fill={g ? getGroupColor(g.group_name) : emptyChair} stroke={chairStroke} strokeWidth="1.2"/>;
              })}
            </>
          ) : (
            <>
              {selected && <rect x={-48-6} y={-48-6} width={108} height={108} rx="14" fill="none" stroke="#F5C518" strokeWidth="1" opacity="0.3" strokeDasharray="4 3"/>}
              <rect x={-48} y={-48} width="96" height="96" rx="10" fill={outerFill} stroke={outerStroke} strokeWidth={selected ? 2.5 : 1.5}/>
              <rect x={-36} y={-36} width="72" height="72" rx="6" fill={tableFill} stroke={tableStroke} strokeWidth="2"/>
              <text y="2" textAnchor="middle" fontSize="9" fill="white" fontWeight="700" fontFamily="Heebo">{table.name}</text>
              <text y="13" textAnchor="middle" fontSize="7.5" fill="rgba(255,255,255,0.8)" fontFamily="Heebo">{occupied}/{table.seats}</text>
              {getSquareChairs().map((chair, i) => {
                const g = tGuests[i];
                return <circle key={i} cx={chair.x} cy={chair.y} r="6" fill={g ? getGroupColor(g.group_name) : emptyChair} stroke={chairStroke} strokeWidth="1.2"/>;
              })}
            </>
          )}
          {/* Status dot */}
          <circle cx={30} cy={-30} r="8" fill={color} stroke={isDark ? '#2a2a2a' : 'white'} strokeWidth="1.5" style={{ display: occupied > 0 ? 'block' : 'none' }}/>
          {/* Per-table lock indicator */}
          {locked && !selected && (
            <g transform="translate(-30, -30)">
              <circle r="7" fill={isDark ? '#444' : '#F1F5F9'} stroke={isDark ? '#666' : '#94A3B8'} strokeWidth="1"/>
              <text textAnchor="middle" y="3.5" fontSize="8" fill={isDark ? '#aaa' : '#64748B'}>🔒</text>
            </g>
          )}
        </g>
      );
    }
