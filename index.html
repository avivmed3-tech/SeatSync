<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0A0E1A" />
  <meta name="description" content="SeatSync — ניהול אישורי הגעה וסידורי הושבה לאירועים" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <title>SeatSync — ניהול אירועים</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- React + Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.396.0/dist/umd/lucide.min.js"></script>

  <!-- SheetJS for Excel import/export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- jsPDF + html2canvas for PDF export -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    /* ============================================
       SeatSync Design System
       ============================================ */

    :root {
      /* Brand Colors */
      --gold-50: #FFF9E6;
      --gold-100: #FFF0BF;
      --gold-200: #FFE080;
      --gold-300: #FFD040;
      --gold-400: #F5C518;
      --gold-500: #D4A808;
      --gold-600: #B38D06;
      --gold-700: #8A6D05;

      /* Neutrals */
      --slate-50: #F8FAFC;
      --slate-100: #F1F5F9;
      --slate-200: #E2E8F0;
      --slate-300: #CBD5E1;
      --slate-400: #94A3B8;
      --slate-500: #64748B;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1E293B;
      --slate-900: #0F172A;
      --slate-950: #0A0E1A;

      /* Status Colors */
      --emerald-400: #34D399;
      --emerald-500: #10B981;
      --emerald-600: #059669;
      --red-400: #F87171;
      --red-500: #EF4444;
      --amber-400: #FBBF24;
      --amber-500: #F59E0B;
      --blue-400: #60A5FA;
      --blue-500: #3B82F6;

      /* Semantic — Light Mode defaults */
      --bg-primary: #FAFAF8;
      --bg-secondary: #FFFFFF;
      --bg-tertiary: #F3F1EE;
      --bg-elevated: #FFFFFF;
      --bg-hover: rgba(0, 0, 0, 0.03);
      --bg-active: rgba(0, 0, 0, 0.06);
      --bg-overlay: rgba(0, 0, 0, 0.4);

      --text-primary: #1A1A1A;
      --text-secondary: #5C5C5C;
      --text-tertiary: #8C8C8C;
      --text-inverse: #FFFFFF;
      --text-brand: var(--gold-600);

      --border-default: #E5E2DC;
      --border-light: #F0EDE8;
      --border-focus: var(--gold-400);

      --accent: var(--gold-500);
      --accent-hover: var(--gold-600);
      --accent-light: var(--gold-50);
      --accent-text: #1A1A1A;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
      --shadow-xl: 0 20px 60px rgba(0,0,0,0.1);

      /* Spacing */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
    }

    /* Dark Mode — Prestige Slate & Gold */
    [data-theme="dark"] {
      --bg-primary: #131313;
      --bg-secondary: #1c1b1b;
      --bg-tertiary: #2a2a2a;
      --bg-elevated: #242424;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --bg-active: rgba(255, 255, 255, 0.09);
      --bg-overlay: rgba(0, 0, 0, 0.7);

      --text-primary: #F0ECE3;
      --text-secondary: #9C9689;
      --text-tertiary: #6B6560;
      --text-inverse: #131313;
      --text-brand: var(--gold-400);

      --border-default: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.04);
      --border-focus: var(--gold-500);

      --accent: var(--gold-400);
      --accent-hover: var(--gold-300);
      --accent-light: rgba(245, 197, 24, 0.08);
      --accent-text: #131313;

      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.6);
      --shadow-xl: 0 20px 60px rgba(0,0,0,0.7);
    }

    /* ============================================
       Reset & Base
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      transition: background var(--duration-normal) var(--ease-out),
                  color var(--duration-normal) var(--ease-out);
    }

    #root {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, textarea, select { font-family: inherit; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    /* ============================================
       Utility Classes
       ============================================ */
    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ============================================
       Animations
       ============================================ */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2); opacity: 0; }
    }

    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-fade-in { animation: fadeIn var(--duration-normal) var(--ease-out) both; }
    .animate-slide-up { animation: slideUp var(--duration-slow) var(--ease-out) both; }
    .animate-scale-in { animation: scaleIn var(--duration-normal) var(--ease-spring) both; }

    /* Stagger delays */
    .stagger-1 { animation-delay: 50ms; }
    .stagger-2 { animation-delay: 100ms; }
    .stagger-3 { animation-delay: 150ms; }
    .stagger-4 { animation-delay: 200ms; }
    .stagger-5 { animation-delay: 250ms; }

    /* ============================================
       Component Styles
       ============================================ */

    /* Top Navigation Bar */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-default);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      overflow: visible;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .top-bar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      overflow: hidden;
    }

    .top-bar-logo-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .top-bar-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .top-bar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--duration-fast) var(--ease-out);
      position: relative;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
    }

    /* Bottom Navigation (Mobile) */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-default);
      display: flex;
      align-items: stretch;
      height: calc(64px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all var(--duration-normal) var(--ease-out);
    }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--text-tertiary);
      font-size: 10px;
      font-weight: 500;
      transition: all var(--duration-fast) var(--ease-out);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-nav-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 32px;
      height: 2.5px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
      transition: transform var(--duration-normal) var(--ease-spring);
    }

    .bottom-nav-item.active {
      color: var(--accent);
    }

    .bottom-nav-item.active::before {
      transform: translateX(-50%) scaleX(1);
    }

    .bottom-nav-item svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
      transition: transform var(--duration-fast) var(--ease-spring);
    }

    .bottom-nav-item:active svg {
      transform: scale(0.85);
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      padding: 20px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Page Header */
    .page-header {
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Cards */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      transition: all var(--duration-fast) var(--ease-out);
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-400), var(--gold-500));
      color: #1A1A1A;
      box-shadow: 0 2px 8px rgba(212, 168, 8, 0.25);
    }

    .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(212, 168, 8, 0.35);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    .btn-ghost {
      color: var(--text-secondary);
    }

    .btn-ghost:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    /* Status Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
    }

    .badge-confirmed { background: rgba(16,185,129,0.1); color: var(--emerald-500); }
    .badge-pending { background: rgba(59,130,246,0.1); color: var(--blue-500); }
    .badge-declined { background: rgba(239,68,68,0.1); color: var(--red-500); }
    .badge-maybe { background: rgba(245,158,11,0.1); color: var(--amber-500); }

    /* KPI Card */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 60px;
      height: 60px;
      border-radius: 0 0 0 60px;
      opacity: 0.06;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .kpi-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .kpi-card.gold .kpi-value { color: var(--gold-500); }
    .kpi-card.gold::after { background: var(--gold-400); }
    .kpi-card.green .kpi-value { color: var(--emerald-500); }
    .kpi-card.green::after { background: var(--emerald-400); }
    .kpi-card.blue .kpi-value { color: var(--blue-500); }
    .kpi-card.blue::after { background: var(--blue-400); }
    .kpi-card.red .kpi-value { color: var(--red-500); }
    .kpi-card.red::after { background: var(--red-400); }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-state-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-xl);
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .empty-state-icon svg {
      width: 36px;
      height: 36px;
      color: var(--accent);
      stroke-width: 1.5;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 280px;
      margin-bottom: 20px;
    }

    /* Input Fields */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .input-field {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-size: 15px;
      color: var(--text-primary);
      outline: none;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--bg-secondary);
    }

    /* Theme Toggle */
    .theme-toggle {
      position: relative;
      width: 38px;
      height: 38px;
    }

    .theme-toggle-track {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--duration-normal) var(--ease-out);
      cursor: pointer;
    }

    .theme-toggle-track:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .theme-toggle-track svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
      transition: transform var(--duration-normal) var(--ease-spring);
    }

    .theme-toggle-track:active svg {
      transform: scale(0.85) rotate(15deg);
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg,
        var(--bg-tertiary) 25%,
        var(--bg-hover) 50%,
        var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      box-shadow: var(--shadow-lg);
      animation: slideDown var(--duration-normal) var(--ease-spring) both;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 240px;
      max-width: 380px;
    }

    /* Supabase Config Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn var(--duration-fast) var(--ease-out) both;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-xl);
      animation: scaleIn var(--duration-normal) var(--ease-spring) both;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* Event Card */
    .event-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out);
      position: relative;
      overflow: hidden;
    }

    .event-card::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-400), var(--gold-600));
      opacity: 0;
      transition: opacity var(--duration-normal) var(--ease-out);
    }

    .event-card:hover {
      border-color: var(--gold-400);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .event-card:hover::before {
      opacity: 1;
    }

    .event-card-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .event-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .event-card-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .event-card-meta-item svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
    }

    .event-card-stats {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
    }

    .event-card-stat {
      display: flex;
      flex-direction: column;
    }

    .event-card-stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .event-card-stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* Connection indicator */
    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--emerald-500);
      position: relative;
    }

    .connection-dot.disconnected {
      background: var(--red-400);
    }

    .connection-dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid currentColor;
      opacity: 0.3;
    }

    /* Landing hero */
    .hero-section {
      text-align: center;
      padding: 40px 0 30px;
    }

    .hero-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--gold-400), var(--gold-600));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(212, 168, 8, 0.3);
      animation: float 3s ease-in-out infinite;
    }

    .hero-logo svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .hero-text {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Desktop sidebar (for larger screens) */
    @media (min-width: 768px) {
      .bottom-nav {
        position: fixed;
        top: 60px;
        bottom: 0;
        right: 0;
        left: auto;
        width: 200px;
        height: auto;
        flex-direction: column;
        border-top: none;
        border-left: none;
        border-right: none;
        border-inline-start: 1px solid var(--border-default);
        padding: 16px 8px;
        padding-bottom: 0;
        gap: 2px;
        justify-content: flex-start;
        align-items: stretch;
      }

      .bottom-nav-item {
        flex: unset;
        flex-direction: row;
        justify-content: flex-start;
        gap: 10px;
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        font-size: 14px;
        text-align: right;
      }

      .bottom-nav-item::before {
        top: 50%;
        left: 0;
        right: auto;
        transform: translateY(-50%) scaleY(0);
        width: 3px;
        height: 24px;
        border-radius: 0 3px 3px 0;
      }

      .bottom-nav-item.active::before {
        transform: translateY(-50%) scaleY(1);
      }

      .bottom-nav-item.active {
        background: var(--accent-light);
      }

      .main-content {
        margin-right: 200px;
        padding-bottom: 40px;
      }

      .kpi-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      /* Wider modals on desktop */
      .modal-content {
        max-width: 520px;
      }
    }

    @media (min-width: 1024px) {
      .main-content {
        padding: 32px 40px;
        padding-bottom: 40px;
        max-width: 1400px;
      }

      .bottom-nav {
        width: 220px;
      }
      .main-content {
        margin-right: 220px;
      }
    }

    @media (min-width: 1280px) {
      .main-content {
        padding: 32px 56px;
      }
      .dashboard-grid { grid-template-columns: 1fr 1fr; }
    }

    /* Global responsive utility */
    @media (max-width: 640px) {
      .hide-mobile { display: none !important; }
    }

    /* Landscape mode — compact UI when phone is rotated */
    @media (orientation: landscape) and (max-height: 500px) {
      .bottom-nav {
        height: 48px;
        padding: 2px 8px;
      }
      .bottom-nav-item {
        padding: 4px 8px;
        font-size: 10px;
        gap: 2px;
      }
      .bottom-nav-label { font-size: 9px; }
      .main-content {
        padding: 12px 16px;
        padding-bottom: 56px;
      }
      .top-bar { height: 44px; padding: 0 12px; }
      .top-bar h1 { font-size: 16px; }
      .page-header { margin-bottom: 12px; }
      .page-title { font-size: 18px; }
      .card { padding: 12px; }
      .kpi-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .kpi-card { padding: 10px; }
    }

    /* ============================================
       Guests Module Styles
       ============================================ */

    /* Search & Filter Bar */
    .search-filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 180px;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: all var(--duration-fast) var(--ease-out);
    }

    [dir="rtl"] .search-input {
      padding: 10px 38px 10px 14px;
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--bg-secondary);
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
    }

    [dir="rtl"] .search-icon {
      left: auto;
      right: 11px;
    }

    .filter-select {
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .filter-select:focus {
      border-color: var(--accent);
    }

    /* Guest Table */
    .guests-table-wrapper {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .guests-table {
      width: 100%;
      border-collapse: collapse;
    }

    .guests-table th {
      padding: 12px 16px;
      text-align: right;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-default);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .guests-table th:hover {
      color: var(--text-primary);
    }

    .guests-table th.sort-active {
      color: var(--accent);
    }

    .guests-table td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }

    .guests-table tr:last-child td {
      border-bottom: none;
    }

    .guests-table tr:hover td {
      background: var(--bg-hover);
    }

    .guests-table tr.selected td {
      background: var(--accent-light);
    }

    .guest-name-cell {
      font-weight: 600;
      color: var(--text-primary);
    }

    .guest-phone-cell {
      color: var(--text-secondary);
      font-size: 13px;
      direction: ltr;
      text-align: right;
    }

    /* Checkbox */
    .checkbox-custom {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-default);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      flex-shrink: 0;
    }

    .checkbox-custom.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Bulk Actions Bar */
    .bulk-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--accent-light);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      animation: slideDown var(--duration-normal) var(--ease-spring) both;
      flex-wrap: wrap;
    }

    .bulk-bar-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      margin-left: auto;
    }

    /* Guest Modal */
    .modal-scroll {
      max-height: 80vh;
      overflow-y: auto;
    }

    /* Status inline editor */
    .status-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .status-btn:hover {
      filter: brightness(1.1);
    }

    /* Excel import preview */
    .import-preview {
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      overflow: auto;
      max-height: 240px;
      border: 1px solid var(--border-default);
    }

    .import-preview table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .import-preview th {
      padding: 8px 12px;
      background: var(--bg-secondary);
      font-weight: 600;
      color: var(--text-secondary);
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border-default);
    }

    .import-preview td {
      padding: 6px 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .duplicate-row td {
      background: rgba(239,68,68,0.06);
    }

    /* Mobile card view for guests */
    .guest-card-mobile {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .guest-card-mobile:active {
      background: var(--bg-hover);
    }

    .guest-card-mobile.selected {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .guest-card-info {
      flex: 1;
      min-width: 0;
    }

    .guest-card-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .guest-card-meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .guest-card-actions {
      display: flex;
      gap: 4px;
    }

    /* Tabs for mobile/desktop toggle */
    .view-toggle {
      display: flex;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 3px;
      gap: 2px;
    }

    .view-toggle-btn {
      padding: 6px 12px;
      border-radius: calc(var(--radius-sm) - 3px);
      font-size: 13px;
      color: var(--text-tertiary);
      transition: all var(--duration-fast) var(--ease-out);
    }

    .view-toggle-btn.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* Stats row */
    .guests-stats-row {
      display: flex;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .guests-stat {
      display: flex;
      flex-direction: column;
    }

    .guests-stat-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .guests-stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border-default);
      border-radius: var(--radius-md);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upload-zone input[type="file"] {
      display: none;
    }

    /* Confirm dialog */
    .confirm-dialog {
      padding: 8px 0 20px;
      text-align: center;
    }

    .confirm-dialog-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-xl);
      background: rgba(239,68,68,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .confirm-dialog-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confirm-dialog-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    /* Group color dots */
    .group-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 16px;
    }

    .page-btn {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all var(--duration-fast) var(--ease-out);
    }

    .page-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .page-btn.active {
      background: var(--accent);
      color: var(--accent-text);
    }

    .btn-danger {
      background: rgba(239,68,68,0.1);
      color: var(--red-500);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-danger:hover {
      background: rgba(239,68,68,0.15);
    }

    /* Column visibility on mobile */
    @media (max-width: 640px) {
      .guests-table .hide-mobile { display: none; }
    }

    /* ============================================
       Messages Module — Phase 2
       ============================================ */
    .round-tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 20px; scrollbar-width: none; }
    .round-tabs::-webkit-scrollbar { display: none; }
    .round-tab { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; white-space: nowrap; border: 1.5px solid var(--border-default); color: var(--text-secondary); background: var(--bg-secondary); transition: all var(--duration-fast) var(--ease-out); flex-shrink: 0; }
    .round-tab:hover { border-color: var(--accent); color: var(--text-primary); }
    .round-tab.active { background: var(--accent); border-color: var(--accent); color: var(--accent-text); box-shadow: 0 2px 8px rgba(212,168,8,0.25); }
    .round-tab-new { border-style: dashed; color: var(--text-tertiary); }
    .round-tab-new:hover { color: var(--accent); border-color: var(--accent); }
    .template-textarea { width: 100%; min-height: 120px; padding: 12px 14px; background: var(--bg-tertiary); border: 1.5px solid var(--border-default); border-radius: var(--radius-sm); font-size: 14px; color: var(--text-primary); outline: none; resize: vertical; font-family: inherit; line-height: 1.6; transition: all var(--duration-fast) var(--ease-out); }
    .template-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); background: var(--bg-secondary); }
    .variable-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .variable-chip { padding: 4px 10px; background: var(--accent-light); border: 1px solid rgba(212,168,8,0.25); border-radius: var(--radius-full); font-size: 12px; font-weight: 600; color: var(--accent); cursor: pointer; font-family: monospace; transition: all var(--duration-fast); }
    .variable-chip:hover { background: var(--accent); color: var(--accent-text); }
    .message-preview-box { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); border-radius: var(--radius-md); padding: 16px; color: white; position: relative; overflow: hidden; }
    .message-bubble { background: white; color: #111; border-radius: 18px 18px 4px 18px; padding: 10px 14px; font-size: 14px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,0.2); max-width: 90%; white-space: pre-wrap; word-break: break-word; position: relative; }
    .message-bubble-time { font-size: 11px; color: rgba(255,255,255,0.7); text-align: left; margin-top: 6px; }
    .recipient-list { display: flex; flex-direction: column; gap: 6px; max-height: 420px; overflow-y: auto; }
    .recipient-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-sm); transition: all var(--duration-fast); }
    .recipient-row:hover { border-color: var(--border-focus); }
    .recipient-row.sent-row { opacity: 0.55; }
    .wa-link-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: #25D366; color: white; border-radius: var(--radius-full); font-size: 13px; font-weight: 600; text-decoration: none; transition: all var(--duration-fast); flex-shrink: 0; }
    .wa-link-btn:hover { background: #128C7E; transform: scale(1.02); }
    .send-progress { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; margin: 12px 0; }
    .send-progress-bar { height: 100%; background: #25D366; border-radius: 3px; transition: width 0.4s var(--ease-out); }
    .history-item { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-light); }
    .history-item:last-child { border-bottom: none; }
    .round-summary-card { background: var(--bg-secondary); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 16px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .round-stat { text-align: center; }
    .round-stat-value { font-size: 22px; font-weight: 800; line-height: 1; }
    .round-stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-chip { padding: 5px 12px; border-radius: var(--radius-full); font-size: 12px; font-weight: 600; border: 1.5px solid var(--border-default); color: var(--text-secondary); cursor: pointer; transition: all var(--duration-fast); }
    .filter-chip:hover { border-color: var(--accent); color: var(--text-primary); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }
    .channel-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border-default); font-size: 14px; font-weight: 600; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all var(--duration-fast); }
    .channel-btn:hover { border-color: var(--border-focus); color: var(--text-primary); }
    .channel-btn.active-wa { border-color: #25D366; background: rgba(37,211,102,0.08); color: #128C7E; }
    .channel-btn.active-rsvp { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }

    /* Quick Message Actions */
    .quick-actions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    @media (min-width: 768px) { .quick-actions-grid { grid-template-columns: repeat(4, 1fr); } }
    .quick-action-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 16px 12px; border-radius: var(--radius-md);
      border: 2px solid var(--border-default); background: var(--bg-secondary);
      cursor: pointer; transition: all var(--duration-fast) var(--ease-out);
      text-align: center;
    }
    .quick-action-card:hover { border-color: var(--border-focus); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .quick-action-card.active { border-color: var(--accent); background: var(--accent-light); }
    .quick-action-icon {
      width: 44px; height: 44px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .quick-action-label { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .quick-action-sub { font-size: 11px; color: var(--text-secondary); line-height: 1.3; }

    /* Send mode selector */
    .send-mode-grid { display: flex; gap: 8px; margin-bottom: 16px; }
    .send-mode-btn {
      flex: 1; padding: 10px 8px; border-radius: var(--radius-sm);
      border: 2px solid var(--border-default); text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      transition: all var(--duration-fast); cursor: pointer;
    }
    .send-mode-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .send-mode-btn.active { border-color: #25D366; background: rgba(37,211,102,0.08); color: #128C7E; }

    /* ============================================
       Dashboard Phase 3 Styles
       ============================================ */
    .dashboard-grid { display: grid; gap: 16px; }

          sb.auth.getSession().then(({ data: { session } }) => {
            clearTimeout(timeout);
            setUser(session?.user ?? null);
            setLoading(false);

            // Clean the token from the URL so it isn't bookmarked / shared
            if (window.location.hash.includes('access_token') ||
                window.location.search.includes('token_hash')) {
              window.history.replaceState(
                null, '', window.location.pathname
              );
            }
          }).catch(() => {
            clearTimeout(timeout);
            setLoading(false);
          });

          const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
            setUser(session?.user ?? null);
            // After password recovery link is clicked, redirect to settings
            if (event === 'PASSWORD_RECOVERY') {
              setUser(session?.user ?? null);
            }
          });

          return () => { subscription.unsubscribe(); clearTimeout(timeout); };
        } else {
          setLoading(false);
        }
      }, [config]);

      const saveConfig = useCallback((url, anonKey) => {
        const cfg = { url, anonKey };
        localStorage.setItem('seatsync-supabase', JSON.stringify(cfg));
        setConfig(cfg);
      }, []);

      const signIn = useCallback(async (email, password) => {
        if (!client) throw new Error('Supabase not configured');
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;
        return data;
      }, [client]);

      const signUp = useCallback(async (email, password, fullName) => {
        if (!client) throw new Error('Supabase not configured');
        const { data, error } = await client.auth.signUp({
          email,
          password,
          options: { data: { full_name: fullName } }
        });
        if (error) throw error;
        return data;
      }, [client]);

      const signOut = useCallback(async () => {
        if (!client) return;
        await client.auth.signOut();
        localStorage.removeItem('seatsync-selected-event');
        setUser(null);
      }, [client]);

      return (
        <SupabaseContext.Provider value={{
          client, user, loading, config,
          saveConfig, signIn, signUp, signOut,
          isConfigured: !!config
        }}>
          {children}
        </SupabaseContext.Provider>
      );
    }

    function PlanProvider({ children }) {
      const { client, user } = useContext(SupabaseContext);
      const [plan, setPlan] = useState('free');
      const [loadingPlan, setLoadingPlan] = useState(true);
      const [showUpgradeModal, setShowUpgradeModal] = useState(false);

      // Fetch plan from DB
      const refreshPlan = useCallback(async () => {
        if (!client || !user) return;
        try {
          const { data } = await client.from('profiles').select('plan, plan_expires_at').eq('id', user.id).single();
          setPlan(data?.plan || 'free');
        } catch {}
      }, [client, user]);

      useEffect(() => {
        if (!client || !user) { setLoadingPlan(false); return; }
        client.from('profiles').select('plan, plan_expires_at').eq('id', user.id).single()
          .then(({ data }) => {
            setPlan(data?.plan || 'free');
            setLoadingPlan(false);
          })
          .catch(() => setLoadingPlan(false));
      }, [client, user]);

      // Listen for plan changes via URL callback (after Lemon Squeezy checkout)
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('payment') === 'success') {
          // Remove query param
          window.history.replaceState({}, '', window.location.pathname);
          // Poll for plan update (webhook may take a few seconds)
          let attempts = 0;
          const poll = setInterval(async () => {
            attempts++;
            await refreshPlan();
            if (attempts >= 10) clearInterval(poll);
          }, 2000);
          return () => clearInterval(poll);
        }
      }, [refreshPlan]);

      // Listen for real-time plan changes
      useEffect(() => {
        if (!client || !user) return;
        const channel = client.channel('plan-changes')
          .on('postgres_changes', {
            event: 'UPDATE', schema: 'public', table: 'profiles',
            filter: `id=eq.${user.id}`
          }, (payload) => {
            if (payload.new?.plan) setPlan(payload.new.plan);
          })
          .subscribe();
        return () => { client.removeChannel(channel); };
      }, [client, user]);

      const limits = PLAN_LIMITS[plan] || PLAN_LIMITS.free;
      const isPro = plan === 'pro' || plan === 'enterprise';

      const canAdd = useCallback((resource, currentCount) => {
        return currentCount < limits[resource];
      }, [limits]);

      // Open Lemon Squeezy checkout with user info pre-filled
      const openCheckout = useCallback((targetPlan = 'pro') => {
        const baseUrl = CHECKOUT_URLS[targetPlan];
        if (!baseUrl || baseUrl.includes('YOUR_')) {
          // Fallback: show instructions if checkout URLs not configured yet
          setShowUpgradeModal(true);
          return;
        }
        const params = new URLSearchParams();
        if (user?.email) params.set('checkout[email]', user.email);
        if (user?.id) params.set('checkout[custom][user_id]', user.id);
        // Redirect back after payment
        params.set('checkout[custom][redirect_url]', window.location.origin + window.location.pathname + '?payment=success');
        window.open(`${baseUrl}?${params.toString()}`, '_blank');
      }, [user]);

      return (
        <PlanContext.Provider value={{ plan, limits, isPro, canAdd, loadingPlan, openCheckout, showUpgradeModal, setShowUpgradeModal, refreshPlan }}>
          {children}
        </PlanContext.Provider>
      );
    }

    function PWAInstallProvider({ children }) {
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const [isStandalone, setIsStandalone] = useState(
        window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true
      );

      useEffect(() => {
        if (isStandalone) return;
        const handler = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        };
        window.addEventListener('beforeinstallprompt', handler);
        // Listen for successful install
        window.addEventListener('appinstalled', () => {
          setIsStandalone(true);
          setDeferredPrompt(null);
        });
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const triggerInstall = useCallback(async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            setDeferredPrompt(null);
            setIsStandalone(true);
          }
          return outcome;
        }
        return null;
      }, [deferredPrompt]);

      return (
        <PWAInstallContext.Provider value={{ deferredPrompt, triggerInstall, isIOS, isStandalone }}>
          {children}
        </PWAInstallContext.Provider>
      );
    }

    // ============================================
    // Auth Page
    // ============================================
    function AuthPage() {
      const { signIn, signUp, client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const [mode, setMode] = useState('login'); // login | register | forgot | magic
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [fullName, setFullName] = useState('');
      const [loading, setLoading] = useState(false);
      const [showPassword, setShowPassword] = useState(false);
      const [sentReset, setSentReset] = useState(false);
      const [sentMagic, setSentMagic] = useState(false);

      const handleSubmit = async () => {
        if (!email) { addToast('נא להזין אימייל', 'error'); return; }
        setLoading(true);
        try {
          if (mode === 'login') {
            if (!password) { addToast('נא להזין סיסמה', 'error'); setLoading(false); return; }
            await signIn(email, password);
            addToast('ברוכים הבאים! 🎉', 'success');
          } else if (mode === 'register') {
            if (!password) { addToast('נא להזין סיסמה', 'error'); setLoading(false); return; }
            if (password.length < 6) { addToast('סיסמה חייבת להכיל לפחות 6 תווים', 'error'); setLoading(false); return; }
            if (!fullName.trim()) { addToast('נא להזין שם מלא', 'error'); setLoading(false); return; }
            const { data } = await signUp(email, password, fullName);
            if (data?.user?.identities?.length === 0) {
              addToast('אימייל כבר רשום — נסו להתחבר', 'error');
            } else {
              addToast('נרשמת בהצלחה! 🎉 בדקו את המייל לאימות', 'success');
            }
          } else if (mode === 'forgot') {
            const { error } = await client.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.href.split('?')[0].split('#')[0]
            });
            if (error) throw error;
            setSentReset(true);
            addToast('נשלח מייל לאיפוס סיסמה 📧', 'success');
          } else if (mode === 'magic') {
            const { error } = await client.auth.signInWithOtp({
              email,
              options: {
                emailRedirectTo: window.location.href.split('?')[0].split('#')[0]
              }
            });
            if (error) throw error;
            setSentMagic(true);
            addToast('נשלח לינק התחברות למייל 📧', 'success');
          }
        } catch (err) {
          const msg = err.message || 'שגיאה';
          if (msg.includes('Invalid login')) addToast('אימייל או סיסמה שגויים', 'error');
          else if (msg.includes('Email not confirmed')) addToast('נא לאשר את המייל תחילה — בדקו את תיבת הדואר', 'error');
          else addToast(msg, 'error');
        }
        setLoading(false);
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleSubmit();
      };

    // ============================================

    // Phase 3 — Dashboard: SVG Donut Chart
    // ============================================
    function DonutChart({ data, size = 120 }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      if (total === 0) return (
        <svg width={size} height={size} viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="48" fill="none" stroke="var(--bg-tertiary)" strokeWidth="18" />
          <text x="60" y="65" textAnchor="middle" fontSize="14" fill="var(--text-tertiary)" fontFamily="Heebo">0</text>
        </svg>
      );
      const r = 48; const cx = 60; const cy = 60;
      const circumference = 2 * Math.PI * r;
      let offset = 0;
      const slices = data.map(d => {
        const pct = d.value / total;
        const dash = pct * circumference;
        const slice = { ...d, dash, gap: circumference - dash, offset, pct };
        offset += dash;
        return slice;
      });
      return (
        <svg width={size} height={size} viewBox="0 0 120 120" style={{ transform: 'rotate(-90deg)', flexShrink: 0 }}>
          {slices.map((s, i) => s.value > 0 && (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none"
              stroke={s.color} strokeWidth="18"
              strokeDasharray={`${s.dash} ${s.gap}`}
              strokeDashoffset={-s.offset}
              style={{ transition: 'stroke-dasharray 0.6s ease' }}
            />
          ))}
          <text x="60" y="65" textAnchor="middle" fontSize="18" fontWeight="800"
            fill="var(--text-primary)" fontFamily="Heebo" style={{ transform: 'rotate(90deg)', transformOrigin: '60px 60px' }}>
            {total}
          </text>
        </svg>
      );
    }

    function DashboardPage({ event, onGoToGuests }) {
      const { client } = useContext(SupabaseContext);
      const [guests, setGuests] = useState([]);
      const [rounds, setRounds] = useState([]);
      const [loading, setLoading] = useState(true);
      const [recentActivity, setRecentActivity] = useState([]);

      useEffect(() => {
        if (!client || !event?.id) return;
        setLoading(true);
        Promise.all([
          client.from('guests').select('*').eq('event_id', event.id).order('updated_at', { ascending: false }),
          client.from('message_rounds').select('*').eq('event_id', event.id).order('sent_at', { ascending: false }),
        ]).then(([{ data: g }, { data: r }]) => {
          setGuests(g || []);
          setRounds(r || []);
          // Build recent activity from recently updated guests
          const recent = (g || [])
            .filter(guest => guest.status !== 'pending')
            .slice(0, 8)
            .map(guest => ({
              id: guest.id,
              name: guest.name,
              status: guest.status,
              time: guest.updated_at,
            }));
          setRecentActivity(recent);
          setLoading(false);
        });
      }, [client, event?.id]);

      // Realtime subscription
      useEffect(() => {
        if (!client || !event?.id) return;
        const channel = client
          .channel('dashboard-guests-' + event.id)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'guests', filter: `event_id=eq.${event.id}` },
            (payload) => {
              if (payload.eventType === 'UPDATE') {
                setGuests(prev => prev.map(g => g.id === payload.new.id ? payload.new : g));
              } else if (payload.eventType === 'INSERT') {
                setGuests(prev => [payload.new, ...prev]);
              } else if (payload.eventType === 'DELETE') {
                setGuests(prev => prev.filter(g => g.id !== payload.old.id));
              }
            })
          .subscribe();
        return () => { client.removeChannel(channel); };
      }, [client, event?.id]);

      if (!event) {
        return (
          <div className="empty-state animate-slide-up">
            <div className="empty-state-icon"><Icon name="CalendarHeart" size={36} /></div>
            <div className="empty-state-title">בחרו אירוע</div>
            <div className="empty-state-text">בחרו אירוע מהרשימה כדי לראות את הדשבורד</div>
          </div>
        );
      }

      const stats = useMemo(() => {
        const total = guests.length;
        const confirmed = guests.filter(g => g.status === 'confirmed').length;
        const pending = guests.filter(g => g.status === 'pending').length;
        const declined = guests.filter(g => g.status === 'declined').length;
        const maybe = guests.filter(g => g.status === 'maybe').length;
        const totalGuests = guests.reduce((sum, g) => sum + (g.confirmed_guests || 0), 0);
        const responseRate = total > 0 ? Math.round(((total - pending) / total) * 100) : 0;
        return { total, confirmed, pending, declined, maybe, totalGuests, responseRate };
      }, [guests]);

      // Group stats for bar chart
      const groupStats = useMemo(() => {
        const map = {};
        guests.forEach(g => {
          const grp = g.group_name || 'כללי';
          if (!map[grp]) map[grp] = { total: 0, confirmed: 0 };
          map[grp].total++;
          if (g.status === 'confirmed') map[grp].confirmed += (g.confirmed_guests || 0);
        });
        return Object.entries(map)
          .map(([name, v]) => ({ name, ...v }))
          .sort((a, b) => b.total - a.total)
          .slice(0, 6);
      }, [guests]);

      const maxGroupTotal = Math.max(...groupStats.map(g => g.total), 1);

      const donutData = [
        { label: 'מגיעים',    value: stats.confirmed, color: '#10B981' },
        { label: 'אולי',      value: stats.maybe,     color: '#F59E0B' },
        { label: 'לא מגיע',  value: stats.declined,  color: '#EF4444' },
        { label: 'ממתין',    value: stats.pending,    color: '#60A5FA' },
      ];

      const formatTime = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        const now = new Date();
        const diff = Math.round((now - d) / 60000);
        if (diff < 1) return 'עכשיו';
        if (diff < 60) return `לפני ${diff} דק'`;
        if (diff < 1440) return `לפני ${Math.round(diff/60)} שע'`;
        return d.toLocaleDateString('he-IL');
      };

      const activityConfig = {
        confirmed: { color: 'rgba(16,185,129,0.15)', icon: 'CheckCircle2', iconColor: '#10B981', text: 'אישר/ה הגעה' },
        declined:  { color: 'rgba(239,68,68,0.12)',  icon: 'XCircle',      iconColor: '#EF4444', text: 'לא מגיע/ה' },
        maybe:     { color: 'rgba(245,158,11,0.12)', icon: 'HelpCircle',   iconColor: '#F59E0B', text: 'אולי מגיע/ה' },
        pending:   { color: 'rgba(96,165,250,0.12)', icon: 'Clock',        iconColor: '#60A5FA', text: 'ממתין/ה' },
      };

      if (loading) return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div className="kpi-grid">
            {[1,2,3,4].map(i => <div key={i} className="skeleton" style={{ height: 80 }} />)}
          </div>
          {[1,2].map(i => <div key={i} className="skeleton" style={{ height: 180 }} />)}
        </div>
      );

      return (
        <div className="animate-slide-up">
          {/* Header */}
          <div className="page-header">
            <div className="page-title">{event.name}</div>
            <div className="page-subtitle">
              {event.event_date && `📅 ${new Date(event.event_date).toLocaleDateString('he-IL')}`}

              {rounds.length > 0 && ` · ${rounds.length} סבבי הודעות`}
            </div>
          </div>

          {/* KPI Cards */}
          <div className="kpi-grid">
            <div className="kpi-card gold animate-scale-in stagger-1">
              <div className="kpi-value">{stats.total}</div>
              <div className="kpi-label">סה״כ מוזמנים</div>
            </div>
            <div className="kpi-card green animate-scale-in stagger-2">
              <div className="kpi-value">{stats.totalGuests}</div>
              <div className="kpi-label">נפשות מגיעות</div>
            </div>
            <div className="kpi-card blue animate-scale-in stagger-3">
              <div className="kpi-value">{stats.pending}</div>
              <div className="kpi-label">ממתינים לתגובה</div>
            </div>
            <div className="kpi-card red animate-scale-in stagger-4">
              <div className="kpi-value">{stats.declined}</div>
              <div className="kpi-label">לא מגיעים</div>
            </div>
          </div>

          {stats.total === 0 ? (
            <div className="empty-state" style={{ padding: '40px 20px' }}>
              <div className="empty-state-icon"><Icon name="UserPlus" size={36} /></div>
              <div className="empty-state-title">אין מוזמנים עדיין</div>
              <div className="empty-state-text">הוסיפו מוזמנים כדי לראות סטטיסטיקות בזמן אמת</div>
              <button className="btn btn-primary" onClick={onGoToGuests}>
                <Icon name="Plus" size={18} />הוספת מוזמנים
              </button>
            </div>
          ) : (
            <>
              {/* Response rate bar */}
              <div className="card animate-slide-up stagger-2" style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10, alignItems: 'center' }}>
                  <div className="card-title" style={{ marginBottom: 0 }}>שיעור תגובות</div>
                  <div style={{ fontWeight: 800, fontSize: 22, color: 'var(--accent)', letterSpacing: -1 }}>{stats.responseRate}%</div>
                </div>
                <div style={{ height: 10, background: 'var(--bg-tertiary)', borderRadius: 5, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${stats.responseRate}%`, background: 'linear-gradient(90deg, var(--gold-400), var(--emerald-500))', borderRadius: 5, transition: 'width 1s var(--ease-out)' }} />
                </div>
                <div style={{ display: 'flex', gap: 16, marginTop: 10, fontSize: 13, flexWrap: 'wrap' }}>
                  {donutData.map(d => (
                    <span key={d.label} style={{ color: d.color, display: 'flex', alignItems: 'center', gap: 5 }}>
                      <span style={{ width: 8, height: 8, borderRadius: '50%', background: d.color, display: 'inline-block' }} />

                    </span>
                  ))}
                </div>
              </div>

              <div className="dashboard-grid">
                {/* Donut chart */}
                <div className="chart-card animate-scale-in stagger-3">
                  <div className="chart-title">פילוח סטטוסים</div>
                  <div className="donut-wrap">
                    <DonutChart data={donutData} size={130} />
                    <div className="donut-legend">
                      {donutData.map(d => (
                        <div key={d.label} className="donut-legend-item">
                          <span className="donut-legend-dot" style={{ background: d.color }} />
                          <span className="donut-legend-label">{d.label}</span>
                          <span className="donut-legend-value" style={{ color: d.color }}>{d.value}</span>

                            {stats.total > 0 ? Math.round(d.value/stats.total*100) : 0}%

                </div>

                {/* Bar chart by group */}
                {groupStats.length > 0 && (
                  <div className="chart-card animate-scale-in stagger-4">
                    <div className="chart-title">מגיעים לפי קבוצה</div>
                    <div className="bar-chart">
                      {groupStats.map(g => (
                        <div key={g.name} className="bar-row">
                          <div className="bar-label">{g.name}</div>
                          <div className="bar-track">
                            <div
                              className="bar-fill"
                              style={{

                            >
                              {g.total >= 3 && g.total}
                            </div>
                          </div>
                          <div className="bar-count">{g.total}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Recent activity */}
                {recentActivity.length > 0 && (
                  <div className="chart-card dashboard-span2 animate-slide-up stagger-5">
                    <div className="chart-title">
                      פעילות אחרונה
                      <span style={{ fontSize: 12, color: 'var(--text-tertiary)', fontWeight: 400 }}>מתעדכן בזמן אמת</span>
                    </div>
                    <div className="activity-list">
                      {recentActivity.map(a => {

                        return (
                          <div key={a.id} className="activity-item">
                            <div className="activity-icon" style={{ background: cfg.color }}>
                              <Icon name={cfg.icon} size={14} style={{ color: cfg.iconColor }} />
                            </div>
                            <div className="activity-text">
                              <div className="activity-name">{a.name}</div>
                              <div className="activity-time">{cfg.text}</div>
                            </div>

                          </div>
                        );
                      })}
