    // ============================================
    // Events List Page
    // ============================================
    function EventsPage({ onSelectEvent, selectedEventId, onClearSelectedEvent }) {
      const { client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const { plan, limits, canAdd, openCheckout, setShowUpgradeModal } = useContext(PlanContext);
      const [events, setEvents] = useState([]);
      const [eventStats, setEventStats] = useState({});
      const [loading, setLoading] = useState(true);
      const [showCreate, setShowCreate] = useState(false);
      const [deleteEventTarget, setDeleteEventTarget] = useState(null);
      const [newEvent, setNewEvent] = useState({ name: '', event_type: 'wedding', event_date: '', venue_name: '' });

      useEffect(() => {
        fetchEvents();
      }, [client]);

      const fetchEvents = async () => {
        if (!client) return;
        setLoading(true);
        const { data, error } = await client.from('events').select('*').order('created_at', { ascending: false });
        if (error) {
          addToast('שגיאה בטעינת אירועים', 'error');
        } else {
          setEvents(data || []);
          // Fetch guest stats for each event
          if (data && data.length > 0) {
            const { data: guests } = await client.from('guests')
              .select('event_id, status, confirmed_guests')
              .in('event_id', data.map(e => e.id));
            if (guests) {
              const stats = {};
              guests.forEach(g => {
                if (!stats[g.event_id]) stats[g.event_id] = { total: 0, confirmed: 0, totalGuests: 0 };
                stats[g.event_id].total++;
                if (g.status === 'confirmed') {
                  stats[g.event_id].confirmed++;
                  stats[g.event_id].totalGuests += (g.confirmed_guests || 0);
                }
              });
              setEventStats(stats);
            }
          }
        }
        setLoading(false);
      };

      const deleteEvent = async () => {
        if (!deleteEventTarget) return;
        const { error } = await client.from('events').delete().eq('id', deleteEventTarget.id);
        if (error) {
          addToast('שגיאה במחיקת אירוע: ' + error.message, 'error');
        } else {
          setEvents(prev => prev.filter(e => e.id !== deleteEventTarget.id));
          if (selectedEventId === deleteEventTarget.id) {
            localStorage.removeItem('seatsync-selected-event');
            // Bug fix 2.1: clear parent state so TopBar + pages reset
            if (onClearSelectedEvent) onClearSelectedEvent();
          }
          addToast('האירוע נמחק', 'success');
        }
        setDeleteEventTarget(null);
      };

      const createEvent = async () => {
        if (!newEvent.name.trim()) return;
        // Plan limit check
        if (!canAdd('events', events.length)) {
          addToast(`תוכנית ${limits.label} מאפשרת עד ${limits.events} אירועים. שדרגו לתוכנית גבוהה יותר.`, 'error');
          setShowUpgradeModal(true);
          return;
        }
        const { data: { user } } = await client.auth.getUser();
        if (!user) { addToast('שגיאה: לא מחובר', 'error'); return; }

        // Ensure profile exists (handles case where DB trigger didn't fire)
        const { data: existingProfile } = await client.from('profiles').select('id').eq('id', user.id).single();
        if (!existingProfile) {
          const { error: profileErr } = await client.from('profiles').insert({
            id: user.id,
            full_name: user.user_metadata?.full_name || user.email?.split('@')[0] || '',
            phone: user.user_metadata?.phone || '',
          });
          if (profileErr && !profileErr.message?.includes('duplicate')) {
            addToast('שגיאה ביצירת פרופיל: ' + profileErr.message, 'error');
            return;
          }
        }

        const { data, error } = await client.from('events').insert({
          name: newEvent.name.trim(),
          event_type: newEvent.event_type,
          event_date: newEvent.event_date || null,
          venue_name: newEvent.venue_name || null,
          user_id: user.id,
        }).select().single();

        if (error) {
          addToast('שגיאה ביצירת אירוע: ' + error.message, 'error');
        } else {
          setEvents(prev => [data, ...prev]);
          setShowCreate(false);
          setNewEvent({ name: '', event_type: 'wedding', event_date: '', venue_name: '' });
          onSelectEvent(data);
          addToast('האירוע נוצר בהצלחה! 🎉', 'success');
        }
      };

      const eventTypeLabels = {
        wedding: '💒 חתונה',
        bar_mitzvah: '✡️ בר מצווה',
        bat_mitzvah: '✡️ בת מצווה',
        brit_mila: '👶 ברית',
        brit_bat: '👶 בריתה',
        corporate: '🏢 עסקי',
        birthday: '🎂 יום הולדת',
        other: '🎉 אחר',
      };

      return (
        <div className="animate-slide-up">
          <div className="page-header" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div className="page-title">האירועים שלי</div>
              <div className="page-subtitle">{events.length} אירועים</div>
            </div>
            <button className="btn btn-primary" onClick={() => {
              if (!canAdd('events', events.length)) {
                addToast(`תוכנית ${limits.label} מאפשרת עד ${limits.events} אירועים. שדרגו כדי להוסיף עוד.`, 'error');
                setShowUpgradeModal(true);
                return;
              }
              setShowCreate(true);
            }}>
              <Icon name="Plus" size={18} />
              אירוע חדש
            </button>
          </div>

          {/* Plan limits indicator */}
          {events.length > 0 && (
            <div style={{ marginBottom: 12, padding: '8px 14px', borderRadius: 'var(--radius-sm)', fontSize: 12, display: 'flex', alignItems: 'center', justifyContent: 'space-between', background: events.length >= limits.events ? 'rgba(239,68,68,0.08)' : 'var(--bg-secondary)', border: events.length >= limits.events ? '1px solid rgba(239,68,68,0.2)' : '1px solid var(--border-default)' }}>
              <span style={{ color: events.length >= limits.events ? 'var(--red-500)' : 'var(--text-secondary)' }}>
                {events.length}/{limits.events} אירועים · תוכנית {limits.label}
              </span>
              {events.length >= limits.events && (
                <button className="btn" style={{ padding: '4px 12px', fontSize: 11, background: 'var(--gold-400)', color: 'white', borderRadius: 'var(--radius-sm)' }} onClick={() => setShowUpgradeModal(true)}>
                  <Icon name="Zap" size={12} /> שדרג
                </button>
              )}
            </div>
          )}

          {showCreate && (
            <div className="card animate-scale-in" style={{ marginBottom: 20 }}>
              <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 14 }}>אירוע חדש</div>
              <div className="input-group">

    // ============================================
    // Phase 6 — Error Boundary
    // ============================================
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) { console.error('SeatSync error:', error, info); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="error-boundary animate-fade-in">
              <div className="error-boundary-icon">😵</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>משהו השתבש</div>
              <div style={{ fontSize: 14, color: 'var(--text-secondary)', marginBottom: 20, maxWidth: 300, lineHeight: 1.6 }}>
                {this.state.error?.message || 'שגיאה בלתי צפויה. אנא רעננו את הדף.'}
              </div>
              <button className="btn btn-primary" onClick={() => { this.setState({ hasError: false, error: null }); window.location.reload(); }}>
                <Icon name="RefreshCw" size={18} />רענן דף
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ============================================
    // Phase 6 — Offline Banner
    // ============================================
    function OfflineBanner() {
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      useEffect(() => {
        const on = () => setIsOnline(true);
        const off = () => setIsOnline(false);
        window.addEventListener('online', on);
        window.addEventListener('offline', off);
        return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
      }, []);
      if (isOnline) return null;
      return (
        <div className="offline-banner">
          📡 אין חיבור לאינטרנט — נתונים עשויים להיות לא מעודכנים
        </div>
      );
    }

    // ============================================
    // PWA Install Banner
    // ============================================
    function PWAInstallBanner() {
      const { deferredPrompt, triggerInstall, isIOS, isStandalone } = useContext(PWAInstallContext);
      const [show, setShow] = useState(false);
      const [showIOSGuide, setShowIOSGuide] = useState(false);

      useEffect(() => {
        if (isStandalone) return;
        // Show banner after a short delay
        const timer = setTimeout(() => setShow(true), 3000);
        return () => clearTimeout(timer);
      }, [isStandalone]);

      const handleInstall = async () => {
        if (deferredPrompt) {
          const outcome = await triggerInstall();
          if (outcome === 'accepted') setShow(false);
        } else {
          // iOS or Android without prompt — show manual guide
          setShowIOSGuide(true);
        }
      };

      const handleDismiss = () => {
        setShow(false);
        sessionStorage.setItem('seatsync-pwa-dismissed', '1');
      };

      // Check if dismissed this session
      if (sessionStorage.getItem('seatsync-pwa-dismissed') === '1') return null;
      if (!show || isStandalone) return null;

      return (
        <>
          <div className="pwa-install-banner" role="dialog" aria-label="התקנת האפליקציה">
            <div className="pwa-install-icon">
              <svg width="24" height="24" viewBox="0 0 34 34" fill="none">
                <ellipse cx="17" cy="14" rx="9" ry="5.5" fill="rgba(255,255,255,0.25)" stroke="white" strokeWidth="1.5"/>
                <rect x="15.5" y="18.5" width="3" height="5" rx="1.5" fill="white" opacity="0.9"/>
                <circle cx="10" cy="21.5" r="2.5" fill="white" opacity="0.9"/>
                <circle cx="24" cy="21.5" r="2.5" fill="white" opacity="0.9"/>
                <path d="M13.5 14 L16 16.5 L21 11.5" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            <div className="pwa-install-text">
              <div className="pwa-install-title">התקינו את SeatSync</div>
              <div className="pwa-install-sub">גישה מהירה ישר מהמסך הראשי</div>
            </div>
            <div className="pwa-install-actions">
              <button className="btn btn-ghost" style={{ padding: '6px 10px', fontSize: 12 }} onClick={handleDismiss}>
                לא עכשיו
              </button>
              <button className="btn btn-primary" style={{ padding: '6px 14px', fontSize: 13 }} onClick={handleInstall}>
                <Icon name="Download" size={15} />
                התקן
              </button>
            </div>
          </div>

          {/* Manual install guide modal */}
          {showIOSGuide && (
            <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowIOSGuide(false)}>
              <div className="modal-content animate-scale-in" style={{ maxWidth: 360, textAlign: 'center' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📱</div>
                <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 8 }}>התקנה ידנית</div>
                {isIOS ? (
                  <div style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.8, marginBottom: 20 }}>
                    <div>1. לחצו על כפתור <strong>השיתוף</strong> (⬆️) בתחתית Safari</div>
                    <div>2. גללו ולחצו <strong>"הוסף למסך הבית"</strong></div>
                    <div>3. לחצו <strong>"הוסף"</strong></div>
                  </div>
                ) : (
                  <div style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.8, marginBottom: 20 }}>
                    <div>1. לחצו על <strong>⋮ תפריט</strong> (3 נקודות) בפינה העליונה</div>
                    <div>2. בחרו <strong>"התקן אפליקציה"</strong> או <strong>"הוסף למסך הבית"</strong></div>
                    <div>3. אשרו את ההתקנה</div>
                  </div>
                )}
                <button className="btn btn-primary" style={{ width: '100%' }} onClick={() => { setShowIOSGuide(false); handleDismiss(); }}>
                  הבנתי!
                </button>
              </div>
            </div>
          )}
        </>
      );

    // ============================================
    // Phase 6 — Onboarding
    // ============================================
    const ONBOARDING_STEPS = [
      { icon: '🎉', title: 'ברוכים הבאים ל-SeatSync!', text: 'מערכת ניהול האירועים החכמה שלך. בכמה צעדים פשוטים תוכלו לנהל מוזמנים, לשלוח הזמנות ולסדר הושבה.' },
      { icon: '👥', title: 'הוסיפו מוזמנים', text: 'הוסיפו אורחים ידנית או ייבאו מאקסל. לכל אורח יש לינק RSVP אישי שמאפשר לו לאשר הגעה ישירות.' },
      { icon: '💬', title: 'שלחו הזמנות', text: 'צרו תבנית הודעה עם משתנים כמו {שם} ו-{תאריך}, ושלחו ל-WhatsApp בלחיצה אחת לכל אורח.' },
      { icon: '🪑', title: 'סדרו הושבה', text: 'גררו אורחים לשולחנות, או סדרו את האולם ויזואלית במפת הושבה. הכל נשמר אוטומטית.' },
    ];

    function OnboardingModal({ onDone }) {
      const [step, setStep] = useState(0);
      const current = ONBOARDING_STEPS[step];
      const isLast = step === ONBOARDING_STEPS.length - 1;

      return (
        <div className="onboarding-overlay">
          <div className="onboarding-card">
            <div className="onboarding-step-dots">
              {ONBOARDING_STEPS.map((_, i) => (
                <div key={i} className={`onboarding-dot ${i === step ? 'active' : ''}`} onClick={() => setStep(i)} style={{ cursor: 'pointer' }} />
              ))}
            </div>
            <div className="onboarding-icon-wrap">{current.icon}</div>
            <div className="onboarding-title">{current.title}</div>
            <div className="onboarding-text">{current.text}</div>
            <div style={{ display: 'flex', gap: 10 }}>
              {step > 0 && (
                <button className="btn btn-ghost" style={{ flex: 1 }} onClick={() => setStep(s => s - 1)}>
                  <Icon name="ChevronRight" size={18} />הקודם
                </button>
              )}
              <button className="btn btn-primary" style={{ flex: 1 }} onClick={() => isLast ? onDone() : setStep(s => s + 1)}>
                {isLast ? (
                  <><Icon name="Check" size={18} />בואו נתחיל!</>
                ) : (
                  <>הבא<Icon name="ChevronLeft" size={18} /></>
                )}
              </button>
            </div>
            <button className="btn btn-ghost" style={{ width: '100%', marginTop: 8, fontSize: 13 }} onClick={onDone}>
              דלג
            </button>
          </div>
        </div>

      const [saving, setSaving] = useState(false);

      // Invitation upload
      const [invitationUrl, setInvitationUrl] = useState(event?.settings?.invitation_url || '');
      const [uploadingInv, setUploadingInv] = useState(false);
      const invFileRef = useRef(null);

      // Floor plan upload

      const [uploadingFloor, setUploadingFloor] = useState(false);
      const floorFileRef = useRef(null);

      const clearSupabase = () => {
        if (!confirm('אפס חיבור Supabase? ייעשה שימוש בהגדרות ברירת המחדל.')) return;
        const defaultConfig = { url: DEFAULT_SUPABASE_URL, anonKey: DEFAULT_SUPABASE_ANON_KEY };
        localStorage.setItem('seatsync-supabase', JSON.stringify(defaultConfig));
        window.location.reload();

      // If no event selected — show ONLY system settings (logout, theme, plan)

            <div className="page-title">הגדרות</div>
            <div className="page-subtitle">הגדרות מערכת — בחרו אירוע לעריכת הגדרות אירוע</div>

              <Icon name="CalendarHeart" size={20} style={{ color: 'var(--accent)' }} />

            </div>
          </div>

            <div className="settings-section-title">הגדרות מערכת</div>

              <Icon name="ChevronLeft" size={16} style={{ color: 'var(--text-tertiary)' }} />
            </div>

              <div className="settings-row-icon" style={{ color: 'var(--red-500)' }}><Icon name="LogOut" size={18} /></div>
              <div style={{ flex: 1 }}>
                <div className="settings-row-label" style={{ color: 'var(--red-500)' }}>התנתקות</div>
              </div>
              <Icon name="ChevronLeft" size={16} style={{ color: 'var(--text-tertiary)' }} />
            </div>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 40, height: 40, borderRadius: 10, background: 'linear-gradient(135deg,var(--gold-400),var(--gold-600))', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

                  <div>
                    <div style={{ fontWeight: 700, fontSize: 16 }}>תוכנית {PLAN_LIMITS[plan]?.label || 'Free'}</div>

                  </div>
                </div>
                {plan !== 'enterprise' && (
                  <button className="btn btn-primary" style={{ padding: '8px 16px', fontSize: 13 }}

                  </button>
                )}
              </div>

          </div>

          <AppLegalFooter />
        </div>
      );

      const saveEvent = async () => {
        if (!client || !event?.id) return;
        setSaving(true);
        const settings = {
          ...(event.settings || {}),
          invitation_url: invitationUrl,
          floorplan_url: floorplanUrl,
          auto_reminder_enabled: eventForm.auto_reminder_enabled,
          auto_thank_you_enabled: eventForm.auto_thank_you_enabled,
          reminder_days_before: eventForm.reminder_days_before || 3,
        };
        const { data, error } = await client.from('events').update({
          name: eventForm.name,
          event_type: eventForm.event_type,
          event_date: eventForm.event_date || null,
          event_time: eventForm.event_time || null,
          venue_name: eventForm.venue_name || null,
          venue_address: eventForm.venue_address || null,
          rsvp_enabled: eventForm.rsvp_enabled,
          rsvp_deadline: eventForm.rsvp_deadline || null,
          message_template: eventForm.message_template || null,
          settings,
        }).eq('id', event.id).select().single();

        if (error) addToast('שגיאה בשמירה: ' + error.message, 'error');
        else { onEventUpdate(data); addToast('הגדרות נשמרו ✓', 'success'); }
        setSaving(false);
      };

      // Ctrl+S shortcut to save settings
      useEffect(() => {
        const handler = () => saveEvent();
        window.addEventListener('seatsync:save-settings', handler);
        return () => window.removeEventListener('seatsync:save-settings', handler);
      }, [eventForm, invitationUrl, floorplanUrl]);

      // Upload file to Supabase Storage
      const uploadFile = async (file, bucket, folder) => {
        const ext = file.name.split('.').pop();
        const fileName = `${event.id}/${folder}_${Date.now()}.${ext}`;
        // Ensure bucket exists — ignore error if already exists
        await client.storage.createBucket(bucket, { public: true }).catch(() => {});
        const { data, error } = await client.storage.from(bucket).upload(fileName, file, {
          cacheControl: '3600',
          upsert: true,
        });
        if (error) throw error;
        const { data: { publicUrl } } = client.storage.from(bucket).getPublicUrl(fileName);
        return publicUrl;
      };

      const handleInvitationUpload = async (file) => {
        if (!file) return;
        const valid = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
        if (!valid.includes(file.type)) { addToast('פורמט לא נתמך — JPG, PNG, WebP או PDF בלבד', 'error'); return; }
        if (file.size > 10 * 1024 * 1024) { addToast('הקובץ גדול מדי — עד 10MB', 'error'); return; }
        setUploadingInv(true);
        try {
          const url = await uploadFile(file, 'invitations', 'invitation');
          setInvitationUrl(url);
          // Save immediately
          const settings = { ...(event.settings || {}), invitation_url: url, floorplan_url: floorplanUrl };
          await client.from('events').update({ settings }).eq('id', event.id);
          addToast('ההזמנה הועלתה בהצלחה ✓', 'success');
        } catch (err) {
          addToast('שגיאה בהעלאה: ' + (err.message || 'נסה שוב'), 'error');
        }
        setUploadingInv(false);
      };

      const handleFloorplanUpload = async (file) => {
        if (!file) return;
        const valid = ['image/jpeg', 'image/png', 'image/webp'];
        if (!valid.includes(file.type)) { addToast('פורמט לא נתמך — JPG, PNG או WebP בלבד', 'error'); return; }
        if (file.size > 10 * 1024 * 1024) { addToast('הקובץ גדול מדי — עד 10MB', 'error'); return; }
        setUploadingFloor(true);
        try {
          const url = await uploadFile(file, 'floorplans', 'floorplan');
          setFloorplanUrl(url);
          const settings = { ...(event.settings || {}), invitation_url: invitationUrl, floorplan_url: url };
          const { data, error } = await client.from('events').update({ settings }).eq('id', event.id).select().single();

          addToast('סקיצת האולם הועלתה ✓', 'success');

        }
        setUploadingFloor(false);

        { value: 'bat_mitzvah', label: '✡️ בת מצווה' },

        { value: 'brit_bat', label: '👶 בריתה' },
        { value: 'corporate', label: '🏢 אירוע עסקי' },
        { value: 'birthday', label: '🎂 יום הולדת' },
        { value: 'other', label: '🎉 אחר' },
      ];

              <div className="input-group">
                <label className="input-label">שם האירוע</label>
                <input className="input-field" value={eventForm.name} onChange={e => setEventForm(f => ({ ...f, name: e.target.value }))} />
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div className="input-group">
                  <label className="input-label">סוג אירוע</label>
                  <select className="input-field" value={eventForm.event_type} onChange={e => setEventForm(f => ({ ...f, event_type: e.target.value }))}>
                    {EVENT_TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                </div>
                <div className="input-group">
                  <label className="input-label">תאריך</label>
                  <input className="input-field" type="date" dir="ltr" value={eventForm.event_date} onChange={e => setEventForm(f => ({ ...f, event_date: e.target.value }))} />
                </div>
                <div className="input-group">
                  <label className="input-label">שעה</label>
                  <input className="input-field" type="time" dir="ltr" value={eventForm.event_time} onChange={e => setEventForm(f => ({ ...f, event_time: e.target.value }))} />
                </div>
                <div className="input-group">
                  <label className="input-label">שם האולם</label>
                  <input className="input-field" value={eventForm.venue_name} onChange={e => setEventForm(f => ({ ...f, venue_name: e.target.value }))} />

              <div className="input-group">
                <label className="input-label">כתובת</label>
                <input className="input-field" value={eventForm.venue_address} onChange={e => setEventForm(f => ({ ...f, venue_address: e.target.value }))} />

                <div className="settings-row-icon"><Icon name="Bell" size={18} /></div>

    // ============================================
    // Password Update Page (after reset-password link)
    // ============================================
    function PasswordUpdatePage({ onDone }) {
      const { client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [loading, setLoading] = useState(false);
      const [done, setDone] = useState(false);

      const handleUpdate = async () => {
        if (password.length < 6) { addToast('סיסמה חייבת להכיל לפחות 6 תווים', 'error'); return; }
        if (password !== confirm) { addToast('הסיסמאות אינן תואמות', 'error'); return; }
        setLoading(true);
        const { error } = await client.auth.updateUser({ password });
        if (error) {
          addToast('שגיאה בעדכון סיסמה: ' + error.message, 'error');
        } else {
          setDone(true);
          addToast('הסיסמה עודכנה בהצלחה ✓', 'success');
          setTimeout(onDone, 1500);
        }
        setLoading(false);
      };

      if (done) return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
          <div style={{ fontSize: 48 }}>✅</div>
          <div style={{ fontSize: 20, fontWeight: 800 }}>הסיסמה עודכנה!</div>
          <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>מועבר לאפליקציה...</div>
        </div>
      );

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
          <div style={{ width: '100%', maxWidth: 380 }}>
            <div style={{ textAlign: 'center', marginBottom: 28 }}>
              <div className="hero-logo" style={{ width: 64, height: 64, borderRadius: 16, margin: '0 auto 16px', animation: 'none' }}>
                <Icon name="KeyRound" size={30} />
              </div>
              <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 6 }}>עדכון סיסמה</div>
              <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>הזינו סיסמה חדשה לחשבון שלכם</div>
            </div>
            <div className="card">
              <div className="input-group">
                <label className="input-label">סיסמה חדשה</label>
                <input className="input-field" type="password" placeholder="לפחות 6 תווים" value={password} onChange={e => setPassword(e.target.value)} dir="ltr" style={{ textAlign: 'left' }} autoFocus />
              </div>
              <div className="input-group">
                <label className="input-label">אימות סיסמה</label>
                <input className="input-field" type="password" placeholder="הזינו שוב" value={confirm} onChange={e => setConfirm(e.target.value)} dir="ltr" style={{ textAlign: 'left' }} onKeyDown={e => e.key === 'Enter' && handleUpdate()} />
              </div>
              <button className="btn btn-primary" style={{ width: '100%', marginTop: 4 }} onClick={handleUpdate} disabled={loading}>
                {loading ? <><Icon name="Loader" size={18} style={{ animation: 'spin 1s linear infinite' }} />מעדכן...</> : <><Icon name="Check" size={18} />עדכן סיסמה</>}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // Payment Success Banner — shown after returning from checkout
    // ============================================
    function PaymentSuccessBanner() {
      const [show, setShow] = useState(false);
      const [planName, setPlanName] = useState('Pro');
      const { plan, isPro } = useContext(PlanContext);
      const { addToast } = useContext(ToastContext);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('payment') === 'success') {
          setShow(true);
        }
      }, []);

      useEffect(() => {
        if (show && isPro) {
          setPlanName(PLAN_LIMITS[plan]?.label || 'Pro');
          addToast('התוכנית שודרגה בהצלחה! 🎉', 'success');
        }
      }, [show, isPro, plan]);

      if (!show) return null;

      return (
        <div style={{
          background: 'linear-gradient(135deg, #D4A808 0%, #8A6D05 100%)',
          color: 'white', padding: '14px 20px', display: 'flex', alignItems: 'center', gap: 12,
          position: 'relative', zIndex: 50
        }}>
          <div style={{ fontSize: 28 }}>{isPro ? '🎉' : '⏳'}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 800, fontSize: 15 }}>
              {isPro ? `ברוכים הבאים ל-${planName}!` : 'התשלום התקבל — מפעיל...'}
            </div>
            <div style={{ fontSize: 12, opacity: 0.9 }}>
              {isPro ? 'כל הפיצ\'רים פתוחים. ניהול מושלם מתחיל עכשיו!' : 'ההפעלה תתבצע תוך מספר שניות'}
            </div>
          </div>
          <button onClick={() => setShow(false)} style={{
            background: 'rgba(255,255,255,0.2)', border: 'none', borderRadius: 8,
            width: 32, height: 32, display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'white', cursor: 'pointer', flexShrink: 0
          }}>
            <Icon name="X" size={16} />
          </button>
        </div>
      );
    }

              </div>

              {/* Unified purchase button */}
              <button className="btn btn-primary"
                style={{ width: '100%', marginTop: 20, padding: '14px 0', fontSize: 16 }}
                onClick={() => { openCheckout(selectedPlan); onClose(); }}>
                <Icon name="Zap" size={18} />
                {selectedPlan === 'pro' ? 'שדרגו ל-Pro — 99₪' : 'שדרגו ל-Enterprise — 249₪'}
              </button>

              {/* Current plan indicator */}
              {plan !== 'free' && (
                <div style={{ textAlign: 'center', marginTop: 12, fontSize: 12, color: 'var(--text-secondary)', padding: '6px 0', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-sm)' }}>
                  ✓ התוכנית הנוכחית שלכם: <strong>{plan === 'pro' ? 'Pro' : 'Enterprise'}</strong>
                </div>
              )}

              <button className="btn btn-ghost" style={{ width: '100%', marginTop: 12 }} onClick={onClose}>אחר כך</button>
              <div style={{ textAlign: 'center', marginTop: 8, fontSize: 11, color: 'var(--text-tertiary)' }}>
                💳 תשלום מאובטח דרך Lemon Squeezy · ללא חיוב חוזר
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // Phase 6 — Updated App with all features
    // ============================================
    function App() {
      const { isConfigured, saveConfig, user, loading, client } = useContext(SupabaseContext);
      const [currentRoute, setCurrentRoute] = useState(ROUTES.EVENTS);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [passwordRecovery, setPasswordRecovery] = useState(false);

      // Persist current route so returning from WhatsApp keeps the same screen
      useEffect(() => {
        try { sessionStorage.setItem('seatsync-current-route', currentRoute); } catch {}
      }, [currentRoute]);

      // Detect PASSWORD_RECOVERY event to show password update screen
      useEffect(() => {
        if (!client) return;
        const { data: { subscription } } = client.auth.onAuthStateChange((event) => {
          if (event === 'PASSWORD_RECOVERY') setPasswordRecovery(true);
          if (event === 'USER_UPDATED')      setPasswordRecovery(false);
        });
        return () => subscription.unsubscribe();
      }, [client]);

      // Restore selected event from localStorage
      useEffect(() => {
        const savedEventId = localStorage.getItem('seatsync-selected-event');
        if (savedEventId && isConfigured && user && client) {
          client.from('events').select('*').eq('id', savedEventId).eq('user_id', user.id).single()
            .then(({ data }) => {
              if (data) {
                setSelectedEvent(data);
                // Restore last route (e.g. messages send screen) instead of always going to dashboard
                const savedRoute = sessionStorage.getItem('seatsync-current-route');
                setCurrentRoute(savedRoute && Object.values(ROUTES).includes(savedRoute) ? savedRoute : ROUTES.DASHBOARD);
              } else {
                // Event doesn't belong to this user or was deleted — clean up
                localStorage.removeItem('seatsync-selected-event');
              }
            });
        }
      }, [isConfigured, user, client]);

      // Check if first time
      useEffect(() => {
        const seen = localStorage.getItem('seatsync-onboarding-done');
        if (!seen) setShowOnboarding(true);
      }, []);

      const doneOnboarding = () => {
        localStorage.setItem('seatsync-onboarding-done', '1');
        setShowOnboarding(false);
      };

      const handleSelectEvent = (event) => {
        setSelectedEvent(event);
        localStorage.setItem('seatsync-selected-event', event.id);
        setCurrentRoute(ROUTES.DASHBOARD);
      };

      const handleEventUpdate = (updatedEvent) => {
        setSelectedEvent(updatedEvent);
      };

      // Bug fix 2.1: clear selected event when deleted
      const handleClearSelectedEvent = () => {
        setSelectedEvent(null);
        setCurrentRoute(ROUTES.EVENTS);
      };

      // Keyboard shortcuts (desktop)
      useEffect(() => {
        const handler = (e) => {
          const tag = document.activeElement?.tagName;
          if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
          if (!user) return;

          switch(e.key) {
            case 'Escape': break;
            case 'n': case 'N':
              if (currentRoute === ROUTES.GUESTS) {
                window.dispatchEvent(new CustomEvent('seatsync:add-guest'));
              }
              break;
            case '1': setCurrentRoute(ROUTES.EVENTS); break;
            case '2': if (selectedEvent) setCurrentRoute(ROUTES.DASHBOARD); break;
            case '3': if (selectedEvent) setCurrentRoute(ROUTES.GUESTS); break;
            case '4': if (selectedEvent) setCurrentRoute(ROUTES.MESSAGES); break;
            case '5': if (selectedEvent) setCurrentRoute(ROUTES.SEATING); break;
            case 's': case 'S':
              if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                window.dispatchEvent(new CustomEvent('seatsync:save-settings'));
              }
              break;
            default: break;
          }
        };
        window.addEventListener('keydown', handler);

        // Navigate to settings from anywhere (e.g. invitation upload warning)
        const goSettings = () => setCurrentRoute(ROUTES.SETTINGS);
        window.addEventListener('seatsync:go-settings', goSettings);

        return () => {
          window.removeEventListener('keydown', handler);
          window.removeEventListener('seatsync:go-settings', goSettings);
        };
      }, [user, currentRoute, selectedEvent]);

      if (!isConfigured) return <ConfigModal onSave={saveConfig} />;

      if (loading) return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16 }}>
          <div className="hero-logo" style={{ animation: 'float 1.5s ease-in-out infinite' }}>
            <Icon name="Armchair" size={36} />
          </div>
          <div style={{ fontSize: 14, color: 'var(--text-secondary)' }}>טוען SeatSync...</div>
        </div>
      );

      if (!user) return <AuthPage />;

      // Password reset link clicked → show update password screen
      if (passwordRecovery) return <PasswordUpdatePage onDone={() => setPasswordRecovery(false)} />;

      const NAV_ITEMS = [
        { id: ROUTES.EVENTS,    icon: 'CalendarDays',    label: 'אירועים' },
        { id: ROUTES.DASHBOARD, icon: 'LayoutDashboard', label: 'דשבורד' },
        { id: ROUTES.GUESTS,    icon: 'Users',           label: 'מוזמנים' },
        { id: ROUTES.MESSAGES,  icon: 'Send',            label: 'הודעות' },
        { id: ROUTES.SEATING,   icon: 'Armchair',        label: 'הושבה' },
        { id: ROUTES.SETTINGS,  icon: 'Settings',        label: 'הגדרות' },
      ];

      const renderPage = () => {
        switch (currentRoute) {
          case ROUTES.EVENTS:
            return <EventsPage onSelectEvent={handleSelectEvent} selectedEventId={selectedEvent?.id} onClearSelectedEvent={handleClearSelectedEvent} />;
          case ROUTES.DASHBOARD:
            return <DashboardPage event={selectedEvent} onGoToGuests={() => setCurrentRoute(ROUTES.GUESTS)} />;
          case ROUTES.GUESTS:
            return <GuestsPage event={selectedEvent} />;
          case ROUTES.MESSAGES:
            return <MessagesPage event={selectedEvent} />;
          case ROUTES.SEATING:
            return <SeatingPage event={selectedEvent} />;
          case ROUTES.SETTINGS:
            return <SettingsPage event={selectedEvent} onEventUpdate={handleEventUpdate} />;
          default:
            return <DashboardPage event={selectedEvent} />;
        }
      };

      const { showUpgradeModal, setShowUpgradeModal } = useContext(PlanContext);

      return (
        <ErrorBoundary>
          <OfflineBanner />
          <PaymentSuccessBanner />
          <PWAInstallBanner />
          {showOnboarding && user && <OnboardingModal onDone={doneOnboarding} />}
          {showUpgradeModal && <UpgradeModal onClose={() => setShowUpgradeModal(false)} />}
          <TopBar event={selectedEvent} onSettings={() => setCurrentRoute(ROUTES.SETTINGS)} currentRoute={currentRoute} onNavigate={setCurrentRoute} />
          <main className="main-content">
            <ErrorBoundary key={currentRoute}>
              {renderPage()}
            </ErrorBoundary>
          </main>
          <BottomNav currentRoute={currentRoute} onNavigate={setCurrentRoute} items={NAV_ITEMS} />
        </ErrorBoundary>
      );
    }

    // ============================================
    // Root Render
    // ============================================
    function Root() {
      return (
        <ThemeProvider>
          <PWAInstallProvider>
            <SupabaseProvider>
              <PlanProvider>
                <ToastProvider>
                  <App />
                </ToastProvider>
              </PlanProvider>
            </SupabaseProvider>
          </PWAInstallProvider>
        </ThemeProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
