                  </div>
                )}

                {/* Message rounds summary */}
                {rounds.length > 0 && (
                  <div className="chart-card animate-slide-up stagger-5">
                    <div className="chart-title">סבבי הודעות</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                      {rounds.slice(0, 3).map(r => (
                        <div key={r.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--border-light)' }}>
                          <div style={{ width: 32, height: 32, borderRadius: 'var(--radius-sm)', background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 13, color: 'var(--accent)', flexShrink: 0 }}>
                            {r.round_number}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 600 }}>סבב {r.round_number}</div>
                            <div style={{ fontSize: 11, color: 'var(--text-tertiary)' }}>{new Date(r.sent_at).toLocaleDateString('he-IL')}</div>
                          </div>
                          <div style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: 16, fontWeight: 800, color: '#25D366' }}>{r.total_sent || 0}</div>
                            <div style={{ fontSize: 10, color: 'var(--text-tertiary)' }}>נשלחו</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    }
    // ============================================
    // Validation helpers
    // ============================================
    const VALIDATION = {
      sanitize: (v) => String(v || '').trim().replace(/<[^>]*>/g, ''),
      phone: (v) => {
        const clean = String(v || '').replace(/[\s\-()]/g, '');
        return /^(\+972|0)(5[0-9]|7[0-9])\d{7}$/.test(clean) || /^\+?[0-9]{7,15}$/.test(clean);
      },
      normalizePhone: (v) => String(v || '').replace(/[\s\-()]/g, ''),
    };

    // Group colors palette
    const GROUP_COLORS = {
      'כללי': '#94A3B8',
      'משפחה': '#F472B6',
      'חברים': '#60A5FA',
      'עבודה': '#34D399',
      'צד חתן': '#818CF8',
      'צד כלה': '#FB923C',
      'VIP': '#F5C518',
    };

    function getGroupColor(group) {
      return GROUP_COLORS[group] || '#94A3B8';
    }

    const STATUS_CONFIG = {
      pending:   { label: 'ממתין', color: 'var(--blue-500)',    bg: 'rgba(59,130,246,0.1)',   icon: 'Clock' },
      confirmed: { label: 'מגיע',  color: 'var(--emerald-500)', bg: 'rgba(16,185,129,0.1)',  icon: 'CheckCircle2' },
      declined:  { label: 'לא מגיע', color: 'var(--red-500)',   bg: 'rgba(239,68,68,0.1)',   icon: 'XCircle' },
      maybe:     { label: 'אולי',  color: 'var(--amber-500)',   bg: 'rgba(245,158,11,0.1)',  icon: 'HelpCircle' },
    };

    function StatusBadge({ status, onClick, small }) {
      const cfg = STATUS_CONFIG[status] || STATUS_CONFIG.pending;
      return (
        <span
          className="status-btn"
          onClick={onClick}
          style={{
            background: cfg.bg,
            color: cfg.color,
            cursor: onClick ? 'pointer' : 'default',
            fontSize: small ? '11px' : '12px',
            padding: small ? '2px 8px' : '4px 10px',
          }}
        >
          <Icon name={cfg.icon} size={small ? 11 : 13} />
          {cfg.label}
        </span>
      );
    }

    // ============================================
    // Add/Edit Guest Modal
    // ============================================
    function GuestModal({ guest, eventId, existingPhones, onSave, onClose }) {
      const isEdit = !!guest;
      const [form, setForm] = useState({
        name: guest?.name || '',
        phone: guest?.phone || '',
        email: guest?.email || '',
        group_name: guest?.group_name || 'כללי',
        expected_guests: guest?.expected_guests || 1,
        status: guest?.status || 'pending',
        confirmed_guests: guest?.confirmed_guests || 0,
        dietary_notes: guest?.dietary_notes || '',
        notes: guest?.notes || '',
      });
      const [errors, setErrors] = useState({});
      const [phoneDupWarn, setPhoneDupWarn] = useState(false);

      const groups = ['כללי', 'משפחה', 'חברים', 'עבודה', 'צד חתן', 'צד כלה', 'VIP'];
      const statuses = ['pending', 'confirmed', 'declined', 'maybe'];

      const validate = () => {
        const errs = {};
        const name = VALIDATION.sanitize(form.name);
        if (!name) errs.name = 'שם חובה';
        else if (name.length > 100) errs.name = 'שם ארוך מדי';

        if (form.phone) {
          if (!VALIDATION.phone(form.phone)) errs.phone = 'מספר טלפון לא תקין';
        }
        if (form.expected_guests < 1 || form.expected_guests > 20) errs.expected_guests = '1–20 מוזמנים';
        return errs;
      };

      const handlePhoneChange = (v) => {
        setForm(f => ({ ...f, phone: v }));
        const normalized = VALIDATION.normalizePhone(v);
        const isDup = existingPhones.some(p =>
          p.phone === normalized && p.id !== (guest?.id || '')
        );
        setPhoneDupWarn(isDup && !!normalized);
      };

      const handleSubmit = () => {
        const errs = validate();
        setErrors(errs);
        if (Object.keys(errs).length > 0) return;
        onSave({
          ...form,
          name: VALIDATION.sanitize(form.name),
          phone: VALIDATION.normalizePhone(form.phone),
          email: VALIDATION.sanitize(form.email),
          group_name: VALIDATION.sanitize(form.group_name),
          dietary_notes: VALIDATION.sanitize(form.dietary_notes),
          notes: VALIDATION.sanitize(form.notes),
          expected_guests: parseInt(form.expected_guests) || 1,
          confirmed_guests: parseInt(form.confirmed_guests) || 0,
        });
      };

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-content animate-scale-in" style={{ maxWidth: 460 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
              <div className="modal-title">{isEdit ? 'עריכת אורח' : 'הוספת אורח'}</div>
              <button className="icon-btn" onClick={onClose}><Icon name="X" size={20} /></button>
            </div>

            <div className="modal-scroll">
              {/* Name */}
              <div className="input-group">
                <label className="input-label">שם מלא *</label>
                <input
                  className="input-field"
                  placeholder="ישראל ישראלי"
                  value={form.name}
                  onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                  style={errors.name ? { borderColor: 'var(--red-500)' } : {}}
                  maxLength={100}
                  autoFocus
                />
                {errors.name && <div style={{ color: 'var(--red-500)', fontSize: 12, marginTop: 4 }}>{errors.name}</div>}
              </div>

              {/* Phone + Email */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div className="input-group">
                  <label className="input-label">טלפון</label>
                  <input
                    className="input-field"
                    placeholder="050-0000000"
                    value={form.phone}
                    onChange={e => handlePhoneChange(e.target.value)}
                    dir="ltr"
                    style={{ textAlign: 'right', ...(errors.phone ? { borderColor: 'var(--red-500)' } : {}) }}
                    maxLength={20}
                  />
                  {errors.phone && <div style={{ color: 'var(--red-500)', fontSize: 12, marginTop: 4 }}>{errors.phone}</div>}
                  {phoneDupWarn && <div style={{ color: 'var(--amber-500)', fontSize: 12, marginTop: 4 }}>⚠️ מספר כפול</div>}
                </div>
                <div className="input-group">
                  <label className="input-label">אימייל</label>
                  <input
                    className="input-field"
                    type="email"
                    placeholder="email@example.com"
                    value={form.email}
                    onChange={e => setForm(f => ({ ...f, email: e.target.value }))}
                    dir="ltr"
                    style={{ textAlign: 'right' }}
                    maxLength={200}
                  />
                </div>
              </div>

              {/* Group + Expected */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <div className="input-group">
                  <label className="input-label">קבוצה</label>
                  <select
                    className="input-field"
                    value={form.group_name}
                    onChange={e => setForm(f => ({ ...f, group_name: e.target.value }))}
                  >
                    {groups.map(g => <option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <div className="input-group">
                  <label className="input-label">מוזמנים צפויים</label>
                  <input
                    className="input-field"
                    type="number"
                    min="1"
                    max="20"
                    value={form.expected_guests}
                    onChange={e => setForm(f => ({ ...f, expected_guests: e.target.value }))}
                    style={errors.expected_guests ? { borderColor: 'var(--red-500)' } : {}}
                  />
                  {errors.expected_guests && <div style={{ color: 'var(--red-500)', fontSize: 12, marginTop: 4 }}>{errors.expected_guests}</div>}
                </div>
              </div>

              {/* Status + Confirmed (only in edit) */}
              {isEdit && (
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <div className="input-group">
                    <label className="input-label">סטטוס</label>
                    <select
                      className="input-field"
                      value={form.status}
                      onChange={e => setForm(f => ({ ...f, status: e.target.value }))}
                    >
                      {statuses.map(s => <option key={s} value={s}>{STATUS_CONFIG[s].label}</option>)}
                    </select>
                  </div>
                  <div className="input-group">
                    <label className="input-label">אישרו הגעה</label>
                    <input
                      className="input-field"
                      type="number"
                      min="0"
                      max="20"
                      value={form.confirmed_guests}
                      onChange={e => setForm(f => ({ ...f, confirmed_guests: e.target.value }))}
                    />
                  </div>
                </div>
              )}

              {/* Dietary + Notes */}
              <div className="input-group">
                <label className="input-label">הערות תזונה</label>
                <input
                  className="input-field"
                  placeholder="צמחוני, ללא גלוטן, אלרגיה לאגוזים..."
                  value={form.dietary_notes}
                  onChange={e => setForm(f => ({ ...f, dietary_notes: e.target.value }))}
                  maxLength={200}
                />
              </div>

              <div className="input-group" style={{ marginBottom: 0 }}>
                <label className="input-label">הערות</label>
                <textarea
                  className="input-field"
                  placeholder="הערות נוספות..."
                  value={form.notes}
                  onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
                  rows={2}
                  style={{ resize: 'none' }}
                  maxLength={500}
                />
              </div>
            </div>

            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 20 }}>
              <button className="btn btn-ghost" onClick={onClose}>ביטול</button>
              <button className="btn btn-primary" onClick={handleSubmit}>
                <Icon name={isEdit ? 'Save' : 'UserPlus'} size={18} />
                {isEdit ? 'שמור שינויים' : 'הוסף אורח'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================
    // Delete Confirm Modal
    // ============================================
    function DeleteConfirmModal({ count, onConfirm, onClose }) {
      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-content animate-scale-in" style={{ maxWidth: 380 }}>
            <div className="confirm-dialog">

    // ============================================
    // Excel Import Modal
    // ============================================
    function ImportModal({ eventId, existingGuests, onImport, onClose }) {
      const [step, setStep] = useState('upload'); // upload | preview | importing
      const [rawRows, setRawRows] = useState([]);
      const [mapping, setMapping] = useState({ name: '', phone: '', group_name: '', expected_guests: '' });
      const [headers, setHeaders] = useState([]);
      const [duplicates, setDuplicates] = useState(new Set());
      const [fileName, setFileName] = useState('');
      const [importing, setImporting] = useState(false);
      const [summary, setSummary] = useState(null);
      const fileRef = useRef(null);

      const AUTO_MAP = {
        name: ['שם', 'name', 'full_name', 'שם מלא', 'שם פרטי'],
        phone: ['טלפון', 'phone', 'נייד', 'mobile', 'cell', 'מספר'],
        group_name: ['קבוצה', 'group', 'צד', 'side', 'חלק'],
        expected_guests: ['מספר מוזמנים', 'כמות', 'מוזמנים', 'guests', 'expected', 'כמה'],
      };

      const handleFile = (file) => {
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          if (rows.length < 2) return;

          const hdrs = rows[0].map(h => String(h).trim());
          setHeaders(hdrs);
          setRawRows(rows.slice(1).filter(r => r.some(c => c !== '')));

          // Auto-map columns
          const newMap = { name: '', phone: '', group_name: '', expected_guests: '' };
          hdrs.forEach((h, i) => {
            Object.entries(AUTO_MAP).forEach(([field, keywords]) => {
              if (!newMap[field] && keywords.some(k => h.toLowerCase().includes(k.toLowerCase()))) {
                newMap[field] = String(i);
              }
            });
          });
          setMapping(newMap);
          setStep('preview');
        };
        reader.readAsArrayBuffer(file);
      };

      const getMapped = (row, field) => {
        const idx = parseInt(mapping[field]);
        return isNaN(idx) ? '' : String(row[idx] || '').trim();
      };

      const previewRows = useMemo(() => {
        const existingPhones = new Set(existingGuests.map(g => VALIDATION.normalizePhone(g.phone)));
        const dups = new Set();
        const rows = rawRows.slice(0, 50).map((row, i) => {
          const phone = VALIDATION.normalizePhone(getMapped(row, 'phone'));
          const isDup = phone && existingPhones.has(phone);
          if (isDup) dups.add(i);
          return { row, isDup };
        });
        setDuplicates(dups);
        return rows;
      }, [rawRows, mapping, existingGuests]);

      const handleImport = async () => {
        setImporting(true);
        const existingPhones = new Set(existingGuests.map(g => VALIDATION.normalizePhone(g.phone)));
        let imported = 0, skipped = 0, errors = 0;

        const toInsert = rawRows
          .map(row => {
            const name = VALIDATION.sanitize(getMapped(row, 'name'));
            if (!name) return null;
            const phone = VALIDATION.normalizePhone(getMapped(row, 'phone'));
            if (phone && existingPhones.has(phone)) { skipped++; return null; }
            const eg = parseInt(getMapped(row, 'expected_guests')) || 1;
            return {
              name,
              phone: phone || null,
              group_name: VALIDATION.sanitize(getMapped(row, 'group_name')) || 'כללי',
              expected_guests: Math.max(1, Math.min(20, eg)),
              status: 'pending',
              event_id: eventId,
            };
          })
          .filter(Boolean);

        setSummary({ imported: toInsert.length, skipped, errors });
        onImport(toInsert);
        setStep('done');
        setImporting(false);
      };

      if (step === 'done') {
        return (
          <div className="modal-overlay">
            <div className="modal-content animate-scale-in" style={{ maxWidth: 360 }}>
              <div className="confirm-dialog">
                <div style={{ width: 56, height: 56, borderRadius: 'var(--radius-xl)', background: 'rgba(16,185,129,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}>
                  <Icon name="CheckCircle2" size={28} style={{ color: 'var(--emerald-500)' }} />
                </div>
                <div className="confirm-dialog-title">ייבוא הושלם!</div>
                {summary && (
                  <div style={{ display: 'flex', gap: 20, justifyContent: 'center', margin: '12px 0 20px' }}>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--emerald-500)' }}>{summary.imported}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>יובאו</div>
                    </div>
                    {summary.skipped > 0 && (
                      <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--amber-500)' }}>{summary.skipped}</div>
                        <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>דולגו (כפולים)</div>
                      </div>
                    )}
                  </div>
                )}
                <button className="btn btn-primary" onClick={onClose} style={{ width: '100%' }}>סיום</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal-content animate-scale-in" style={{ maxWidth: 560, width: '95vw' }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
              <div className="modal-title">ייבוא מאקסל</div>
              <button className="icon-btn" onClick={onClose}><Icon name="X" size={20} /></button>
            </div>

            {step === 'upload' && (
              <div>
                <div
                  className="upload-zone"
                  onClick={() => fileRef.current?.click()}
                  onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                  onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
                  onDrop={e => {
                    e.preventDefault();
                    e.currentTarget.classList.remove('drag-over');
                    handleFile(e.dataTransfer.files[0]);
                  }}
                >
                  <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={e => handleFile(e.target.files[0])} />
                  <Icon name="FileSpreadsheet" size={36} style={{ color: 'var(--accent)', marginBottom: 12 }} />
                  <div style={{ fontWeight: 600, marginBottom: 6 }}>גררו קובץ לכאן או לחצו לבחירה</div>
                  <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>Excel (XLSX, XLS) או CSV</div>
                </div>
                <div style={{ marginTop: 16, padding: 12, background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-sm)', fontSize: 13, color: 'var(--text-secondary)' }}>
                  <div style={{ fontWeight: 600, marginBottom: 6, color: 'var(--text-primary)' }}>פורמט מומלץ:</div>
                  <div>עמודות: שם | טלפון | קבוצה | מספר מוזמנים</div>
                  <div style={{ marginTop: 4 }}>השורה הראשונה = כותרות</div>
                </div>
              </div>
            )}

            {step === 'preview' && (
              <div>
                <div style={{ marginBottom: 14, fontSize: 13, color: 'var(--text-secondary)' }}>
                  <Icon name="FileText" size={14} style={{ display: 'inline', marginLeft: 4 }} />
                  {fileName} — {rawRows.length} שורות
                </div>

                {/* Column mapping */}
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
                  {[
                    { field: 'name', label: 'עמודת שם *' },
                    { field: 'phone', label: 'עמודת טלפון' },
                    { field: 'group_name', label: 'עמודת קבוצה' },
                    { field: 'expected_guests', label: 'עמודת כמות' },
                  ].map(({ field, label }) => (
                    <div key={field}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 4 }}>{label}</div>
                      <select
                        className="filter-select"
                        style={{ width: '100%' }}
                        value={mapping[field]}
                        onChange={e => setMapping(m => ({ ...m, [field]: e.target.value }))}
                      >
                        <option value="">-- לא ממופה --</option>
                        {headers.map((h, i) => <option key={i} value={String(i)}>{h}</option>)}
                      </select>
                    </div>
                  ))}
                </div>

                {/* Preview table */}
                <div className="import-preview">
                  <table>
                    <thead>
                      <tr>
                        <th>שם</th>
                        <th>טלפון</th>
                        <th>קבוצה</th>
                        <th>כמות</th>
                        <th>סטטוס</th>
                      </tr>
                    </thead>
                    <tbody>
                      {previewRows.map(({ row, isDup }, i) => (
                        <tr key={i} className={isDup ? 'duplicate-row' : ''}>
                          <td>{getMapped(row, 'name') || '—'}</td>
                          <td>{getMapped(row, 'phone') || '—'}</td>
                          <td>{getMapped(row, 'group_name') || 'כללי'}</td>
                          <td>{getMapped(row, 'expected_guests') || '1'}</td>
                          <td style={{ whiteSpace: 'nowrap' }}>
                            {isDup ? <span style={{ color: 'var(--amber-500)', fontSize: 12 }}>⚠️ כפול</span> : <span style={{ color: 'var(--emerald-500)', fontSize: 12 }}>✓ חדש</span>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                {rawRows.length > 50 && <div style={{ fontSize: 12, color: 'var(--text-tertiary)', marginTop: 6, textAlign: 'center' }}>מוצגות 50 שורות ראשונות מתוך {rawRows.length}</div>}

                {duplicates.size > 0 && (
                  <div style={{ marginTop: 10, padding: '8px 12px', background: 'rgba(245,158,11,0.1)', borderRadius: 'var(--radius-sm)', fontSize: 13, color: 'var(--amber-500)' }}>
                    {duplicates.size} שורות עם מספר טלפון קיים — יידולגו בייבוא
                  </div>
                )}

                <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 16 }}>
                  <button className="btn btn-ghost" onClick={() => setStep('upload')}>חזרה</button>
                  <button className="btn btn-primary" onClick={handleImport} disabled={importing}>
                    <Icon name="Download" size={18} />
                    ייבא {rawRows.length - duplicates.size} אורחים
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================
    // Status Quick-Change Popover
    // ============================================
    function StatusPopover({ guest, onUpdate, onClose }) {
      const statuses = ['pending', 'confirmed', 'declined', 'maybe'];
      return (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center'
        }} onClick={onClose}>
          <div
            className="card animate-scale-in"
            style={{ padding: 12, minWidth: 180, boxShadow: 'var(--shadow-xl)' }}
            onClick={e => e.stopPropagation()}
          >
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-secondary)', marginBottom: 8, padding: '0 4px' }}>
              שנה סטטוס — {guest.name}
            </div>
            {statuses.map(s => (
              <button
                key={s}
                style={{
                  display: 'flex', alignItems: 'center', gap: 8, width: '100%', padding: '8px 10px',
                  borderRadius: 'var(--radius-sm)', fontSize: 14, fontWeight: 500,
                  color: guest.status === s ? STATUS_CONFIG[s].color : 'var(--text-primary)',
                  background: guest.status === s ? STATUS_CONFIG[s].bg : 'transparent',
                  transition: 'all 0.15s',
                }}
                onClick={() => { onUpdate(guest, s); onClose(); }}
                onMouseEnter={e => { if (guest.status !== s) e.currentTarget.style.background = 'var(--bg-hover)'; }}
                onMouseLeave={e => { if (guest.status !== s) e.currentTarget.style.background = 'transparent'; }}
              >
                <Icon name={STATUS_CONFIG[s].icon} size={16} />
                {STATUS_CONFIG[s].label}
                {guest.status === s && <Icon name="Check" size={14} style={{ marginRight: 'auto' }} />}
              </button>
            ))}

            {/* Confirmed guests count */}
            {guest.status === 'confirmed' && (
              <div style={{ marginTop: 10, padding: '8px 10px', borderTop: '1px solid var(--border-light)' }}>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 6 }}>כמה מגיעים?</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <button className="icon-btn" style={{ width: 28, height: 28 }} onClick={() => onUpdate(guest, guest.status, Math.max(0, (guest.confirmed_guests || 0) - 1))}>
                    <Icon name="Minus" size={14} />
                  </button>
                  <span style={{ fontWeight: 700, minWidth: 24, textAlign: 'center' }}>{guest.confirmed_guests || 0}</span>
                  <button className="icon-btn" style={{ width: 28, height: 28 }} onClick={() => onUpdate(guest, guest.status, Math.min(20, (guest.confirmed_guests || 0) + 1))}>
                    <Icon name="Plus" size={14} />
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ============================================
    // Guests Page — Full Implementation
    // ============================================
    function GuestsPage({ event }) {
      const { client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const { limits, isPro } = useContext(PlanContext);
      const isMobile = useIsMobile();

      // State
      const [guests, setGuests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [search, setSearch] = useState('');
      const [filterStatus, setFilterStatus] = useState('all');
      const [filterGroup, setFilterGroup] = useState('all');
      const [sortBy, setSortBy] = useState('created_at');
      const [sortDir, setSortDir] = useState('desc');
      const [selected, setSelected] = useState(new Set());
      const [page, setPage] = useState(1);
      const PAGE_SIZE = 20;
      const [upsellFeature, setUpsellFeature] = useState(null); // plan upsell modal

      // Modals
      const [showAdd, setShowAdd] = useState(false);
      const [editGuest, setEditGuest] = useState(null);
      const [deleteTarget, setDeleteTarget] = useState(null); // guest or 'bulk'
      const [showImport, setShowImport] = useState(false);
      const [statusPopover, setStatusPopover] = useState(null);
      const [bulkGroupTarget, setBulkGroupTarget] = useState('');
      const [showBulkGroup, setShowBulkGroup] = useState(false);

      const searchDebounceRef = useRef(null);
      const [searchInput, setSearchInput] = useState('');

      // Debounced search
      const handleSearchChange = (v) => {
        setSearchInput(v);
        clearTimeout(searchDebounceRef.current);
        searchDebounceRef.current = setTimeout(() => {
          setSearch(v);
          setPage(1);
        }, 300);
      };

      // Fetch guests
      useEffect(() => {
        if (!event?.id) return;
        fetchGuests();
      }, [client, event?.id]);

      // Keyboard shortcut: N → add guest (triggered from App)
      useEffect(() => {
        const handler = () => setShowAdd(true);
        window.addEventListener('seatsync:add-guest', handler);
        return () => window.removeEventListener('seatsync:add-guest', handler);
      }, []);

      const fetchGuests = async () => {
        if (!client || !event?.id) return;
        setLoading(true);
        const { data, error } = await client
          .from('guests')
          .select('*')
          .eq('event_id', event.id)
          .order('created_at', { ascending: false });
        if (error) addToast('שגיאה בטעינת מוזמנים', 'error');
        else setGuests(data || []);
        setLoading(false);
      };

      // Filter + sort
      const filtered = useMemo(() => {
        let list = [...guests];

        // Search
        if (search.trim()) {
          const q = search.toLowerCase();
          list = list.filter(g =>
            g.name?.toLowerCase().includes(q) ||
            g.phone?.includes(q) ||
            g.group_name?.toLowerCase().includes(q)
          );
        }

        // Status filter
        if (filterStatus !== 'all') list = list.filter(g => g.status === filterStatus);

        // Group filter
        if (filterGroup !== 'all') list = list.filter(g => g.group_name === filterGroup);

        // Sort
        list.sort((a, b) => {
          let va = a[sortBy], vb = b[sortBy];
          if (typeof va === 'string') va = va.toLowerCase();
          if (typeof vb === 'string') vb = vb.toLowerCase();
          if (va < vb) return sortDir === 'asc' ? -1 : 1;
          if (va > vb) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });

        return list;
      }, [guests, search, filterStatus, filterGroup, sortBy, sortDir]);

      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      const paginated = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

      // Stats
      const stats = useMemo(() => {
        const total = guests.length;
        const confirmed = guests.filter(g => g.status === 'confirmed').length;
        const pending = guests.filter(g => g.status === 'pending').length;
        const declined = guests.filter(g => g.status === 'declined').length;
        const maybe = guests.filter(g => g.status === 'maybe').length;
        const totalGuests = guests.reduce((sum, g) => sum + (g.confirmed_guests || 0), 0);
        return { total, confirmed, pending, declined, maybe, totalGuests };
      }, [guests]);

      // Unique groups
      const groups = useMemo(() => {
        const gs = [...new Set(guests.map(g => g.group_name).filter(Boolean))];
        return gs.sort();
      }, [guests]);

      // Existing phones for dup detection
      const existingPhones = useMemo(() =>
        guests.map(g => ({ id: g.id, phone: VALIDATION.normalizePhone(g.phone) }))
      , [guests]);

      if (!event) return <NeedEventState />;

      // Sort handler
      const handleSort = (col) => {
        if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortBy(col); setSortDir('asc'); }
        setPage(1);
      };

      // Selection
      const toggleSelect = (id) => {
        setSelected(s => {
          const n = new Set(s);
          n.has(id) ? n.delete(id) : n.add(id);
          return n;
        });
      };

      const toggleSelectAll = () => {
        if (selected.size === paginated.length) setSelected(new Set());
        else setSelected(new Set(paginated.map(g => g.id)));
      };

      // Add guest
      // Generate secure RSVP token
      const generateToken = () => {
        const bytes = crypto.getRandomValues(new Uint8Array(24));
        return btoa(String.fromCharCode(...bytes)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
      };

      // Import from phone contacts (Contact Picker API)
      const [showContactsPaste, setShowContactsPaste] = useState(false);
      const [contactsPasteText, setContactsPasteText] = useState('');

      const importFromContacts = async () => {
        // Try Contact Picker API first (Chrome Android)
        if ('contacts' in navigator && 'ContactsManager' in window) {
          try {
            const contacts = await navigator.contacts.select(
              ['name', 'tel'],
              { multiple: true }
            );
            if (!contacts || contacts.length === 0) return;
            processImportedContacts(contacts.map(c => ({
              name: (c.name && c.name[0]) || '',
              phone: (c.tel && c.tel[0]) || '',
            })));
          } catch (err) {
            if (err.name !== 'AbortError') {
              addToast('שגיאה בייבוא אנשי קשר', 'error');
            }
          }
        } else {
          // Fallback: show paste dialog
          setShowContactsPaste(true);
        }
      };

      const processImportedContacts = (rawContacts) => {
        const spotsLeft = limits.guests - guests.length;
        if (spotsLeft <= 0) {
          addToast(`הגעתם למגבלת ${limits.guests} מוזמנים. שדרגו כדי להוסיף עוד.`, 'error');
          setUpsellFeature('guests');
          return;
        }

        const toImport = rawContacts.slice(0, spotsLeft);
        const existingPhones = new Set(guests.map(g => g.phone?.replace(/[\s\-()]/g, '')).filter(Boolean));

        const newGuests = [];
        let skipped = 0;
        for (const c of toImport) {
          let name = (c.name || '').trim();
          let phone = (c.phone || '').replace(/[\s\-()]/g, '');
          if (!name && !phone) { skipped++; continue; }
          if (phone.startsWith('+972')) phone = '0' + phone.slice(4);
          if (existingPhones.has(phone)) { skipped++; continue; }
          existingPhones.add(phone);
          newGuests.push({
            event_id: event.id,
            name,
            phone,
            group_name: 'כללי',
            expected_guests: 1,
            rsvp_token: generateToken(),
          });
        }

        if (newGuests.length === 0) {
          addToast(skipped > 0 ? `${skipped} אנשי קשר כבר קיימים ברשימה` : 'לא נמצאו אנשי קשר להוספה', 'error');
          return;
        }

        (async () => {
          const { data, error } = await client.from('guests').insert(newGuests).select();
          if (error) { addToast('שגיאה בייבוא: ' + error.message, 'error'); return; }
          setGuests(prev => [...(data || []), ...prev]);
          const msg = `${data?.length || 0} אנשי קשר יובאו בהצלחה ✓` + (skipped > 0 ? ` (${skipped} דולגו — כפילויות)` : '');
          addToast(msg, 'success');
          setShowContactsPaste(false);
          setContactsPasteText('');

          if (rawContacts.length > spotsLeft) {
            addToast(`רק ${spotsLeft} מתוך ${rawContacts.length} יובאו — מגבלת תוכנית`, 'error');
          }
        })();
      };

      const handleContactsPaste = () => {
        if (!contactsPasteText.trim()) return;
        // Parse pasted text: each line is "name, phone" or "name\tphone" or just "name phone"
        const lines = contactsPasteText.split('\n').filter(l => l.trim());
        const contacts = lines.map(line => {
          // Try tab, comma, or multiple spaces as separator
          let parts = line.includes('\t') ? line.split('\t') : line.includes(',') ? line.split(',') : line.split(/\s{2,}/);
          if (parts.length === 1) {
            // Try to extract phone from the end
            const phoneMatch = line.match(/(0[0-9]{9,10}|\\+972[0-9]{9,10})\s*$/);
            if (phoneMatch) {
              return { name: line.replace(phoneMatch[0], '').trim(), phone: phoneMatch[0].trim() };
            }
            return { name: line.trim(), phone: '' };
          }
          // Find which part looks like a phone
          const phonePart = parts.find(p => /^[\d\+\-\s()]{7,}$/.test(p.trim()));
          const namePart = parts.find(p => p !== phonePart) || parts[0];
          return { name: (namePart || '').trim(), phone: (phonePart || '').trim() };
        });
        processImportedContacts(contacts);
      };

      const handleAdd = async (form) => {
        // Plan limit check
        if (guests.length >= limits.guests) {
          addToast(`תוכנית ${limits.label} מאפשרת עד ${limits.guests} מוזמנים. שדרגו לתוכנית גבוהה יותר.`, 'error');
          setUpsellFeature('guests');
          return;
        }
        const { data, error } = await client.from('guests').insert({
          ...form,
          event_id: event.id,
          rsvp_token: generateToken(),
        }).select().single();

        if (error) addToast('שגיאה בהוספת אורח: ' + error.message, 'error');
        else {
          setGuests(prev => [data, ...prev]);
          setShowAdd(false);
          addToast(`${form.name} נוסף בהצלחה ✓`, 'success');
        }
      };

      // Edit guest
      const handleEdit = async (form) => {
        const { data, error } = await client.from('guests').update(form).eq('id', editGuest.id).select().single();
        if (error) addToast('שגיאה בעדכון אורח', 'error');
        else {
          setGuests(prev => prev.map(g => g.id === editGuest.id ? data : g));
          setEditGuest(null);
          addToast('עודכן בהצלחה ✓', 'success');
        }
      };

      // Delete
      const handleDelete = async () => {
        if (deleteTarget === 'bulk') {
          const ids = [...selected];
          const { error } = await client.from('guests').delete().in('id', ids);
          if (error) addToast('שגיאה במחיקה', 'error');
          else {
            setGuests(prev => prev.filter(g => !ids.includes(g.id)));
            setSelected(new Set());
            setDeleteTarget(null);
            addToast(`${ids.length} אורחים נמחקו`, 'success');
          }
        } else {
          const { error } = await client.from('guests').delete().eq('id', deleteTarget.id);
          if (error) addToast('שגיאה במחיקה', 'error');
          else {
            setGuests(prev => prev.filter(g => g.id !== deleteTarget.id));
            setDeleteTarget(null);
            addToast('האורח נמחק', 'success');
          }
        }
      };

      // Status quick update
      const handleStatusUpdate = async (guest, newStatus, newCount) => {
        const update = { status: newStatus };
        if (newCount !== undefined) update.confirmed_guests = newCount;
        if (newStatus === 'declined') update.confirmed_guests = 0;

        const { data, error } = await client.from('guests').update(update).eq('id', guest.id).select().single();
        if (!error) setGuests(prev => prev.map(g => g.id === guest.id ? data : g));
      };

      // Bulk status
      const handleBulkStatus = async (newStatus) => {
        const ids = [...selected];
        const { error } = await client.from('guests').update({ status: newStatus }).in('id', ids);
        if (!error) {
          setGuests(prev => prev.map(g => ids.includes(g.id) ? { ...g, status: newStatus } : g));
          addToast(`סטטוס עודכן ל-${STATUS_CONFIG[newStatus].label} (${ids.length})`, 'success');
          setSelected(new Set());
        }
      };

      // Bulk group
      const handleBulkGroup = async () => {
        if (!bulkGroupTarget) return;
        const ids = [...selected];
        const { error } = await client.from('guests').update({ group_name: bulkGroupTarget }).in('id', ids);
        if (!error) {
          setGuests(prev => prev.map(g => ids.includes(g.id) ? { ...g, group_name: bulkGroupTarget } : g));
          addToast(`קבוצה עודכנה (${ids.length})`, 'success');
          setSelected(new Set());
          setShowBulkGroup(false);
        }
      };

      // Import guests in bulk
      const handleImportBulk = async (rows) => {
        if (!rows.length) return;
        const rowsWithTokens = rows.map(row => ({
          ...row,
          rsvp_token: generateToken(),
        }));
        const { data, error } = await client.from('guests').insert(rowsWithTokens).select();
        if (error) addToast('שגיאה בייבוא: ' + error.message, 'error');
        else {
          setGuests(prev => [...(data || []), ...prev]);
          addToast(`${data?.length || 0} אורחים יובאו בהצלחה ✓`, 'success');
        }
      };

      // Export to Excel
      const handleExport = () => {
        const rows = filtered.map(g => ({
          'שם': g.name,
          'טלפון': g.phone || '',
          'אימייל': g.email || '',
          'קבוצה': g.group_name || '',
          'סטטוס': STATUS_CONFIG[g.status]?.label || g.status,
          'מוזמנים צפויים': g.expected_guests || 1,
          'אישרו הגעה': g.confirmed_guests || 0,
          'הערות תזונה': g.dietary_notes || '',
          'הערות': g.notes || '',
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'מוזמנים');
        XLSX.writeFile(wb, `מוזמנים_${event.name}_${new Date().toLocaleDateString('he-IL').replace(/\//g, '-')}.xlsx`);
        addToast('הקובץ הורד בהצלחה ✓', 'success');
      };

      const SortIcon = ({ col }) => {
        if (sortBy !== col) return <Icon name="ArrowUpDown" size={12} style={{ opacity: 0.4, marginRight: 4 }} />;
        return <Icon name={sortDir === 'asc' ? 'ArrowUp' : 'ArrowDown'} size={12} style={{ color: 'var(--accent)', marginRight: 4 }} />;
      };

      return (
        <div className="animate-slide-up">
          {/* Header */}
          <div className="page-header" style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
            <div>
              <div className="page-title">מוזמנים</div>
              <div className="page-subtitle">{stats.total} מוזמנים · {stats.totalGuests} אישרו הגעה</div>
            </div>
            <div style={{ display: 'flex', gap: 6, flexShrink: 0, flexWrap: 'wrap' }}>
              <button className="btn btn-secondary" onClick={handleExport} title="ייצוא לאקסל" style={{ padding: '8px 10px', fontSize: 12 }}>
                <Icon name="Download" size={16} />
                ייצוא
              </button>
              <button className="btn btn-secondary" onClick={() => setShowImport(true)} title="ייבוא מאקסל" style={{ padding: '8px 10px', fontSize: 12 }}>
                <Icon name="Upload" size={16} />
                ייבוא
              </button>
              <button className="btn btn-secondary" onClick={importFromContacts} title="ייבוא מאנשי קשר" style={{ padding: '8px 10px', fontSize: 12 }}>
                <Icon name="BookUser" size={16} />
                אנשי קשר
              </button>
              <button
                className="btn btn-primary"
                onClick={() => {
                  if (guests.length >= limits.guests) { setUpsellFeature('guests'); return; }
                  setShowAdd(true);
                }}
                title={guests.length >= limits.guests ? `מגבלת ${limits.guests} מוזמנים (Free)` : 'הוספת אורח'}
                style={{ padding: '8px 10px', fontSize: 12 }}
              >
                <Icon name="UserPlus" size={16} />
                הוספה
                {!isPro && guests.length >= limits.guests * 0.9 && <ProBadge style={{ marginRight: 4 }} />}
              </button>
            </div>
          </div>

          {/* Plan limit bar */}
          {!isPro && (
            (() => {
              const pct = Math.round((guests.length / limits.guests) * 100);
              if (pct < 70) return null;
              const danger = pct >= 100;
              return (
                <div className={`plan-limit-bar ${danger ? 'danger' : ''}`}>
                  <Icon name={danger ? 'AlertCircle' : 'Info'} size={16} style={{ color: danger ? 'var(--red-500)' : 'var(--gold-600)', flexShrink: 0 }} />
                  <span style={{ flex: 1 }}>
                    {danger ? `הגעתם למגבלה — ${guests.length}/${limits.guests} מוזמנים (Free)` : `${guests.length}/${limits.guests} מוזמנים — מתקרבים למגבלת Free`}
                  </span>
                  <button className="btn btn-primary" style={{ padding: '4px 12px', fontSize: 12 }} onClick={() => setUpsellFeature('guests')}>
                    <Icon name="Zap" size={13} />שדרוג
                  </button>
                </div>
              );
            })()
          )}

          {/* Stats row */}
          {stats.total > 0 && (
            <div className="guests-stats-row animate-fade-in">
              {[
                { value: stats.total, label: 'סה״כ', color: 'var(--text-primary)' },
                { value: stats.confirmed, label: 'מגיעים', color: 'var(--emerald-500)' },
                { value: stats.pending, label: 'ממתינים', color: 'var(--blue-500)' },
                { value: stats.maybe, label: 'אולי', color: 'var(--amber-500)' },
                { value: stats.declined, label: 'לא מגיעים', color: 'var(--red-500)' },
                { value: stats.totalGuests, label: 'נפשות בסה״כ', color: 'var(--accent)' },
              ].map(s => (
                <div key={s.label} className="guests-stat">
                  <div className="guests-stat-value" style={{ color: s.color }}>{s.value}</div>
                  <div className="guests-stat-label">{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {/* Search + Filter */}
          <div className="search-filter-bar">
            <div className="search-wrapper" style={{ flex: 2 }}>
              <span className="search-icon"><Icon name="Search" size={16} /></span>
              <input
                className="search-input"
                placeholder="חיפוש לפי שם, טלפון, קבוצה..."
                value={searchInput}
                onChange={e => handleSearchChange(e.target.value)}
              />
