    // ============================================
    // Phase 4 — Seating Page Full
    // ============================================
    function SeatingPage({ event }) {
      const { client } = useContext(SupabaseContext);
      const { addToast } = useContext(ToastContext);
      const { limits, isPro } = useContext(PlanContext);
      const isMobile = useIsMobile();

      const [tables, setTables] = useState([]);
      const [guests, setGuests] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewMode, setViewMode] = useState('list'); // list | dnd | floor
      const [showAddTable, setShowAddTable] = useState(false);
      const [editTable, setEditTable] = useState(null);
      const [deleteTableTarget, setDeleteTableTarget] = useState(null);
      const [selectedFloorTable, setSelectedFloorTable] = useState(null);
      const [draggingGuest, setDraggingGuest] = useState(null);
      const [upsellFeature, setUpsellFeature] = useState(null);
      const [showFullscreenFloor, setShowFullscreenFloor] = useState(false);
      const [tablesLocked, setTablesLocked] = useState(() => {
        try { return localStorage.getItem('seatsync_tables_locked_' + event?.id) === 'true'; } catch { return false; }
      });
      const tablesLockedRef = useRef(tablesLocked);
      useEffect(() => {
        tablesLockedRef.current = tablesLocked;
        try { localStorage.setItem('seatsync_tables_locked_' + event?.id, tablesLocked); } catch {}
      }, [tablesLocked]);

      // Per-table lock: set of locked table IDs
      const [lockedTableIds, setLockedTableIds] = useState(() => {
        try {
          const saved = localStorage.getItem('seatsync_locked_tables_' + event?.id);
          return saved ? new Set(JSON.parse(saved)) : new Set();
        } catch { return new Set(); }
      });
      useEffect(() => {
        try { localStorage.setItem('seatsync_locked_tables_' + event?.id, JSON.stringify([...lockedTableIds])); } catch {}
      }, [lockedTableIds]);

      const toggleTableLock = (tableId) => {
        setLockedTableIds(prev => {
          const next = new Set(prev);
          if (next.has(tableId)) next.delete(tableId);
          else next.add(tableId);
          return next;
        });
      };

      const isTableLocked = (tableId) => tablesLocked || lockedTableIds.has(tableId);

      // Floor plan sketch opacity & visibility
      const [sketchVisible, setSketchVisible] = useState(true);
      const [sketchOpacity, setSketchOpacity] = useState(0.3);

      // Floor plan state
      const [zoom, setZoom] = useState(1);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isPanning, setIsPanning] = useState(false);
      const panStart = useRef(null);
      const svgRef = useRef(null);

      // Canvas dimensions — user-configurable, saved in event.settings
      const DEFAULT_W = 1400;
      const DEFAULT_H = 900;
      const [canvasW, setCanvasW] = useState(event?.settings?.canvas_w || DEFAULT_W);
      const [canvasH, setCanvasH] = useState(event?.settings?.canvas_h || DEFAULT_H);
      const canvasBounds = { w: canvasW, h: canvasH };
      const TABLE_MARGIN = 50;
      const GRID_SIZE = 20;

      // Canvas lock — prevents panning when enabled
      const [canvasLocked, setCanvasLocked] = useState(() => {
        try { return localStorage.getItem('seatsync_canvas_locked_' + event?.id) === 'true'; } catch { return false; }
      });
      useEffect(() => {
        try { localStorage.setItem('seatsync_canvas_locked_' + event?.id, canvasLocked); } catch {}
      }, [canvasLocked]);

      // Show canvas size editor
      const [showCanvasSize, setShowCanvasSize] = useState(false);
      const [canvasSizeForm, setCanvasSizeForm] = useState({ w: canvasW, h: canvasH });

      const saveCanvasSize = async () => {
        const w = Math.max(400, Math.min(3000, parseInt(canvasSizeForm.w) || DEFAULT_W));
        const h = Math.max(300, Math.min(2000, parseInt(canvasSizeForm.h) || DEFAULT_H));
        setCanvasW(w);
        setCanvasH(h);
        setShowCanvasSize(false);
        // Persist to event settings
        const settings = { ...(event.settings || {}), canvas_w: w, canvas_h: h };
        await client.from('events').update({ settings }).eq('id', event.id);
        addToast(`גודל אולם עודכן: ${w}×${h}`, 'success');
        // Re-clamp any tables that are now out of bounds
        const outOfBounds = tables.filter(t => (t.position_x || 0) > w - TABLE_MARGIN || (t.position_y || 0) > h - TABLE_MARGIN);
        for (const t of outOfBounds) {
          const clamped = { x: Math.min(t.position_x, w - TABLE_MARGIN), y: Math.min(t.position_y, h - TABLE_MARGIN) };
          await client.from('tables').update({ position_x: clamped.x, position_y: clamped.y }).eq('id', t.id);
          setTables(prev => prev.map(tb => tb.id === t.id ? { ...tb, position_x: clamped.x, position_y: clamped.y } : tb));
        }
      };

      // Snap-to-grid state
      const [snapToGrid, setSnapToGrid] = useState(false);

      // Search in DnD sidebar
      const [sidebarSearch, setSidebarSearch] = useState('');

      // Clamp table position within canvas bounds
      const clampPosition = (x, y) => ({
        x: Math.max(TABLE_MARGIN, Math.min(canvasW - TABLE_MARGIN, x)),
        y: Math.max(TABLE_MARGIN, Math.min(canvasH - TABLE_MARGIN, y)),
      });

      // Snap position to grid
      const snapPosition = (x, y) => {
        if (!snapToGrid) return { x, y };
        return {
          x: Math.round(x / GRID_SIZE) * GRID_SIZE,
          y: Math.round(y / GRID_SIZE) * GRID_SIZE,
        };
      };

      // Auto-layout tables in a nice grid
      const autoLayoutTables = async () => {
        if (tables.length === 0) return;
        const cols = Math.ceil(Math.sqrt(tables.length * (canvasW / canvasH)));
        const rows = Math.ceil(tables.length / cols);
        const cellW = (canvasW - TABLE_MARGIN * 2) / cols;
        const cellH = (canvasH - TABLE_MARGIN * 2) / rows;
        const spacing = Math.min(cellW, cellH);
        const startX = TABLE_MARGIN + spacing / 2;
        const startY = TABLE_MARGIN + spacing / 2;

        const updates = tables.map((t, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const pos = clampPosition(startX + col * spacing, startY + row * spacing);
          return { id: t.id, position_x: pos.x, position_y: pos.y };
        });

        // Update all locally first for instant feedback
        setTables(prev => prev.map(t => {
          const u = updates.find(u => u.id === t.id);
          return u ? { ...t, position_x: u.position_x, position_y: u.position_y } : t;
        }));

        // Then persist
        for (const u of updates) {
          await client.from('tables').update({ position_x: u.position_x, position_y: u.position_y }).eq('id', u.id);
        }
        addToast('שולחנות סודרו אוטומטית ✓', 'success');
      };

      // Auto-fit zoom on mobile when entering floor view or fullscreen
      useEffect(() => {
        if ((viewMode === 'floor' || showFullscreenFloor) && svgRef.current) {
          const wrapEl = svgRef.current.parentElement;
          if (wrapEl) {
            // Small delay to let DOM settle for fullscreen
            setTimeout(() => {
              const wrapW = wrapEl.clientWidth;
              const wrapH = wrapEl.clientHeight;
              if (wrapW > 0 && wrapH > 0) {
                const fitZoom = Math.min(wrapW / canvasBounds.w, wrapH / canvasBounds.h, 1.5);
                setZoom(Math.max(0.15, fitZoom * 0.9));
                setPan({ x: 0, y: 0 });
              }
            }, 50);
          }
        }
      }, [viewMode, showFullscreenFloor, tables.length]);

      // Table drag on floor plan
      const tableDragRef = useRef(null);

      useEffect(() => {
        if (!event?.id) return;
        fetchAll();
      }, [client, event?.id]);

      if (!event) return <NeedEventState />;

      const fetchAll = async () => {
        if (!client || !event?.id) return;
        setLoading(true);
        const [{ data: t }, { data: g }] = await Promise.all([
          client.from('tables').select('*').eq('event_id', event.id).order('sort_order'),
          client.from('guests').select('id,name,group_name,status,confirmed_guests,table_id,seat_index').eq('event_id', event.id),
        ]);
        setTables(t || []);
        setGuests(g || []);
        setLoading(false);
      };

      // Stats
      const unassigned = guests.filter(g => !g.table_id && (g.status !== 'declined'));
      const assignedCount = guests.filter(g => g.table_id).length;
      const totalSeats = tables.reduce((s, t) => s + t.seats, 0);

      // Group unassigned by group
      const unassignedByGroup = useMemo(() => {
        const map = {};
        unassigned.forEach(g => {
          const grp = g.group_name || 'כללי';
          if (!map[grp]) map[grp] = [];
          map[grp].push(g);
        });
        return map;
      }, [unassigned]);

      // Add table(s)
      const handleAddTable = async (formOrArray, isBulk) => {
        // Plan limit check
        const newCount = isBulk ? formOrArray.length : 1;
        if (tables.length + newCount > limits.tables) {
          addToast(`תוכנית ${limits.label} מאפשרת עד ${limits.tables} שולחנות. שדרגו לתוכנית גבוהה יותר.`, 'error');
          setUpsellFeature('tables');
          return;
        }
        if (isBulk) {
          const { data, error } = await client.from('tables').insert(formOrArray).select();
          if (!error) { setTables(prev => [...prev, ...(data || [])]); addToast(`${data?.length} שולחנות נוצרו ✓`, 'success'); }
        } else {
          const { data, error } = await client.from('tables').insert({
            ...formOrArray,
            event_id: event.id,
            position_x: Math.min(canvasW - TABLE_MARGIN, TABLE_MARGIN + 100 + (tables.length % 5) * 200),
            position_y: Math.min(canvasH - TABLE_MARGIN, TABLE_MARGIN + 100 + Math.floor(tables.length / 5) * 200),
          }).select().single();
          if (!error) { setTables(prev => [...prev, data]); addToast(`${data.name} נוסף ✓`, 'success'); }
        }
        setShowAddTable(false);
      };

      // Edit table
      const handleEditTable = async (form) => {
        const { data, error } = await client.from('tables').update(form).eq('id', editTable.id).select().single();
        if (!error) { setTables(prev => prev.map(t => t.id === editTable.id ? data : t)); setEditTable(null); addToast('עודכן ✓', 'success'); }
      };

      // Delete table — show confirmation first (Bug fix 2.2)
      const confirmDeleteTable = (tableId) => {
        const table = tables.find(t => t.id === tableId);
        setDeleteTableTarget(table || { id: tableId });
      };

      const handleDeleteTable = async () => {
        if (!deleteTableTarget) return;
        const tableId = deleteTableTarget.id;
        await client.from('guests').update({ table_id: null, seat_index: null }).eq('table_id', tableId);
        await client.from('tables').delete().eq('id', tableId);
        setTables(prev => prev.filter(t => t.id !== tableId));
        setGuests(prev => prev.map(g => g.table_id === tableId ? { ...g, table_id: null } : g));
        addToast('שולחן נמחק', 'success');
        if (selectedFloorTable?.id === tableId) setSelectedFloorTable(null);
        setDeleteTableTarget(null);
      };

      // Assign guest to table
      const assignGuest = async (guestId, tableId) => {
        if (tableId) {
          const tableGuests = guests.filter(g => g.table_id === tableId);
          const table = tables.find(t => t.id === tableId);
          const occupied = tableGuests.reduce((s,g) => s + (g.confirmed_guests || 1), 0);
          if (occupied >= (table?.seats || 0)) { addToast('השולחן מלא!', 'error'); return; }
        }
        const { error } = await client.from('guests').update({ table_id: tableId || null, seat_index: null }).eq('id', guestId);
        if (!error) {
          setGuests(prev => prev.map(g => g.id === guestId ? { ...g, table_id: tableId || null } : g));
        }
      };

      // DnD handlers (mouse - desktop)
      const handleDragStart = (e, guest) => {
        e.dataTransfer.setData('guestId', guest.id);
        setDraggingGuest(guest.id);
      };

      const handleDrop = (e, tableId) => {
        e.preventDefault();
        const guestId = e.dataTransfer.getData('guestId');
        if (guestId) assignGuest(guestId, tableId);
        setDraggingGuest(null);
      };

      const handleDropUnassigned = (e) => {
        e.preventDefault();
        const guestId = e.dataTransfer.getData('guestId');
        if (guestId) assignGuest(guestId, null);
        setDraggingGuest(null);
      };

      // ─── Touch DnD (mobile — iPhone/Android) ───────────────────────────────
      const touchDragRef = useRef(null);   // { guestId, guestName, ghostEl }

      const handleTouchStart = (e, guest) => {
        // Only handle single-finger drags
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];

        // Create ghost element that follows the finger
        const ghost = document.createElement('div');
        ghost.id = 'touch-drag-ghost';
        ghost.textContent = guest.name;
        Object.assign(ghost.style, {
          position: 'fixed',
          zIndex: 9999,
          pointerEvents: 'none',
          background: 'var(--gold-400)',
          color: '#1A1A1A',
          padding: '8px 14px',
          borderRadius: '20px',
          fontSize: '13px',
          fontWeight: '700',
          fontFamily: 'Heebo, sans-serif',
          boxShadow: '0 8px 24px rgba(0,0,0,0.25)',
          opacity: '0.95',
          transform: 'translate(-50%, -50%)',
          left: touch.clientX + 'px',
          top: touch.clientY + 'px',
          transition: 'none',
          whiteSpace: 'nowrap',
        });
        document.body.appendChild(ghost);

        touchDragRef.current = { guestId: guest.id, ghostEl: ghost };
        setDraggingGuest(guest.id);
      };

      const handleTouchMove = (e) => {
        if (!touchDragRef.current) return;
        e.preventDefault(); // prevent page scroll while dragging
        const touch = e.touches[0];
        const ghost = touchDragRef.current.ghostEl;
        if (ghost) {
          ghost.style.left = touch.clientX + 'px';
          ghost.style.top = touch.clientY + 'px';
        }
        // Highlight the drop target under the finger
        ghost.style.display = 'none';
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        ghost.style.display = '';
        const dropCard = el?.closest('[data-table-id]');
        // Remove previous highlights
        document.querySelectorAll('.table-drop-card.touch-over').forEach(n => n.classList.remove('touch-over'));
        document.querySelectorAll('.seating-sidebar.touch-over').forEach(n => n.classList.remove('touch-over'));
        if (dropCard) {
          dropCard.classList.add('touch-over');
        } else if (el?.closest('.seating-sidebar')) {
          el.closest('.seating-sidebar').classList.add('touch-over');
        }
      };

      const handleTouchEnd = (e) => {
        if (!touchDragRef.current) return;
        const touch = e.changedTouches[0];
        const { guestId, ghostEl } = touchDragRef.current;

        // Hide ghost FIRST so elementFromPoint can see what's underneath
        if (ghostEl) ghostEl.style.display = 'none';

        // Remove highlights
        document.querySelectorAll('.table-drop-card.touch-over').forEach(n => n.classList.remove('touch-over'));
        document.querySelectorAll('.seating-sidebar.touch-over').forEach(n => n.classList.remove('touch-over'));

        // Find drop target (ghost is hidden, so this works correctly)
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        const dropCard = el?.closest('[data-table-id]');
        if (dropCard) {
          const tableId = dropCard.dataset.tableId;
          assignGuest(guestId, tableId);
        } else if (el?.closest('.seating-sidebar')) {
          assignGuest(guestId, null);
        }

        // Remove ghost from DOM
        if (ghostEl && ghostEl.parentNode) ghostEl.parentNode.removeChild(ghostEl);

        touchDragRef.current = null;
        setDraggingGuest(null);
      };
      // ───────────────────────────────────────────────────────────────────────

      // Floor plan: drag tables (mouse)
      const handleTableMouseDown = (table, e) => {
        if (viewMode !== 'floor') return;
        if (isTableLocked(table.id)) return;
        e.preventDefault();
        const startX = e.clientX;
        const startY = e.clientY;
        const startPosX = table.position_x || 100;
        const startPosY = table.position_y || 100;
        // Use object to track final position (avoids stale closure)
        const finalPos = { x: startPosX, y: startPosY };

        const onMove = (me) => {
          const dx = (me.clientX - startX) / zoom;
          const dy = (me.clientY - startY) / zoom;
          let pos = clampPosition(startPosX + dx, startPosY + dy);
          pos = snapPosition(pos.x, pos.y);
          finalPos.x = pos.x;
          finalPos.y = pos.y;
          setTables(prev => prev.map(t => t.id === table.id
            ? { ...t, position_x: pos.x, position_y: pos.y }
            : t
          ));
        };

        const onUp = async () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          await client.from('tables').update({ position_x: finalPos.x, position_y: finalPos.y }).eq('id', table.id);
        };

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      };

      // Floor plan: drag tables (touch — mobile)
      const handleTableTouchStart = (table, e) => {
        if (viewMode !== 'floor') return;
        if (isTableLocked(table.id)) return;
        if (e.touches.length !== 1) return;
        e.stopPropagation();
        const touch = e.touches[0];
        const startX = touch.clientX;
        const startY = touch.clientY;
        const startPosX = table.position_x || 100;
        const startPosY = table.position_y || 100;
        const finalPos = { x: startPosX, y: startPosY };

        const onMove = (me) => {
          if (me.touches.length !== 1) return;
          me.preventDefault();
          const t = me.touches[0];
          const dx = (t.clientX - startX) / zoom;
          const dy = (t.clientY - startY) / zoom;
          let pos = clampPosition(startPosX + dx, startPosY + dy);
          pos = snapPosition(pos.x, pos.y);
          finalPos.x = pos.x;
          finalPos.y = pos.y;
          setTables(prev => prev.map(tb => tb.id === table.id
            ? { ...tb, position_x: pos.x, position_y: pos.y }
            : tb
          ));
        };

        const onEnd = async () => {
          svgRef.current?.removeEventListener('touchmove', onMove);
          svgRef.current?.removeEventListener('touchend', onEnd);
          await client.from('tables').update({ position_x: finalPos.x, position_y: finalPos.y }).eq('id', table.id);
        };

        svgRef.current?.addEventListener('touchmove', onMove, { passive: false });
        svgRef.current?.addEventListener('touchend', onEnd);
      };

      // Export seating list to PDF
      const exportPDF = async () => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

          // Hebrew font support via built-in — use LTR layout with English fallback for font
          // Title
          doc.setFontSize(20);
          doc.setFont('helvetica', 'bold');
          const eventName = event?.name || 'SeatSync';
          doc.text(eventName, 105, 20, { align: 'center' });

          if (event?.event_date) {
            doc.setFontSize(11);
            doc.setFont('helvetica', 'normal');
            doc.text(new Date(event.event_date).toLocaleDateString('he-IL'), 105, 28, { align: 'center' });
          }

          doc.setFontSize(10);
          doc.text(`Generated: ${new Date().toLocaleDateString('he-IL')}`, 105, 34, { align: 'center' });

          // Horizontal line
          doc.setDrawColor(212, 168, 8);
          doc.setLineWidth(0.8);
          doc.line(15, 38, 195, 38);

          let y = 46;
          const pageH = 285;

          // For each table, list guests
          tables.forEach((table, ti) => {
            const tGuests = guests.filter(g => g.table_id === table.id);
            const occupied = tGuests.reduce((s, g) => s + (g.confirmed_guests || 1), 0);

            // Page break if needed
            if (y > pageH - 30) {
              doc.addPage();
              y = 20;
            }

            // Table header
            doc.setFillColor(212, 168, 8);
            doc.setTextColor(255, 255, 255);
            doc.roundedRect(15, y, 180, 8, 2, 2, 'F');
            doc.setFontSize(10);
            doc.setFont('helvetica', 'bold');
            doc.text(`Table ${ti + 1}: ${table.name}  (${occupied}/${table.seats})`, 105, y + 5.5, { align: 'center' });
            doc.setTextColor(0, 0, 0);
            y += 11;

            if (tGuests.length === 0) {
              doc.setFont('helvetica', 'italic');
              doc.setFontSize(9);
              doc.setTextColor(140, 140, 140);
              doc.text('Empty table', 20, y + 4);
              doc.setTextColor(0, 0, 0);
              y += 9;
            } else {
              // Guest rows in 2 columns
              const col1x = 20, col2x = 110;
              tGuests.forEach((g, gi) => {
                if (y > pageH - 10) { doc.addPage(); y = 20; }
                const isCol2 = gi % 2 === 1;
                const x = isCol2 ? col2x : col1x;
                if (!isCol2 || gi === tGuests.length - 1) {
                  // Alternating row bg
                  if (Math.floor(gi / 2) % 2 === 0) {
                    doc.setFillColor(250, 249, 245);
                    doc.rect(15, y - 1, 180, 7, 'F');
                  }
                }
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);
                const guestLabel = `${g.name}  (${g.group_name || ''})  x${g.confirmed_guests || 1}`;
                doc.text(guestLabel, x, y + 4);
                if (isCol2 || gi === tGuests.length - 1) y += 7;
              });
            }
            y += 4;
          });

          // Summary at end
          if (y > pageH - 20) { doc.addPage(); y = 20; }
          doc.setDrawColor(212, 168, 8);
          doc.line(15, y, 195, y);
          y += 6;
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(10);
          const totalSeated = guests.filter(g => g.table_id).length;
          doc.text(`Total: ${totalSeated} / ${guests.length} guests seated  |  ${tables.length} tables`, 105, y, { align: 'center' });

          doc.save(`seatsync-seating-${(event?.name || 'event').replace(/\s+/g,'-')}.pdf`);
          addToast('PDF ייוצא בהצלחה ✓', 'success');
        } catch (err) {
          console.error('PDF export error:', err);
          addToast('שגיאה בייצוא PDF — נסו שוב', 'error');
        }
      };

      // Export floor plan SVG as PDF
      const exportFloorPlanPDF = async () => {
        const svgEl = svgRef.current;
        if (!svgEl) { addToast('פתחו את מפת הושבה תחילה', 'error'); return; }
        try {
          addToast('מייצא מפה...', 'info');
          const canvas = await window.html2canvas(svgEl.closest('.floorplan-wrap') || svgEl.parentElement, {
            scale: 2,
            backgroundColor: '#FAFAF8',
            logging: false,
          });
          const imgData = canvas.toDataURL('image/png');
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
          doc.setFontSize(14);
          doc.setFont('helvetica', 'bold');
          doc.text(event?.name || 'Floor Plan', 148.5, 12, { align: 'center' });
          doc.addImage(imgData, 'PNG', 10, 18, 277, 180);
          doc.save(`seatsync-floorplan-${(event?.name || 'event').replace(/\s+/g,'-')}.pdf`);
          addToast('מפת הושבה יוצאה ✓', 'success');
        } catch (err) {
          console.error('Floor plan PDF error:', err);
          addToast('שגיאה בייצוא מפה', 'error');
        }
      };
      const exportSeating = () => {
        const rows = guests.map(g => {
          const table = tables.find(t => t.id === g.table_id);
          return {
            'שם': g.name,
            'קבוצה': g.group_name || '',
            'סטטוס': STATUS_CONFIG[g.status]?.label || g.status,
            'שולחן': table?.name || 'לא מושב',
            'מגיעים': g.confirmed_guests || 0,
          };
        });
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'הושבה');
        XLSX.writeFile(wb, `הושבה_${event.name}.xlsx`);
        addToast('ייצוא הושלם ✓', 'success');
      };

      if (loading) return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {[1,2,3].map(i => <div key={i} className="skeleton" style={{ height: 80 }} />)}
        </div>
      );

      return (
        <div className="animate-slide-up">
          {/* Header */}
          <div className="page-header" style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
            <div>
              <div className="page-title">סידורי הושבה</div>
              <div className="page-subtitle">
                {tables.length} שולחנות · {totalSeats} מקומות · {assignedCount}/{guests.filter(g=>g.status!=='declined').length} מושבים
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              <button className="btn btn-secondary" style={{ padding: '10px 14px' }} onClick={exportSeating} title="ייצוא לאקסל">
                <Icon name="FileSpreadsheet" size={18} />
                <span className="hide-mobile">אקסל</span>
              </button>
              <button className="btn btn-secondary" style={{ padding: '10px 14px' }} onClick={exportPDF} title="ייצוא רשימת הושבה PDF">
                <Icon name="FileText" size={18} />
                <span className="hide-mobile">PDF</span>
              </button>
              {viewMode === 'floor' && (
                <button className="btn btn-secondary" style={{ padding: '10px 14px' }} onClick={exportFloorPlanPDF} title="ייצוא מפת הושבה PDF">
                  <Icon name="Map" size={18} />
                  <span className="hide-mobile">מפה</span>
                </button>
              )}
              <button className="btn btn-primary" onClick={() => {
                if (tables.length >= limits.tables) { setUpsellFeature('tables'); return; }
                setShowAddTable(true);
              }}>
                <Icon name="Plus" size={18} />
                <span className="hide-mobile">שולחן חדש</span>
                {!isPro && tables.length >= limits.tables && <ProBadge style={{ marginRight: 4 }} />}
              </button>
            </div>
          </div>

          {/* Tables plan limit bar */}
          {!isPro && tables.length >= Math.floor(limits.tables * 0.8) && (
            <div className={`plan-limit-bar ${tables.length >= limits.tables ? 'danger' : ''}`}>
              <Icon name={tables.length >= limits.tables ? 'AlertCircle' : 'Info'} size={16} style={{ color: tables.length >= limits.tables ? 'var(--red-500)' : 'var(--gold-600)', flexShrink: 0 }} />
              <span style={{ flex: 1 }}>
                {tables.length >= limits.tables
                  ? `הגעתם למגבלה — ${tables.length}/${limits.tables} שולחנות (Free)`
                  : `${tables.length}/${limits.tables} שולחנות — מתקרבים למגבלת Free`}
              </span>
              <button className="btn btn-primary" style={{ padding: '4px 12px', fontSize: 12 }} onClick={() => setUpsellFeature('tables')}>
                <Icon name="Zap" size={13} />שדרוג
              </button>
            </div>
          )}

          {/* Stats strip */}
          {tables.length > 0 && (
            <div className="guests-stats-row" style={{ marginBottom: 16 }}>
              {[
                { value: tables.length, label: 'שולחנות', color: 'var(--accent)' },
                { value: totalSeats, label: 'מקומות כולל', color: 'var(--text-primary)' },
                { value: assignedCount, label: 'מושבים', color: 'var(--emerald-500)' },
                { value: unassigned.length, label: 'לא מושבים', color: 'var(--amber-500)' },
              ].map(s => (
                <div key={s.label} className="guests-stat">
                  <div className="guests-stat-value" style={{ color: s.color }}>{s.value}</div>
                  <div className="guests-stat-label">{s.label}</div>
                </div>
              ))}
            </div>
          )}

          {tables.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon"><Icon name="Armchair" size={36} /></div>
              <div className="empty-state-title">אין שולחנות עדיין</div>
              <div className="empty-state-text">הוסיפו שולחן בודד או צרו כמה שולחנות בבת אחת</div>
              <button className="btn btn-primary" onClick={() => {
                if (tables.length >= limits.tables) { setUpsellFeature('tables'); return; }
                setShowAddTable(true);
              }}>
                <Icon name="Plus" size={18} />הוספת שולחן
              </button>
            </div>
          ) : (
            <>
              {/* View mode toggle */}
              <div style={{ display: 'flex', gap: 8, marginBottom: 16, alignItems: 'center', flexWrap: 'wrap' }}>
                <div className="view-mode-tabs">
                  {[
                    { v: 'list', icon: 'List', label: 'רשימה' },
                    { v: 'dnd', icon: 'Move', label: 'גרירה' },
                    { v: 'floor', icon: 'LayoutDashboard', label: 'מפת אולם' },
                  ].map(m => (
                    <button key={m.v} className={`view-mode-btn ${viewMode === m.v ? 'active' : ''}`} onClick={() => {
                      if (m.v === 'floor' && isMobile) {
                        setShowFullscreenFloor(true);
                      } else {
                        setViewMode(m.v);
                      }
                    }}>
                      <Icon name={m.icon} size={14} />
                      {m.label}
                      {m.v === 'floor' && isMobile && <Icon name="Expand" size={12} style={{ marginRight: 2 }} />}
                    </button>
                  ))}
                </div>
                {viewMode === 'floor' && !isMobile && (
                  <div style={{ display: 'flex', gap: 4, marginRight: 'auto', flexWrap: 'wrap' }}>
                    <button
                      className="btn btn-secondary"
                      style={{ padding: '6px 10px', background: tablesLocked ? 'var(--accent-light)' : undefined, borderColor: tablesLocked ? 'var(--accent)' : undefined, color: tablesLocked ? 'var(--accent)' : undefined }}
                      onClick={() => setTablesLocked(l => !l)}
                      title={tablesLocked ? 'שחרר נעילת שולחנות' : 'נעל מיקום שולחנות'}
                    >
                      <Icon name={tablesLocked ? 'Lock' : 'Unlock'} size={16} />
                    </button>
                    <button
                      className="btn btn-secondary"
                      style={{ padding: '6px 10px', background: snapToGrid ? 'var(--accent-light)' : undefined, borderColor: snapToGrid ? 'var(--accent)' : undefined, color: snapToGrid ? 'var(--accent)' : undefined }}
                      onClick={() => setSnapToGrid(s => !s)}
                      title={snapToGrid ? 'בטל הצמדה לרשת' : 'הצמד לרשת'}
                    >
                      <Icon name="Grid3x3" size={16} />
                    </button>
                    <button className="btn btn-secondary" style={{ padding: '6px 10px' }} onClick={autoLayoutTables} title="סדר שולחנות אוטומטית">
                      <Icon name="LayoutGrid" size={16} />
                    </button>
                    <button
                      className="btn btn-secondary"
                      style={{ padding: '6px 10px', background: canvasLocked ? 'rgba(59,130,246,0.1)' : undefined, borderColor: canvasLocked ? 'var(--blue-400)' : undefined, color: canvasLocked ? 'var(--blue-500)' : undefined }}
                      onClick={() => { setCanvasLocked(l => !l); if (!canvasLocked) { setPan({ x: 0, y: 0 }); } }}
                      title={canvasLocked ? 'שחרר נעילת מפה — אפשר גלילה' : 'קבע מפה — מנע גלילה'}
                    >
                      <Icon name={canvasLocked ? 'Pin' : 'PinOff'} size={16} />
                    </button>
                    <button className="btn btn-secondary" style={{ padding: '6px 10px' }} onClick={() => { setCanvasSizeForm({ w: canvasW, h: canvasH }); setShowCanvasSize(true); }} title="גודל אולם">
                      <Icon name="Ruler" size={16} />
                    </button>
                    <div style={{ width: 1, background: 'var(--border-default)', margin: '0 2px' }} />
                    <button className="btn btn-secondary" style={{ padding: '6px 10px' }} onClick={() => setZoom(z => Math.min(2, z + 0.2))}>
                      <Icon name="ZoomIn" size={16} />
                    </button>
                    <button className="btn btn-secondary" style={{ padding: '6px 10px' }} onClick={() => setZoom(z => Math.max(0.3, z - 0.2))}>
                      <Icon name="ZoomOut" size={16} />
                    </button>
                    <button className="btn btn-secondary" style={{ padding: '6px 10px' }} onClick={() => {
                      const wrapEl = svgRef.current?.parentElement;
                      if (wrapEl) {
                        const fitZoom = Math.min(wrapEl.clientWidth / canvasBounds.w, wrapEl.clientHeight / canvasBounds.h, 1.5);
                        setZoom(Math.max(0.15, fitZoom * 0.9));
                        setPan({ x: 0, y: 0 });
                      }
                    }}>
                      <Icon name="Maximize2" size={16} />
                    </button>
                    <span style={{ fontSize: 11, color: 'var(--text-tertiary)', alignSelf: 'center', marginRight: 4 }}>{Math.round(zoom * 100)}%</span>
                  </div>
                )}
              </div>

              {/* ── LIST VIEW ── */}
              {viewMode === 'list' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {tables.map(table => {
                    const tGuests = guests.filter(g => g.table_id === table.id);
                    const occupied = tGuests.reduce((s,g) => s + (g.confirmed_guests || 1), 0);
                    const isFull = occupied >= table.seats;
                    return (
                      <div key={table.id} className="card">
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: tGuests.length > 0 ? 12 : 0 }}>
                          <TableShape type={table.table_type} seats={table.seats} size={48} />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700, fontSize: 16 }}>{table.name}</div>
                            <div style={{ fontSize: 12, color: 'var(--text-secondary)' }}>

                                {isFull ? ' מלא' : ` נותרו ${table.seats - occupied}`}
                              </span>
                            </div>
                          </div>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <button className="icon-btn" style={{ width: 32, height: 32 }} onClick={() => setEditTable(table)}>
                              <Icon name="Pencil" size={15} />
                            </button>
                            <button className="icon-btn" style={{ width: 32, height: 32, color: 'var(--red-400)' }} onClick={() => confirmDeleteTable(table.id)}>
                              <Icon name="Trash2" size={15} />
                            </button>
                          </div>
                        </div>
                        {tGuests.length > 0 && (
                          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                            {tGuests.map(g => (
                              <div key={g.id} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '4px 8px', background: 'var(--bg-tertiary)', borderRadius: 'var(--radius-full)', fontSize: 12, fontWeight: 500 }}>
                                <span style={{ width: 7, height: 7, borderRadius: '50%', background: getGroupColor(g.group_name), display: 'inline-block' }}/>
                                {g.name}
                                <button style={{ opacity: 0.5, cursor: 'pointer', fontSize: 14, marginRight: 2, display: 'flex', alignItems: 'center' }} onClick={() => assignGuest(g.id, null)}>×</button>
                              </div>
                            ))}
                          </div>
                        )}
                        {/* Quick assign dropdown */}
                        <div style={{ marginTop: 10 }}>
                          <select
                            className="filter-select"
                            style={{ width: '100%', fontSize: 13 }}
                            value=""
                            disabled={isFull}
                            onChange={e => { if (e.target.value) assignGuest(e.target.value, table.id); e.target.value = ''; }}
                          >
                            <option value="">{isFull ? 'שולחן מלא' : '+ הוסף אורח לשולחן...'}</option>
                            {unassigned.filter(g => g.status !== 'declined').map(g => (
                              <option key={g.id} value={g.id}>{g.name} ({g.group_name})</option>
                            ))}
                          </select>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* ── DRAG & DROP VIEW ── */}
              {viewMode === 'dnd' && (
                <div className="seating-layout">
                  {/* Sidebar — unassigned */}
                  <div
                    className="seating-sidebar"
                    onDragOver={e => e.preventDefault()}
                    onDrop={handleDropUnassigned}
                  >
                    <div className="sidebar-title">
                      <span>לא מושבים</span>
                      <span style={{ background: 'var(--accent-light)', color: 'var(--accent)', borderRadius: 'var(--radius-full)', padding: '1px 8px', fontSize: 12 }}>{unassigned.length}</span>
                    </div>
                    {unassigned.length > 5 && (
                      <div style={{ position: 'relative', marginBottom: 10 }}>
                        <Icon name="Search" size={14} style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-tertiary)', pointerEvents: 'none' }} />
                        <input
                          className="input-field"
                          style={{ fontSize: 12, padding: '6px 30px 6px 10px', background: 'var(--bg-tertiary)' }}
                          placeholder="חיפוש אורח..."
                          value={sidebarSearch}
                          onChange={e => setSidebarSearch(e.target.value)}
                        />
                        {sidebarSearch && (
                          <button style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', cursor: 'pointer', display: 'flex', opacity: 0.5 }} onClick={() => setSidebarSearch('')}>
                            <Icon name="X" size={12} />
                          </button>
                        )}
                      </div>
                    )}
                    {unassigned.length === 0 ? (
                      <div style={{ fontSize: 13, color: 'var(--text-tertiary)', textAlign: 'center', padding: 20 }}>
                        🎉 כל האורחים מושבים!
                      </div>
                    ) : (() => {
                      const searchLower = sidebarSearch.toLowerCase().trim();
                      const filteredByGroup = {};
                      Object.entries(unassignedByGroup).forEach(([group, groupGuests]) => {
                        const filtered = searchLower ? groupGuests.filter(g => g.name.toLowerCase().includes(searchLower) || (g.group_name || '').toLowerCase().includes(searchLower)) : groupGuests;
                        if (filtered.length > 0) filteredByGroup[group] = filtered;
                      });
                      const totalFiltered = Object.values(filteredByGroup).reduce((s, arr) => s + arr.length, 0);
                      if (searchLower && totalFiltered === 0) {
                        return <div style={{ fontSize: 12, color: 'var(--text-tertiary)', textAlign: 'center', padding: 16 }}>אין תוצאות עבור "{sidebarSearch}"</div>;
                      }
                      return Object.entries(filteredByGroup).map(([group, groupGuests]) => (
                        <div key={group}>
                          <div className="sidebar-group-label">
                            <span style={{ width: 6, height: 6, borderRadius: '50%', background: getGroupColor(group), display: 'inline-block', marginLeft: 5 }}/>
                            {group} ({groupGuests.length})
                          </div>
                          {groupGuests.map(g => (
                            <div
                              key={g.id}
                              className={`draggable-guest ${draggingGuest === g.id ? 'dragging' : ''}`}
                              draggable
                              onDragStart={e => handleDragStart(e, g)}
                              onDragEnd={() => setDraggingGuest(null)}
                              onTouchStart={e => handleTouchStart(e, g)}
                              onTouchMove={handleTouchMove}
                              onTouchEnd={handleTouchEnd}
                              style={{ touchAction: 'none' }}
                            >
                              <Icon name="GripVertical" size={14} style={{ color: 'var(--text-tertiary)' }} />
                              {g.name}
                              <span className="guest-count-chip">{g.confirmed_guests || 1}</span>
                            </div>
                          ))}
                        </div>
                      ));
                    })()}
                    )}
                  </div>

                  {/* Tables drop area */}
                  <div className="tables-area">
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
                      {tables.map(table => {
                        const tGuests = guests.filter(g => g.table_id === table.id);
                        const occupied = tGuests.reduce((s,g) => s + (g.confirmed_guests || 1), 0);
                        const isFull = occupied >= table.seats;
                        return (
                          <div
                            key={table.id}
                            data-table-id={table.id}
                            className={`table-drop-card ${isFull ? 'is-full' : ''}`}
                            onDragOver={e => { if (!isFull) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); } }}
                            onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
                            onDrop={e => { e.currentTarget.classList.remove('drag-over'); handleDrop(e, table.id); }}
                          >
                            <div className="table-header-row">
                              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <TableShape type={table.table_type} seats={table.seats} size={36} />
                                <span className="table-name-label">{table.name}</span>
                              </div>
                              <span className={`seat-counter ${isFull ? 'full' : occupied > 0 ? 'ok' : ''}`}>{occupied}/{table.seats}</span>
                            </div>
                            <div className="assigned-guests-list">
                              {tGuests.map(g => (
                                <div
                                  key={g.id}
                                  className="assigned-guest-chip"
                                  draggable
                                  onDragStart={e => handleDragStart(e, g)}
                                  onDragEnd={() => setDraggingGuest(null)}
                                  onTouchStart={e => handleTouchStart(e, g)}
                                  onTouchMove={handleTouchMove}
                                  onTouchEnd={handleTouchEnd}
                                  style={{ touchAction: 'none' }}
                                >
                                  <span style={{ width: 7, height: 7, borderRadius: '50%', background: getGroupColor(g.group_name) }} />
                                  <span style={{ flex: 1, fontSize: 12 }}>{g.name}</span>
                                  <button style={{ opacity: 0.5, cursor: 'pointer', fontSize: 14, display: 'flex', alignItems: 'center' }} onClick={() => assignGuest(g.id, null)}>×</button>
                                </div>
                              ))}
                              {!isFull && <div className="drop-hint">{tGuests.length === 0 ? 'גרור אורחים לכאן' : '+ גרור עוד'}</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

              {/* ── FLOOR PLAN VIEW ── */}
              {viewMode === 'floor' && (
                <div className="floorplan-wrap" style={{ height: isMobile ? 'calc(100vh - 260px)' : 560, minHeight: 300 }}>
                  <div className="floorplan-controls">
                    <div className="floorplan-btn" onClick={() => setZoom(z => Math.min(2.5, z + 0.15))}><Icon name="Plus" size={14}/></div>
                    <div className="floorplan-btn" onClick={() => setZoom(z => Math.max(0.2, z - 0.15))}><Icon name="Minus" size={14}/></div>
                    <div className="floorplan-btn" onClick={() => {
                      const wrapEl = svgRef.current?.parentElement;
                      if (wrapEl) {
                        const wrapW = wrapEl.clientWidth;
                        const wrapH = wrapEl.clientHeight;
                        const fitZoom = Math.min(wrapW / canvasBounds.w, wrapH / canvasBounds.h, 1.5);
                        setZoom(Math.max(0.15, fitZoom * 0.9));
                        setPan({ x: 0, y: 0 });
                      }
                    }} title="התאם למסך"><Icon name="Maximize2" size={14}/></div>
                    <div className="floorplan-btn" onClick={() => { setZoom(1); setPan({x:0,y:0}); }} title="איפוס"><Icon name="Crosshair" size={14}/></div>
                    <div style={{ height: 1, background: 'var(--border-default)', margin: '2px 0' }} />
                    <div className="floorplan-btn" onClick={autoLayoutTables} title="סידור אוטומטי"><Icon name="LayoutGrid" size={14}/></div>
                    <div className="floorplan-btn" onClick={() => setSnapToGrid(s => !s)} title={snapToGrid ? 'בטל הצמדה' : 'הצמד לרשת'} style={{ background: snapToGrid ? 'var(--accent-light)' : undefined, color: snapToGrid ? 'var(--accent)' : undefined }}><Icon name="Grid3x3" size={14}/></div>
                    <div className="floorplan-btn" onClick={() => { setCanvasLocked(l => !l); if (!canvasLocked) setPan({ x: 0, y: 0 }); }} title={canvasLocked ? 'שחרר מפה' : 'קבע מפה'} style={{ background: canvasLocked ? 'rgba(59,130,246,0.15)' : undefined, color: canvasLocked ? 'var(--blue-500)' : undefined }}><Icon name={canvasLocked ? 'Pin' : 'PinOff'} size={14}/></div>
                    {event?.settings?.floorplan_url && (
                      <>
                        <div style={{ height: 1, background: 'var(--border-default)', margin: '2px 0' }} />
                        <div className="floorplan-btn" onClick={() => setSketchVisible(v => !v)} title={sketchVisible ? 'הסתר סקיצה' : 'הצג סקיצה'} style={{ background: sketchVisible ? 'var(--accent-light)' : undefined, color: sketchVisible ? 'var(--accent)' : undefined }}><Icon name="Image" size={14}/></div>
                        {sketchVisible && (
                          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '4px 2px' }}>
                            <input
                              type="range"
                              min="0.05"
                              max="0.8"
                              step="0.05"
                              value={sketchOpacity}
                              onChange={e => setSketchOpacity(parseFloat(e.target.value))}
                              style={{ width: 28, height: 60, WebkitAppearance: 'slider-vertical', writingMode: 'vertical-lr', direction: 'rtl', cursor: 'pointer' }}
                              title={`שקיפות: ${Math.round(sketchOpacity * 100)}%`}
                            />
                            <span style={{ fontSize: 8, color: 'var(--text-tertiary)' }}>{Math.round(sketchOpacity * 100)}%</span>
                          </div>
                        )}
                      </>
                    )}
                  </div>
                  {/* Zoom indicator */}
                  <div style={{ position: 'absolute', bottom: 10, left: 10, zIndex: 5, fontSize: 10, color: 'var(--text-tertiary)', background: 'var(--bg-elevated)', padding: '2px 6px', borderRadius: 4, border: '1px solid var(--border-light)' }}>
                    {Math.round(zoom * 100)}%
                  </div>
                  {isMobile && (
                    <div style={{ position: 'absolute', top: 8, right: 8, zIndex: 5, display: 'flex', gap: 4 }}>
                      <button
                        className="floorplan-btn"
                        style={{ width: 'auto', padding: '4px 10px', fontSize: 11, fontWeight: 600, fontFamily: 'Heebo', gap: 4, display: 'flex', alignItems: 'center' }}
                        onClick={() => setTablesLocked(l => !l)}
                      >
                        <Icon name={tablesLocked ? 'Lock' : 'Unlock'} size={13}/>
                        {tablesLocked ? 'נעול' : 'נעל'}
                      </button>
                    </div>
                  )}
                  <svg
                    ref={svgRef}
                    width="100%"
                    height="100%"
                    style={{ background: event?.settings?.floorplan_url ? 'transparent' : undefined, touchAction: 'none' }}
                    onWheel={e => {
                      e.preventDefault();
                      const delta = e.deltaY > 0 ? -0.08 : 0.08;
                      setZoom(z => Math.max(0.2, Math.min(2.5, z + delta)));
                    }}
                    onMouseDown={e => {
                      if (canvasLocked) return;
                      if (e.target === svgRef.current || e.target.tagName === 'svg' || e.target.tagName === 'image' || e.target.tagName === 'rect' || e.target.tagName === 'line') {
                        setIsPanning(true);
                        panStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                      }
                    }}
                    onMouseMove={e => {
                      if (isPanning && panStart.current) {
                        setPan({ x: e.clientX - panStart.current.x, y: e.clientY - panStart.current.y });
                      }
                    }}
                    onMouseUp={() => setIsPanning(false)}
                    onMouseLeave={() => setIsPanning(false)}
                    onTouchStart={e => {
                      if (e.touches.length === 2) {
                        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        panStart.current = { pinchDist: d, startZoom: zoom };
                        setIsPanning(false);
                      } else if (e.touches.length === 1 && !canvasLocked) {
                        const t = e.touches[0];
                        if (e.target === svgRef.current || e.target.tagName === 'svg' || e.target.tagName === 'image' || e.target.tagName === 'rect') {
                          setIsPanning(true);
                          panStart.current = { x: t.clientX - pan.x, y: t.clientY - pan.y };
                        }
                      }
                    }}}
                    onTouchMove={e => {
                      if (e.touches.length === 2 && panStart.current?.pinchDist) {
                        e.preventDefault();
                        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                        const scale = d / panStart.current.pinchDist;
                        setZoom(Math.max(0.2, Math.min(2.5, panStart.current.startZoom * scale)));
                      } else if (isPanning && panStart.current && e.touches.length === 1) {
                        e.preventDefault();
                        const t = e.touches[0];
                        setPan({ x: t.clientX - panStart.current.x, y: t.clientY - panStart.current.y });
                      }
                    }}
                    onTouchEnd={() => { setIsPanning(false); if (panStart.current?.pinchDist) panStart.current = null; }}
                  >
                    <defs>
                      <pattern id="grid-dots" width="40" height="40" patternUnits="userSpaceOnUse">
                        <circle cx="20" cy="20" r="1" fill="var(--border-default)" opacity="0.5"/>
                      </pattern>
                    </defs>
                    <g transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>
                      {/* Canvas background with dot grid */}
                      <rect x="0" y="0" width={canvasBounds.w} height={canvasBounds.h} fill="url(#grid-dots)" rx="12" />
                      <rect x="0" y="0" width={canvasBounds.w} height={canvasBounds.h} fill="none" stroke="var(--border-default)" strokeWidth="1.5" rx="12" opacity="0.5" />
                      {/* Floor plan background image */}
                      {event?.settings?.floorplan_url && sketchVisible && (
                        <image
                          href={event.settings.floorplan_url}
                          x="0" y="0"
                          width={canvasBounds.w} height={canvasBounds.h}
                          preserveAspectRatio="xMidYMid meet"
                          opacity={sketchOpacity}
                          style={{ pointerEvents: 'none' }}
                        />
                      )}
                      {tables.map(table => (
                        <FloorTable
                          key={table.id}
                          table={table}
                          guests={guests}
                          selected={selectedFloorTable?.id === table.id}
                          locked={isTableLocked(table.id)}
                          onDragTable={handleTableMouseDown}
                          onTouchTable={handleTableTouchStart}
                          onClick={t => setSelectedFloorTable(selectedFloorTable?.id === t.id ? null : t)}
                        />
                      ))}
                    </g>
                  </svg>

                  {/* Selected table panel */}
                  {selectedFloorTable && (() => {
                    const tGuests = guests.filter(g => g.table_id === selectedFloorTable.id);

                    // On mobile: bottom sheet. On desktop: near the table
                    if (isMobile) {
                      return (
                        <div style={{
                          position: 'absolute',
                          bottom: 0, left: 0, right: 0,
                          background: 'var(--bg-elevated)',
                          borderTop: '1px solid var(--border-default)',
                          borderRadius: '16px 16px 0 0',
                          padding: '14px 16px',
                          boxShadow: '0 -4px 20px rgba(0,0,0,0.12)',
                          zIndex: 10,
                          animation: 'slideUp 0.2s ease both',
                        }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                            <div>
                              <span style={{ fontWeight: 700, fontSize: 15 }}>{selectedFloorTable.name}</span>
                              <span style={{ fontSize: 12, color: 'var(--text-secondary)', marginRight: 8 }}>
                                {tGuests.reduce((s,g)=>s+(g.confirmed_guests||1),0)}/{selectedFloorTable.seats} מקומות
                              </span>
                            </div>
                            <button className="icon-btn" style={{ width: 28, height: 28 }} onClick={() => setSelectedFloorTable(null)}><Icon name="X" size={16}/></button>
                          </div>
                          {tGuests.length > 0 && (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 10, maxHeight: 50, overflowY: 'auto' }}>
                              {tGuests.map(g => (
                                <span key={g.id} style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:11, padding:'2px 8px', background:'var(--bg-tertiary)', borderRadius:20 }}>
                                  <span style={{ width:5, height:5, borderRadius:'50%', background:getGroupColor(g.group_name) }}/>
                                  {g.name}
                                </span>
                              ))}
                            </div>
                          )}
                          <div style={{ display:'flex', gap:8 }}>
                            <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13, background: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent-light)' : undefined, borderColor: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined, color: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined }} onClick={() => toggleTableLock(selectedFloorTable.id)}>
                              <Icon name={lockedTableIds.has(selectedFloorTable.id) ? 'Lock' : 'Unlock'} size={14}/>{lockedTableIds.has(selectedFloorTable.id) ? 'נעול' : 'נעל'}
                            </button>
                            <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={async ()=>{
                              const newRot = ((selectedFloorTable.rotation || 0) + 45) % 360;
                              await client.from('tables').update({ rotation: newRot }).eq('id', selectedFloorTable.id);
                              setTables(prev => prev.map(t => t.id === selectedFloorTable.id ? { ...t, rotation: newRot } : t));
                              setSelectedFloorTable(prev => ({ ...prev, rotation: newRot }));
                            }}>
                              <Icon name="RotateCw" size={14}/>סובב
                            </button>
                            <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={()=>{setEditTable(selectedFloorTable); setSelectedFloorTable(null);}}>
                              <Icon name="Pencil" size={14}/>ערוך
                            </button>
                            <button className="btn btn-danger" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={()=>{ confirmDeleteTable(selectedFloorTable.id); setSelectedFloorTable(null); }}>
                              <Icon name="Trash2" size={14}/>מחק
                            </button>
                          </div>
                        </div>
                      );
                    }

                    // Desktop: floating panel near table
                    const tx = (selectedFloorTable.position_x || 80) * zoom + pan.x;
                    const ty = (selectedFloorTable.position_y || 80) * zoom + pan.y;
                    const panelW = 210;
                    const panelH = 160;
                    let left = tx - panelW - 10;
                    let top = ty - panelH / 2 + 20;
                    if (left < 8) left = tx + 60;
                    if (top < 8) top = 8;
                    if (top + panelH > 510) top = 510 - panelH;

                    return (
                      <div style={{
                        position: 'absolute',
                        left, top,
                        width: panelW,
                        background: 'var(--bg-elevated)',
                        border: '1px solid var(--border-default)',
                        borderRadius: 'var(--radius-md)',
                        padding: 12,
                        boxShadow: 'var(--shadow-lg)',
                        animation: 'scaleIn 0.15s ease both',
                        zIndex: 10,
                      }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                          <div style={{ fontWeight: 700, fontSize: 14 }}>{selectedFloorTable.name}</div>
                          <button className="icon-btn" style={{ width: 24, height: 24 }} onClick={() => setSelectedFloorTable(null)}><Icon name="X" size={14}/></button>
                        </div>
                        <div style={{ fontSize: 12, color: 'var(--text-secondary)', marginBottom: 8 }}>
                          {tGuests.reduce((s,g)=>s+(g.confirmed_guests||1),0)}/{selectedFloorTable.seats} מקומות
                        </div>
                        {tGuests.length > 0 && (
                          <div style={{ marginBottom: 8, maxHeight: 60, overflowY: 'auto' }}>
                            {tGuests.map(g => (
                              <div key={g.id} style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, padding:'2px 0' }}>
                                <span style={{ width:6, height:6, borderRadius:'50%', background:getGroupColor(g.group_name), flexShrink:0 }}/>
                                {g.name}
                              </div>
                            ))}
                          </div>
                        )}
                        <div style={{ display:'flex', gap:6 }}>
                          <button className="btn btn-secondary" style={{ flex:1, padding:'6px 0', fontSize:12, background: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent-light)' : undefined, borderColor: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined, color: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined }} onClick={() => toggleTableLock(selectedFloorTable.id)}>
                            <Icon name={lockedTableIds.has(selectedFloorTable.id) ? 'Lock' : 'Unlock'} size={13}/>{lockedTableIds.has(selectedFloorTable.id) ? 'נעול' : 'נעל'}
                          </button>
                          <button className="btn btn-secondary" style={{ flex:1, padding:'6px 0', fontSize:12 }} onClick={async ()=>{
                            const newRot = ((selectedFloorTable.rotation || 0) + 45) % 360;
                            await client.from('tables').update({ rotation: newRot }).eq('id', selectedFloorTable.id);
                            setTables(prev => prev.map(t => t.id === selectedFloorTable.id ? { ...t, rotation: newRot } : t));
                            setSelectedFloorTable(prev => ({ ...prev, rotation: newRot }));
                          }}>
                            <Icon name="RotateCw" size={13}/>סובב
                          </button>
                          <button className="btn btn-secondary" style={{ flex:1, padding:'6px 0', fontSize:12 }} onClick={()=>{setEditTable(selectedFloorTable); setSelectedFloorTable(null);}}>
                            <Icon name="Pencil" size={13}/>ערוך
                          </button>

                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>

                  <div className="input-group">
                    <label className="input-label">אורך</label>
                    <input className="input-field" type="number" min="300" max="2000" step="50" value={canvasSizeForm.h} onChange={e => setCanvasSizeForm(f => ({ ...f, h: e.target.value }))} />

          {/* ── FULLSCREEN FLOOR PLAN (Mobile) ── */}

              <div style={{

                  <button

                    onClick={() => { setCanvasLocked(l => !l); if (!canvasLocked) setPan({ x: 0, y: 0 }); }}

                      onClick={() => setSketchVisible(v => !v)}

                    >
                      <Icon name="Image" size={15} />

              {/* SVG Canvas */}
              <div style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
                <svg
                  ref={svgRef}
                  width="100%"
                  height="100%"
                  style={{ touchAction: 'none', background: 'var(--bg-secondary)' }}
                  onTouchStart={e => {
                    if (e.touches.length === 2) {
                      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                      panStart.current = { pinchDist: d, startZoom: zoom };
                      setIsPanning(false);
                    } else if (e.touches.length === 1 && !canvasLocked) {
                      const t = e.touches[0];
                      if (e.target === svgRef.current || e.target.tagName === 'svg' || e.target.tagName === 'image' || e.target.tagName === 'rect') {
                        setIsPanning(true);
                        panStart.current = { x: t.clientX - pan.x, y: t.clientY - pan.y };
                      }
                    }
                  }}
                  onTouchMove={e => {
                    if (e.touches.length === 2 && panStart.current?.pinchDist) {
                      e.preventDefault();
                      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                      const scale = d / panStart.current.pinchDist;
                      setZoom(Math.max(0.15, Math.min(2.5, panStart.current.startZoom * scale)));
                    } else if (isPanning && panStart.current && e.touches.length === 1) {
                      e.preventDefault();
                      const t = e.touches[0];
                      setPan({ x: t.clientX - panStart.current.x, y: t.clientY - panStart.current.y });
                    }
                  }}
                  onTouchEnd={() => { setIsPanning(false); if (panStart.current?.pinchDist) panStart.current = null; }}
                  onMouseDown={e => {
                    if (canvasLocked) return;
                    if (e.target === svgRef.current || e.target.tagName === 'svg' || e.target.tagName === 'image') {
                      setIsPanning(true);
                      panStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                    }
                  }}
                  onMouseMove={e => {
                    if (isPanning && panStart.current) {
                      setPan({ x: e.clientX - panStart.current.x, y: e.clientY - panStart.current.y });
                    }
                  }}
                  onMouseUp={() => setIsPanning(false)}
                  onMouseLeave={() => setIsPanning(false)}
                >
                  <defs>
                    <pattern id="grid-dots-fs" width="40" height="40" patternUnits="userSpaceOnUse">
                      <circle cx="20" cy="20" r="1" fill="var(--border-default)" opacity="0.5"/>
                    </pattern>
                  </defs>
                  <g transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>
                    <rect x="0" y="0" width={canvasBounds.w} height={canvasBounds.h} fill="url(#grid-dots-fs)" rx="12" />
                    <rect x="0" y="0" width={canvasBounds.w} height={canvasBounds.h} fill="none" stroke="var(--border-default)" strokeWidth="1.5" rx="12" opacity="0.5" />
                    {event?.settings?.floorplan_url && sketchVisible && (
                      <image
                        href={event.settings.floorplan_url}
                        x="0" y="0"
                        width={canvasBounds.w} height={canvasBounds.h}
                        preserveAspectRatio="xMidYMid meet"
                        opacity={sketchOpacity}
                        style={{ pointerEvents: 'none' }}
                      />
                    )}
                    {tables.map(table => (
                      <FloorTable
                        key={table.id}
                        table={table}
                        guests={guests}
                        selected={selectedFloorTable?.id === table.id}
                        locked={isTableLocked(table.id)}
                        onDragTable={handleTableMouseDown}
                        onTouchTable={handleTableTouchStart}
                        onClick={t => setSelectedFloorTable(selectedFloorTable?.id === t.id ? null : t)}
                      />
                    ))}
                  </g>
                </svg>

                {/* Sketch opacity slider (fullscreen) */}
                {event?.settings?.floorplan_url && sketchVisible && (
                  <div style={{
                    position: 'absolute', bottom: 12, right: 12, zIndex: 5,
                    background: 'var(--bg-elevated)', border: '1px solid var(--border-default)',
                    borderRadius: 'var(--radius-sm)', padding: '6px 10px',
                    display: 'flex', alignItems: 'center', gap: 8, fontSize: 11,
                    boxShadow: 'var(--shadow-sm)',
                  }}>
                    <Icon name="Image" size={12} style={{ color: 'var(--text-tertiary)' }} />
                    <input
                      type="range" min="0.05" max="0.8" step="0.05"
                      value={sketchOpacity}
                      onChange={e => setSketchOpacity(parseFloat(e.target.value))}
                      style={{ width: 60, cursor: 'pointer', accentColor: 'var(--accent)' }}
                    />
                    <span style={{ color: 'var(--text-tertiary)', minWidth: 28 }}>{Math.round(sketchOpacity * 100)}%</span>
                  </div>
                )}

                {/* Selected table — bottom sheet */}
                {selectedFloorTable && (() => {
                  const tGuests = guests.filter(g => g.table_id === selectedFloorTable.id);
                  return (
                    <div style={{
                      position: 'absolute',
                      bottom: 0, left: 0, right: 0,
                      background: 'var(--bg-elevated)',
                      borderTop: '1px solid var(--border-default)',
                      borderRadius: '16px 16px 0 0',
                      padding: '14px 16px',
                      boxShadow: '0 -4px 20px rgba(0,0,0,0.12)',
                      zIndex: 10,
                      animation: 'slideUp 0.2s ease both',
                    }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                        <div>
                          <span style={{ fontWeight: 700, fontSize: 15 }}>{selectedFloorTable.name}</span>
                          <span style={{ fontSize: 12, color: 'var(--text-secondary)', marginRight: 8 }}>
                            {tGuests.reduce((s,g)=>s+(g.confirmed_guests||1),0)}/{selectedFloorTable.seats} מקומות
                          </span>
                        </div>
                        <button className="icon-btn" style={{ width: 28, height: 28 }} onClick={() => setSelectedFloorTable(null)}><Icon name="X" size={16}/></button>
                      </div>
                      {tGuests.length > 0 && (
                        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginBottom: 10, maxHeight: 50, overflowY: 'auto' }}>
                          {tGuests.map(g => (
                            <span key={g.id} style={{ display:'inline-flex', alignItems:'center', gap:4, fontSize:11, padding:'2px 8px', background:'var(--bg-tertiary)', borderRadius:20 }}>
                              <span style={{ width:5, height:5, borderRadius:'50%', background:getGroupColor(g.group_name) }}/>
                              {g.name}
                            </span>
                          ))}
                        </div>
                      )}
                      <div style={{ display:'flex', gap:8 }}>
                        <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13, background: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent-light)' : undefined, borderColor: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined, color: lockedTableIds.has(selectedFloorTable.id) ? 'var(--accent)' : undefined }} onClick={() => toggleTableLock(selectedFloorTable.id)}>
                          <Icon name={lockedTableIds.has(selectedFloorTable.id) ? 'Lock' : 'Unlock'} size={14}/>{lockedTableIds.has(selectedFloorTable.id) ? 'נעול' : 'נעל'}
                        </button>
                        <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={async ()=>{
                          const newRot = ((selectedFloorTable.rotation || 0) + 45) % 360;
                          await client.from('tables').update({ rotation: newRot }).eq('id', selectedFloorTable.id);
                          setTables(prev => prev.map(t => t.id === selectedFloorTable.id ? { ...t, rotation: newRot } : t));
                          setSelectedFloorTable(prev => ({ ...prev, rotation: newRot }));
                        }}>
                          <Icon name="RotateCw" size={14}/>סובב
                        </button>
                        <button className="btn btn-secondary" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={()=>{setEditTable(selectedFloorTable); setSelectedFloorTable(null); setShowFullscreenFloor(false);}}>
                          <Icon name="Pencil" size={14}/>ערוך
                        </button>
                        <button className="btn btn-danger" style={{ flex:1, padding:'8px 0', fontSize:13 }} onClick={()=>{ confirmDeleteTable(selectedFloorTable.id); setSelectedFloorTable(null); }}>
                          <Icon name="Trash2" size={14}/>מחק
                        </button>
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* Stats bar */}
              <div style={{
                display: 'flex', justifyContent: 'space-around', padding: '8px 12px',
                borderTop: '1px solid var(--border-default)', background: 'var(--bg-elevated)',

            </div>

        </div>
      );
